function startLevel(id) {
  const def = LEVELS.find(l => l.id === id);
  if (!def) { toast(t('coming_soon')); return; }
  if (id > state.maxLevelUnlocked) { toast(t('locked')); return; }
  game.active = true;
  game.finished = false;
  game.won = false;
  game.levelId = id;
  game.score = 0;
  game.chain = 0;
  game.multTier = 0;
  game.armedBooster = null;
  game.collectedTreasures = 0;
  game.memoryRevealed = 0;
  game.introsShownThisRun = {};
  game.history = [];
  game.fxLayer = [];
  game.particles = [];
  game.scorePopups = [];
  game.startedAt = Date.now();

  // RNG: deterministic per-level so the run is reproducible per attempt session (changes on each retry though)
  game.rng = mulberry32((id * 9311 + Date.now() & 0xffffffff) >>> 0);

  // build cards
  const positions = LAYOUTS[def.layout]({});
  // assign ranks/suits: use full deck then top up if more positions
  const deck = [];
  for (let s = 0; s < 4; s++) for (let r = 1; r <= 13; r++) deck.push({ rank: r, suit: s });
  shuffle(deck, game.rng);
  while (deck.length < positions.length + def.stock + 6) {
    for (let s = 0; s < 4; s++) for (let r = 1; r <= 13; r++) deck.push({ rank: r, suit: s });
  }
  let cursor = 0;

  game.cards = positions.map(p => {
    const d = deck[cursor++];
    return {
      id: p.id,
      x: p.x, y: p.y, layer: p.layer,
      rank: d.rank, suit: d.suit,
      faceDown: !!p.faceDown,
      cleared: false,
      type: 'normal',
      lockCount: 0, multValue: 1,
      anim: null
    };
  });

  // apply modifiers (locked / mult / treasure / memory positions)
  const mods = def.mods || {};
  const facingUp = game.cards.filter(c => !c.faceDown).map(c => c.id);
  const facingDown = game.cards.filter(c => c.faceDown).map(c => c.id);
  const shuffledUp = facingUp.slice(); shuffle(shuffledUp, game.rng);
  const shuffledDown = facingDown.slice(); shuffle(shuffledDown, game.rng);
  let upCur = 0, dnCur = 0;
  const takeUp = () => game.cards.find(c => c.id === shuffledUp[upCur++]);
  const takeDown = () => game.cards.find(c => c.id === shuffledDown[dnCur++]);

  if (mods.lockCount) {
    for (let i = 0; i < mods.lockCount && i < shuffledUp.length; i++) {
      const c = takeUp(); if (!c) break;
      c.type = 'locked'; c.lockCount = 2;
    }
  }
  if (mods.multCount) {
    for (let i = 0; i < mods.multCount && upCur < shuffledUp.length; i++) {
      const c = takeUp(); if (!c) break;
      c.type = 'mult'; c.multValue = 2;
    }
  }
  if (mods.treasureCount) {
    for (let i = 0; i < mods.treasureCount && upCur < shuffledUp.length; i++) {
      const c = takeUp(); if (!c) break;
      c.type = 'treasure';
    }
  }
  if (mods.memoryPieces) {
    for (let i = 0; i < mods.memoryPieces && dnCur < shuffledDown.length; i++) {
      const c = takeDown(); if (!c) break;
      c.type = 'memory';
    }
  }

  computeBlockers(game.cards);

  // stock
  game.stock = [];
  for (let i = 0; i < def.stock; i++) {
    const d = deck[cursor++] || { rank: 1 + ((Math.random()*13)|0), suit: 0 };
    game.stock.push({ rank: d.rank, suit: d.suit, wild: false });
  }
  if (mods.wildStock) {
    const idx = [];
    for (let i = 0; i < game.stock.length; i++) idx.push(i);
    shuffle(idx, game.rng);
    for (let i = 0; i < mods.wildStock && i < idx.length; i++) game.stock[idx[i]].wild = true;
  }
  // initial waste = first stock pop
  game.waste = game.stock.pop() || { rank: 7, suit: 0 };
  game.drawnCount = 1;

  // intro popup for new mechanic
  const intro = def.intro;
  if (intro && !state.introsSeen[intro]) {
    state.introsSeen[intro] = true; saveState();
    game.introsShownThisRun[intro] = true;
  }

  showPlayScreen();
  layoutCanvas();
  renderHUD();
  mp('level_start', { level: id, layout: def.layout, par: def.par });
  if (intro && game.introsShownThisRun[intro]) {
    setTimeout(() => toast(t('intro_' + intro)), 350);
  }
}

function tryPlayCard(cardId) {
  const c = game.cards.find(x => x.id === cardId);
  if (!c || c.cleared) return;
  if (game.armedBooster) {
    handleArmedBoosterOnCard(c);
    return;
  }
  if (!isPlayable(c, game)) {
    haptic('warn');
    flashCard(c, '#ef476f');
    return;
  }
  if (!Card.isMatch(c.rank, game.waste.rank) && !game.waste.wild && !c.wild) {
    haptic('warn');
    flashCard(c, '#ef476f');
    return;
  }
  // PLAY
  const prevWaste = { ...game.waste };
  const prevChain = game.chain;
  const prevScore = game.score;
  const prevType = c.type;
  game.history.push({ cardId: c.id, prevWaste, prevChain, prevScore, prevType, prevMult: c.multValue, prevLock: c.lockCount });
  if (game.history.length > 20) game.history.shift();

  c.cleared = true;
  // animate to waste
  c.anim = { kind:'toWaste', t:0, dur:280, fromX:c.x, fromY:c.y };
  game.waste = { rank: c.rank, suit: c.suit, wild: !!c.wild };

  game.chain += 1;
  const tier = currentComboTier(game.chain);
  game.multTier = tier;
  const base = 50;
  const multScore = base * COMBO_TIERS[tier].mult * (c.multValue || 1);
  game.score += multScore;
  // Coin-flavored popup (Disney: "+8c"). Show small coin number derived from score.
  const coinShown = Math.max(1, Math.floor(multScore / 10));
  spawnScorePopup(c.x, c.y, '+' + coinShown + '🪙' + (c.multValue > 1 ? ' ×' + c.multValue : ''));

  if (c.type === 'treasure') {
    state.coins += 30;
    spawnParticles(c.x, c.y, 14, '#ffd166');
    spawnScorePopup(c.x, c.y - 0.04, '+30 🪙');
    saveState();
  }
  if (c.type === 'memory') {
    state.memoryPieces += 1;
    game.memoryRevealed += 1;
    spawnParticles(c.x, c.y, 18, '#a83af0');
    saveState();
  }
  if (c.type === 'mult') {
    spawnParticles(c.x, c.y, 16, '#ffd166');
  }

  spawnParticles(c.x, c.y, 8, '#fff');
  haptic('impact');
  beepMatch(game.chain);

  // unlock revealed cards beneath
  setTimeout(revealCardsBeneath, 260);

  // chain-of-5 mission
  if (game.chain === 5) state.totalChains5 += 1, saveState();

  // combo tier callout
  if (tier > game.multTier - 1 && tier > 0) {
    showComboCallout(tier);
  }
  renderHUD();
  checkWin();
}

function handleArmedBoosterOnCard(c) {
  const b = game.armedBooster;
  if (b === 'wild') {
    if (state.boosters.wild <= 0) { armBooster(null); return; }
    // turn waste into wild matching this card
    game.waste = { rank: c.rank, suit: c.suit, wild: true };
    state.boosters.wild -= 1; saveState();
    spawnParticles(0.5, 0.6, 24, '#ffd166');
    armBooster(null);
    renderHUD();
  } else {
    armBooster(null);
  }
}

function revealCardsBeneath() {
  // any face-down card whose blockers are all cleared becomes face-up + flips
  const reveals = [];
  for (const c of game.cards) {
    if (c.cleared) continue;
    if (!c.faceDown) continue;
    let ok = true;
    for (const bid of c.blockers) {
      const b = game.cards.find(x => x.id === bid);
      if (b && !b.cleared) { ok = false; break; }
    }
    if (ok) reveals.push(c);
  }
  reveals.forEach(c => {
    c.faceDown = false;
    c.anim = { kind:'flip', t: 0, dur: 280 };
    // decrement lock count on neighbors if newly revealed
  });
  // also, every match: decrement lockCount of neighboring locked cards
  // (treated as a generic effect — neighbors are blockers' parents or siblings of just-cleared)
  for (const c of game.cards) {
    if (c.cleared || c.type !== 'locked' || c.lockCount <= 0) continue;
    // count cleared neighbors among blockers + siblings within 0.12 x and 0.12 y
    let neighborsClearedNow = 0;
    for (const o of game.cards) {
      if (o === c) continue;
      if (!o.cleared) continue;
      if (Math.abs(o.x - c.x) < 0.13 && Math.abs(o.y - c.y) < 0.14) {
        if (o._lockTickedFor && o._lockTickedFor.has && o._lockTickedFor.has(c.id)) continue;
        neighborsClearedNow += 1;
        if (!o._lockTickedFor) o._lockTickedFor = new Set();
        o._lockTickedFor.add(c.id);
      }
    }
    if (neighborsClearedNow > 0) {
      c.lockCount = Math.max(0, c.lockCount - neighborsClearedNow);
      if (c.lockCount === 0) {
        spawnParticles(c.x, c.y, 12, '#ffd166');
      }
    }
  }
}

function drawFromStock() {
  if (game.stock.length === 0) {
    toast(t('no_match'));
    return;
  }
  if (game.chain > 0) flashComboBreak();
  game.chain = 0;
  game.multTier = 0;
  game.history.push({ kind:'draw', prevWaste: { ...game.waste }, prevChain: game.chain, prevScore: game.score });
  if (game.history.length > 20) game.history.shift();
  game.waste = game.stock.pop();
  game.drawnCount += 1;
  haptic('impact');
  beepDraw();
  renderHUD();
  checkWin();
}

function currentComboTier(chain) {
  let tier = 0;
  for (let i = COMBO_TIERS.length - 1; i >= 0; i--) {
    if (chain >= COMBO_TIERS[i].chain) { tier = i; break; }
  }
  return tier;
}

function undo() {
  if (state.boosters.undo <= 0) { toast(t('not_enough')); return; }
  if (!game.history.length) { toast(t('no_undo')); return; }
  const h = game.history.pop();
  if (h.kind === 'draw') {
    game.stock.push(game.waste);
    game.waste = h.prevWaste;
    game.chain = h.prevChain;
    game.score = h.prevScore;
  } else {
    const c = game.cards.find(x => x.id === h.cardId);
    if (c) {
      c.cleared = false;
      c.type = h.prevType || c.type;
      c.multValue = h.prevMult || c.multValue;
      c.lockCount = (h.prevLock != null) ? h.prevLock : c.lockCount;
    }
    game.waste = h.prevWaste;
    game.chain = h.prevChain;
    game.score = h.prevScore;
    if (h.kind === 'draw' || h.prevType === 'treasure') {
      // refund treasure coins if undo'd (simple)
    }
  }
  state.boosters.undo -= 1;
  saveState();
  game.multTier = currentComboTier(game.chain);
  computeBlockers(game.cards);
  renderHUD();
  haptic('impact');
}

function shuffleBoard() {
  if (state.boosters.shuffle <= 0) { toast(t('not_enough')); return; }
  // shuffle face-up, non-cleared cards' ranks/suits among themselves
  const live = game.cards.filter(c => !c.cleared && !c.faceDown);
  const ranks = live.map(c => ({ rank:c.rank, suit:c.suit }));
  shuffle(ranks, game.rng);
  live.forEach((c, i) => { c.rank = ranks[i].rank; c.suit = ranks[i].suit; c.anim = { kind:'shuffle', t:0, dur: 360 }; });
  state.boosters.shuffle -= 1;
  saveState();
  spawnParticles(0.5, 0.5, 30, '#06d6a0');
  haptic('success');
  beepShuffle();
  renderHUD();
}

function checkWin() {
  const remaining = game.cards.filter(c => !c.cleared);
  if (remaining.length === 0) {
    finishLevel(true);
    return;
  }
  // lose: stock empty AND no legal moves. Trigger Disney-style "user-initiated failure" — offer +5 cards rescue first.
  if (game.stock.length === 0) {
    const playable = remaining.filter(c => isPlayable(c, game) && (Card.isMatch(c.rank, game.waste.rank) || game.waste.wild || c.wild));
    if (playable.length === 0) {
      if (!game._rescueOffered && remaining.length <= 8 && !game.dailyMode) {
        game._rescueOffered = true;
        offerRescue(remaining.length);
        return;
      }
      finishLevel(false);
    }
  }
}

function offerRescue(remainingN) {
  const cost = 150;
  const html =
    '<button class="x" onclick="closeModal();finishLevel(false)">✕</button>' +
    '<h3>😩 So close!</h3>' +
    '<p>' + remainingN + ' cards left and the stock is empty.</p>' +
    '<p style="font-size:13px;color:var(--ink-soft)">Buy 5 more stock cards and keep your combo going?</p>' +
    '<div class="cta-row">' +
      '<button class="cta secondary" id="cta-give">' + t('btn_retry') + '</button>' +
      '<button class="cta" id="cta-rescue">+5 🪙 ' + cost + '</button>' +
    '</div>';
  openModal(html, () => {
    document.getElementById('cta-give').addEventListener('click', () => { closeModal(); finishLevel(false); });
    document.getElementById('cta-rescue').addEventListener('click', () => {
      if (state.coins < cost) { toast(t('not_enough')); return; }
      state.coins -= cost; saveState();
      for (let i = 0; i < 5; i++) {
        game.stock.push({ rank: 1 + Math.floor(Math.random() * 13), suit: Math.floor(Math.random()*4), wild: i === 0 });
      }
      closeModal();
      toast('+5 📦');
      haptic('success');
      renderHUD();
      mp('rescue_taken', { level: game.levelId, cost });
    });
  });
  mp('rescue_offered', { level: game.levelId });
  haptic('warn');
}

function finishLevel(won) {
  if (game.finished) return;
  game.finished = true;
  game.won = won;
  const def = LEVELS.find(l => l.id === game.levelId);
  let stars = 0;
  if (won) {
    // stock-leftover bonus
    const leftover = game.stock.length * 50;
    game.score += leftover;
    spawnScorePopup(0.5, 0.5, '+' + leftover + ' ' + t('stock_left'));
    // star tiers
    if (game.score >= def.perfect) stars = 3;
    else if (game.score >= def.gold) stars = 2;
    else stars = 1;
    const prev = state.starsPerLevel[game.levelId] || 0;
    if (stars > prev) state.starsPerLevel[game.levelId] = stars;
    state.stars = Object.values(state.starsPerLevel).reduce((a,b)=>a+b,0);
    state.bestScorePerLevel[game.levelId] = Math.max(state.bestScorePerLevel[game.levelId] || 0, game.score);
    state.maxLevelUnlocked = Math.max(state.maxLevelUnlocked, game.levelId + 1);
    state.coins += 50 + stars * 30 + (state.battlePassUntil > Date.now() ? 30 : 0);
    bumpStreakOnWin();
    state.totalGames += 1;
    state.gamesPlayedToday = (state.gamesPlayedYMD === ymd()) ? (state.gamesPlayedToday + 1) : 1;
    state.gamesPlayedYMD = ymd();
    saveState();
    mp('level_complete', { level: game.levelId, score: game.score, stars, chain_best: game.chain });
    spawnConfetti();
    setTimeout(() => openLevelCompleteModal(stars), 700);
  } else {
    saveState();
    mp('level_failed', { level: game.levelId, score: game.score });
    setTimeout(() => openLevelFailedModal(), 500);
  }
  pushHeartbeat();
  submitLeaderboard();
}

function bumpStreakOnWin() {
  const today = ymd();
  if (state.lastPlayedYMD === today) return;
  const y = new Date(); y.setUTCDate(y.getUTCDate()-1);
  if (state.lastPlayedYMD === ymd(y) || !state.lastPlayedYMD) {
    state.streak = (state.streak || 0) + 1;
  } else if (state.shieldUntil > Date.now()) {
    state.streak = state.streak; // shielded
  } else {
    state.streak = 1;
  }
  state.lastPlayedYMD = today;
}

/* ============== [JS-09] BOOSTERS UI ============== */
function armBooster(name) {
  if (name && state.boosters[name] <= 0) { toast(t('not_enough')); return; }
  if (name === 'shuffle') { shuffleBoard(); return; }
  if (name === 'undo')    { undo(); return; }
  game.armedBooster = (game.armedBooster === name) ? null : name;
  renderBoosterRow();
  if (game.armedBooster === 'wild') toast(t('armed_tap_card'));
}

function renderBoosterRow() {
  const row = document.getElementById('booster-row');
  if (!row) return;
  row.innerHTML = '';
  BOOSTER_LIST.forEach(name => {
    const n = state.boosters[name] | 0;
    const b = document.createElement('button');
    b.className = 'booster' + (n <= 0 ? ' empty' : '') + (game.armedBooster === name ? ' armed' : '');
    b.innerHTML = BOOSTER_ICON[name] + '<span class="count">' + n + '</span>';
    b.addEventListener('click', (ev) => { ev.stopPropagation(); armBooster(name); });
    row.appendChild(b);
  });
}

/* ============== [JS-10] RENDER (CANVAS) ============== */
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
let dpr = window.devicePixelRatio || 1;
let cssW = 0, cssH = 0;
let originX = 0, originY = 0, playW = 0, playH = 0;
function layoutCanvas() {
  const rect = canvas.getBoundingClientRect();
  dpr = window.devicePixelRatio || 1;
  cssW = rect.width; cssH = rect.height;
  canvas.width = Math.floor(cssW * dpr);
  canvas.height = Math.floor(cssH * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  // play surface coords: pad 16px each side, top, leaves space at bottom for waste
  const padX = 12, padTop = 8, padBottom = 4;
  originX = padX;
  originY = padTop;
  playW = cssW - padX * 2;
  playH = cssH - padTop - padBottom;
}
window.addEventListener('resize', () => { layoutCanvas(); });

function normToScreen(nx, ny) {
  return { x: originX + nx * playW, y: originY + ny * playH };
}

function drawBg() {
  // table felt
  const grad = ctx.createLinearGradient(0, 0, 0, cssH);
  grad.addColorStop(0, 'rgba(255,255,255,0.02)');
  grad.addColorStop(1, 'rgba(0,0,0,0.20)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, cssW, cssH);
}

function drawRoundedRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x + r, y);
  c.lineTo(x + w - r, y);
  c.quadraticCurveTo(x + w, y, x + w, y + r);
  c.lineTo(x + w, y + h - r);
  c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  c.lineTo(x + r, y + h);
  c.quadraticCurveTo(x, y + h, x, y + h - r);
  c.lineTo(x, y + r);
  c.quadraticCurveTo(x, y, x + r, y);
  c.closePath();
}

function drawCardFace(c, x, y, w, h, card, scaleX, compact) {
  scaleX = (scaleX == null) ? 1 : scaleX;
  c.save();
  c.translate(x + w/2, y + h/2);
  c.scale(scaleX, 1);
  c.translate(-w/2, -h/2);
  // shadow
  c.fillStyle = 'rgba(0,0,0,0.35)';
  drawRoundedRect(c, 1, 3, w, h, CARD_R); c.fill();
  // face
  const grad = c.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, '#fffcf2');
  grad.addColorStop(1, '#e9e1c4');
  c.fillStyle = grad;
  drawRoundedRect(c, 0, 0, w, h, CARD_R); c.fill();
  // inner border
  c.strokeStyle = 'rgba(0,0,0,0.10)';
  c.lineWidth = 1;
  drawRoundedRect(c, 1, 1, w-2, h-2, CARD_R-1); c.stroke();
  // rank+suit corners — BIG for readability (Disney/SGH pattern)
  const rank = RANK_LABEL[card.rank];
  const suit = SUITS[card.suit % 4];
  c.fillStyle = SUIT_COLOR[suit];
  c.font = '800 ' + Math.floor(h*0.26) + 'px Inter, system-ui, sans-serif';
  c.textBaseline = 'top';
  c.textAlign = 'left';
  c.fillText(rank, 5, 3);
  c.font = '700 ' + Math.floor(h*0.18) + 'px Inter, system-ui, sans-serif';
  c.fillText(suit, 6, 3 + Math.floor(h*0.26));
  if (!compact) {
    // big center suit (only when card is fully visible — bottom row + waste)
    c.font = '700 ' + Math.floor(h*0.45) + 'px Inter, system-ui, sans-serif';
    c.textAlign = 'center'; c.textBaseline = 'middle';
    c.fillText(suit, w/2, h/2 + 4);
    // bottom-right rank rotated
    c.save();
    c.translate(w - 5, h - 4);
    c.rotate(Math.PI);
    c.font = '800 ' + Math.floor(h*0.26) + 'px Inter, system-ui, sans-serif';
    c.textBaseline = 'top';
    c.textAlign = 'left';
    c.fillText(rank, 0, 0);
    c.restore();
  }
  // overlays for types
  if (card.type === 'mult') {
    c.strokeStyle = '#ffd166'; c.lineWidth = 3;
    drawRoundedRect(c, 1.5, 1.5, w-3, h-3, CARD_R-1); c.stroke();
    c.fillStyle = '#ffd166';
    c.fillRect(w/2 - 12, h - 18, 24, 14);
    c.fillStyle = '#1a0b2e';
    c.font = '900 11px Inter, sans-serif'; c.textAlign='center'; c.textBaseline='middle';
    c.fillText('x' + (card.multValue || 2), w/2, h - 11);
  }
  if (card.type === 'treasure') {
    c.fillStyle = 'rgba(255,209,102,0.92)';
    c.beginPath(); c.arc(w/2, h*0.35, h*0.18, 0, Math.PI*2); c.fill();
    c.fillStyle = '#1a0b2e';
    c.font = '900 ' + Math.floor(h*0.18) + 'px Inter, sans-serif';
    c.textAlign='center'; c.textBaseline='middle';
    c.fillText('🪙', w/2, h*0.35);
  }
  if (card.type === 'memory') {
    c.fillStyle = 'rgba(168,58,240,0.6)';
    drawRoundedRect(c, 0, 0, w, h, CARD_R); c.fill();
    c.fillStyle = '#fff';
    c.font = '900 ' + Math.floor(h*0.30) + 'px Inter, sans-serif';
    c.textAlign='center'; c.textBaseline='middle';
    c.fillText('?', w/2, h/2);
  }
  if (card.type === 'locked' && card.lockCount > 0) {
    c.fillStyle = 'rgba(0,0,0,0.6)';
    drawRoundedRect(c, 0, 0, w, h, CARD_R); c.fill();
    c.fillStyle = '#fff';
    c.font = '900 ' + Math.floor(h*0.36) + 'px Inter, sans-serif';
    c.textAlign='center'; c.textBaseline='middle';
    c.fillText('🔒', w/2, h/2 - 4);
    c.font = '900 11px Inter, sans-serif';
    c.fillText(String(card.lockCount), w/2, h - 12);
  }
  if (card.wild) {
    const wg = c.createLinearGradient(0, 0, w, h);
    wg.addColorStop(0, 'rgba(239,71,111,0.4)');
    wg.addColorStop(0.5, 'rgba(255,209,102,0.4)');
    wg.addColorStop(1, 'rgba(6,214,160,0.4)');
    c.fillStyle = wg;
    drawRoundedRect(c, 0, 0, w, h, CARD_R); c.fill();
    c.fillStyle = '#fff';
    c.font='900 ' + Math.floor(h*0.4)+'px Inter, sans-serif'; c.textAlign='center'; c.textBaseline='middle';
    c.fillText('🃏', w/2, h/2);
  }
  c.restore();
}

function drawCardBack(c, x, y, w, h, scaleX) {
  scaleX = (scaleX == null) ? 1 : scaleX;
  c.save();
  c.translate(x + w/2, y + h/2);
  c.scale(scaleX, 1);
  c.translate(-w/2, -h/2);
  // shadow
  c.fillStyle = 'rgba(0,0,0,0.35)';
  drawRoundedRect(c, 1, 3, w, h, CARD_R); c.fill();
  // back
  const grad = c.createLinearGradient(0, 0, w, h);
  grad.addColorStop(0, '#6a3df0');
  grad.addColorStop(1, '#2a0f5a');
  c.fillStyle = grad;
  drawRoundedRect(c, 0, 0, w, h, CARD_R); c.fill();
  c.strokeStyle = 'rgba(255,255,255,0.25)';
  c.setLineDash([4,3]); c.lineWidth = 1.5;
  drawRoundedRect(c, 4, 4, w-8, h-8, CARD_R-2); c.stroke();
  c.setLineDash([]);
  c.fillStyle = 'rgba(255,209,102,0.85)';
  c.font = '700 ' + Math.floor(h*0.36) + 'px Inter, sans-serif';
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillText('♛', w/2, h/2);
  c.restore();
}

function drawCards() {
  // sort by layer then y so deeper cards render first
  const sorted = game.cards.slice().sort((a,b) => (a.layer - b.layer) || (a.y - b.y));
  for (const card of sorted) {
    if (card.cleared && !card.anim) continue;
    let nx = card.x, ny = card.y;
    let scaleX = 1;
    if (card.anim) {
      card.anim.t += 16;
      const p = clamp(card.anim.t / card.anim.dur, 0, 1);
      if (card.anim.kind === 'toWaste') {
        const target = { x: wastePileNorm().x, y: wastePileNorm().y };
        const e = easeOutCubic(p);
        nx = lerp(card.anim.fromX, target.x, e);
        ny = lerp(card.anim.fromY, target.y, e);
        if (p >= 1) { card.anim = null; }
      } else if (card.anim.kind === 'flip') {
        const e = p;
        const s = Math.abs(Math.cos(e * Math.PI));
        scaleX = Math.max(0.06, s);
        if (p >= 1) card.anim = null;
      } else if (card.anim.kind === 'shuffle') {
        const e = easeOutBack(p);
        ny = card.y - (1 - e) * 0.05;
        if (p >= 1) card.anim = null;
      }
    }
    if (card.cleared && !card.anim) continue;
    const pos = normToScreen(nx, ny);
    const x = pos.x - CARD_W/2;
    const y = pos.y - CARD_H/2;
    const showFace = !card.faceDown || (card.anim && card.anim.kind === 'flip' && card.anim.t > card.anim.dur*0.5);
    // covered = at least one blocker still uncleared. Render compact (no center suit / no bottom rank).
    const covered = isCardCovered(card);
    if (showFace) drawCardFace(ctx, x, y, CARD_W, CARD_H, card, scaleX, covered);
    else drawCardBack(ctx, x, y, CARD_W, CARD_H, scaleX);
    // playable highlight — bigger + pulse
    if (!card.faceDown && !card.cleared && isPlayable(card, game) && (Card.isMatch(card.rank, game.waste.rank) || game.waste.wild)) {
      const pulse = 0.5 + Math.sin(performance.now() * 0.006) * 0.5;
      ctx.save();
      ctx.strokeStyle = 'rgba(6,214,160,' + (0.5 + pulse * 0.5) + ')';
      ctx.lineWidth = 3;
      drawRoundedRect(ctx, x - 2, y - 2, CARD_W + 4, CARD_H + 4, CARD_R + 2);
      ctx.stroke();
      // soft glow
      ctx.shadowColor = 'rgba(6,214,160,0.7)';
      ctx.shadowBlur = 8 + pulse * 8;
      drawRoundedRect(ctx, x - 2, y - 2, CARD_W + 4, CARD_H + 4, CARD_R + 2);
      ctx.stroke();
      ctx.restore();
    }
  }
}
function isCardCovered(card) {
  if (!card.blockers || !card.blockers.length) return false;
  for (const bid of card.blockers) {
    const b = game.cards.find(x => x.id === bid);
    if (b && !b.cleared) return true;
  }
  return false;
}

function drawParticles() {
  const next = [];
  for (const p of game.particles) {
    p.t += 1;
    if (p.t > p.life) continue;
    const k = p.t / p.life;
    const pos = normToScreen(p.x, p.y);
    ctx.save();
    ctx.globalAlpha = 1 - k;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(pos.x + p.vx * p.t, pos.y + p.vy * p.t + 0.5 * 0.05 * p.t * p.t, p.r * (1 - k * 0.5), 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    next.push(p);
  }
  game.particles = next;
}

function drawScorePopups() {
  const next = [];
  for (const p of game.scorePopups) {
    p.t += 1;
    if (p.t > p.life) continue;
    const k = p.t / p.life;
    const pos = normToScreen(p.x, p.y - k * 0.06);
    ctx.save();
    ctx.globalAlpha = 1 - k;
    ctx.fillStyle = p.color || '#ffd166';
    ctx.font = '900 18px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,0.6)';
    ctx.shadowBlur = 6;
    ctx.fillText(p.text, pos.x, pos.y);
    ctx.restore();
    next.push(p);
  }
  game.scorePopups = next;
}

function wastePileNorm() {

canvas.addEventListener('pointerdown', (ev) => {
  if (!game.active || game.finished) return;
  const rect = canvas.getBoundingClientRect();
  const px = ev.clientX - rect.left;
  const py = ev.clientY - rect.top;
  // hit-test top-most card (highest layer) under point
  let hit = null, hitLayer = -1;
  for (const c of game.cards) {
    if (c.cleared) continue;
    const pos = normToScreen(c.x, c.y);
    if (px >= pos.x - CARD_W/2 && px <= pos.x + CARD_W/2 && py >= pos.y - CARD_H/2 && py <= pos.y + CARD_H/2) {
      if (c.layer > hitLayer) { hit = c; hitLayer = c.layer; }
    }
  }
  if (hit) tryPlayCard(hit.id);
});

let AC = null;
function ensureAC() {
  if (!state.settings.sound) return null;
  if (!AC) {
    try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch {}
  }
  if (AC && AC.state === 'suspended') AC.resume();
  return AC;
}
function tone(freq, dur, type, gain) {
  const ac = ensureAC(); if (!ac) return;
  const o = ac.createOscillator();
  const g = ac.createGain();
  o.type = type || 'sine';
  o.frequency.value = freq;
  g.gain.value = 0;
  g.gain.linearRampToValueAtTime(gain || 0.2, ac.currentTime + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + dur);
  o.connect(g).connect(ac.destination);
  o.start();
  o.stop(ac.currentTime + dur + 0.02);
}
function beepMatch(chain) {
  const baseFreq = 320 + chain * 28;
  tone(baseFreq, 0.16, 'triangle', 0.18);
  tone(baseFreq * 1.5, 0.12, 'sine', 0.08);
}
function beepDraw() { tone(180, 0.12, 'sawtooth', 0.12); }
function beepShuffle() {
  tone(440, 0.08, 'sine', 0.12); setTimeout(()=>tone(550, 0.08, 'sine', 0.12),80);
  setTimeout(()=>tone(660, 0.10, 'sine', 0.12),160);
}
function beepWin() {
  tone(523, 0.14, 'triangle', 0.20);
  setTimeout(()=>tone(659, 0.14, 'triangle', 0.20),140);
  setTimeout(()=>tone(784, 0.20, 'triangle', 0.22),280);
}
function beepLose() {
  tone(220, 0.18, 'sawtooth', 0.18);
  setTimeout(()=>tone(165, 0.22, 'sawtooth', 0.18),140);
}

    else btnLabel = Math.floor(p * 100) + '%';
  } else {
    if ((m.kind === 'oneshot' && completedOnce)) { btnLabel = t('mission_done'); btnClass = 'done'; }
    else if (goneOut) { btnLabel = t('mission_check'); btnClass = 'check'; }
  }
  el.innerHTML =
    '<div class="ic">' + m.icon + '</div>' +
    '<div class="body"><h5>' + t(m.titleKey) + '</h5><div class="sub">' + t(m.subKey) + '</div><div class="reward">🪙 ' + m.reward + '</div></div>' +
    '<button class="btn ' + btnClass + '">' + btnLabel + '</button>';
  el.querySelector('button').addEventListener('click', () => handleMission(m));
  return el;
}

function handleMission(m) {
  const cs = state.missions[m.id] || {};
  state.missions[m.id] = cs;
  const today = ymd();
  if (m.kind === 'daily' && cs.claimedYMD === today) return;
  if (m.kind === 'oneshot' && cs.claimed) return;
  if (m.auto) {
    const p = m.progress ? m.progress() : 0;
    if (p < 1) { toast(Math.floor(p * 100) + '%'); return; }
    grantMission(m); return;
  }
  if (!cs.goneOut) {
    cs.goneOut = true; saveState(); renderEarn();
    if (m.action === 'share') {
      const url = (TG && TG.openTelegramLink) ? 'https://t.me/share/url?url=' + encodeURIComponent(window.location.href) + '&text=' + encodeURIComponent(t('welcome_t')) : window.location.href;
      try { TG?.openTelegramLink ? TG.openTelegramLink(url) : window.open(url, '_blank'); } catch { window.open(url, '_blank'); }
    } else if (m.action === 'follow' && m.url) {
      try { TG?.openTelegramLink ? TG.openTelegramLink(m.url) : window.open(m.url, '_blank'); } catch { window.open(m.url, '_blank'); }
    }
  } else {
    grantMission(m);
  }
}

function grantMission(m) {
  const cs = state.missions[m.id] || {};
  state.missions[m.id] = cs;
  const bp = state.battlePassUntil > Date.now() ? 2 : 1;
  state.coins += m.reward * bp;
  if (m.kind === 'daily') cs.claimedYMD = ymd();
  else cs.claimed = true;
  saveState(); renderEarn();
  toast('+' + (m.reward * bp) + ' 🪙');
  haptic('success');
  mp('mission_claim', { id: m.id, reward: m.reward * bp });
}

function chestDayForToday() {
  const today = ymd();
  if (state.chestClaimedYMD === today) return state.chestDay;
  // yesterday claimed -> advance; else if missed -> reset to 1
  const yest = new Date(Date.now() - 86400000); const yymd = ymd(yest);
  if (state.chestClaimedYMD === yymd) return Math.min(7, (state.chestDay || 0) + 1);
  if (state.chestClaimedYMD === '') return 1;
  return 1;
}
function claimChest() {
  const today = ymd();
  if (state.chestClaimedYMD === today) return;
  const day = chestDayForToday();
  const bp = state.battlePassUntil > Date.now() ? 2 : 1;
  const reward = CHEST_REWARDS[day - 1] * bp;
  state.coins += reward;
  state.chestDay = day;
  state.chestClaimedYMD = today;
  saveState();
  haptic('success');
  toast('+' + reward + ' 🪙');
  mp('chest_claim', { day, reward });
  renderEarn();
}

function countUp(el, from, to, durMs, fmt) {
  if (!el) return;
  const t0 = performance.now();
  function tick(now) {
    const p = clamp((now - t0) / durMs, 0, 1);
    const e = 1 - Math.pow(1 - p, 3);
    const v = from + (to - from) * e;
    el.textContent = fmt ? fmt(v) : String(v | 0);
    if (p < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function showFTUE() {
  const step = FTUE_STEPS[ftueIdx];

        step.draw(c2, dt);

      }
      loop();

    document.getElementById('ftue-skip').addEventListener('click', () => { state.ftueDone = true; saveState(); closeModal(); });
    document.getElementById('ftue-skip2')?.addEventListener('click', () => { state.ftueDone = true; saveState(); closeModal(); });

function ftueDrawStars(c, dt) {

/* ============== [JS-19A] FLAGSHIP FEATURES (lives, achievements, postcards, mascot, splash, world chests, daily, stats) ============== */

// ---------- LIVES ----------
function rolloverLivesIfNeeded() {
  // top up lives if 30min ticks have elapsed since livesRefillAt
  if (state.lives >= LIVES_MAX) { state.livesRefillAt = 0; return; }
  if (!state.livesRefillAt) { state.livesRefillAt = Date.now() + LIVES_REGEN_MS; return; }
  const now = Date.now();
  while (state.lives < LIVES_MAX && now >= state.livesRefillAt) {
    state.lives += 1;
    state.livesRefillAt = state.livesRefillAt + LIVES_REGEN_MS;
  }
  if (state.lives >= LIVES_MAX) state.livesRefillAt = 0;
}
function consumeLife() {
  rolloverLivesIfNeeded();
  if (state.lives <= 0) return false;
  state.lives -= 1;
  if (!state.livesRefillAt) state.livesRefillAt = Date.now() + LIVES_REGEN_MS;
  saveState(); renderHUD();
  return true;
}
function gainLife(n) {
  state.lives = Math.min(LIVES_MAX, (state.lives|0) + (n|0));
  if (state.lives >= LIVES_MAX) state.livesRefillAt = 0;
  saveState(); renderHUD();
}
function refillLivesWithStars() {
  // costs Stars via IAP; we'll route through a synthetic SKU
  if (state.stars >= LIVES_REFILL_COST) {
    // for now this is a soft purchase (use stars currency) — real version would call IAP
    // since "Stars" here means in-game ⭐ earned from levels, this is a free top-up via game stars (different from Telegram Stars purchase)
    // Telegram-Stars refill would be a SKU; we'll wire that separately
    toast(t('iap_unavail'));
  } else {
    toast(t('iap_unavail'));
  }
}

function formatLivesTimer() {
  rolloverLivesIfNeeded();
  if (state.lives >= LIVES_MAX) return '';
  if (!state.livesRefillAt) return '';
  const ms = state.livesRefillAt - Date.now();
  if (ms <= 0) return '';
  const m = Math.max(1, Math.ceil(ms / 60000));
  return m + 'm';
}

// ---------- ACHIEVEMENTS ----------
function checkAchievements() {
  let granted = 0;
  for (const ach of ACHIEVEMENTS) {
    const cur = state.achievements[ach.id] || {};
    if (cur.unlocked) continue;
    if (ach.check(state)) {
      cur.unlocked = true; cur.unlockedAt = Date.now();
      state.achievements[ach.id] = cur;
      granted += 1;
      showAchievementPopup(ach);
    }
  }
  if (granted) saveState();
}
function showAchievementPopup(ach) {

function ensurePostcard(id) {
  if (!state.postcards[id]) state.postcards[id] = { pieces: 0, complete: false, claimedAt: 0 };
  return state.postcards[id];
}
function awardMemoryPiece() {
  // find next incomplete postcard
  for (const pc of POSTCARDS) {
    const ps = ensurePostcard(pc.id);
    if (!ps.complete) {

      if (ps.pieces >= pc.pieces) {
        ps.complete = true; ps.claimedAt = Date.now();
        state.coins += 300;

// ---------- SPLASH ----------
function drawSplash() {
  const cv = document.getElementById('splash-canvas');
  if (!cv) return;
  const c = cv.getContext('2d'); const W = cv.width, H = cv.height;
  let t0 = performance.now();
  function loop() {
    if (!document.getElementById('splash') || document.getElementById('splash').classList.contains('gone')) return;
    const dt = (performance.now() - t0) / 1000;
    c.clearRect(0, 0, W, H);
    // 5 cards fanning out
    const ranks = [13, 1, 2, 11, 12];
    const suits = [0, 2, 1, 3, 0];
    for (let i = 0; i < 5; i++) {
      const ang = (-0.4 + i * 0.2) + Math.sin(dt * 0.8 + i) * 0.04;
      const dist = 90 + i * 4;
      const x = W/2 + Math.sin(ang) * dist;
      const y = H/2 + Math.cos(ang) * dist - dist * 0.4;
      c.save();
      c.translate(x, y); c.rotate(ang * 0.7 + Math.sin(dt + i) * 0.05);
      c.fillStyle='rgba(0,0,0,0.3)';
      drawRoundedRect(c, -33, -45, 70, 96, 10); c.fill();
      c.fillStyle='#fffcf2';
      drawRoundedRect(c, -35, -47, 70, 96, 10); c.fill();
      c.fillStyle = SUIT_COLOR[SUITS[suits[i]]];
      c.font='800 18px Inter, sans-serif'; c.textBaseline='top'; c.textAlign='left';
      c.fillText(RANK_LABEL[ranks[i]], -28, -42);
      c.font='800 36px Inter, sans-serif'; c.textAlign='center'; c.textBaseline='middle';
      c.fillText(SUITS[suits[i]], 0, 0);
      c.restore();
    }
    requestAnimationFrame(loop);
  }
  loop();
}
function dismissSplash() {
  const el = document.getElementById('splash');
  if (el) { el.classList.add('gone'); setTimeout(() => el.style.display = 'none', 500); }
  state.splashSeen = true; saveState();
  ensureAC(); // unlock audio on first tap
}

const coinRain = { canvas: null, ctx: null, particles: [], running: false };
function initCoinRain() {
  coinRain.canvas = document.getElementById('coin-rain');
  if (!coinRain.canvas) return;
  coinRain.ctx = coinRain.canvas.getContext('2d');
}
function startCoinRain(n) {
  if (!coinRain.canvas) return;
  const rect = coinRain.canvas.getBoundingClientRect();
  coinRain.canvas.width = rect.width * (window.devicePixelRatio || 1);
  coinRain.canvas.height = rect.height * (window.devicePixelRatio || 1);
  const ctxR = coinRain.ctx;
  ctxR.setTransform(window.devicePixelRatio||1, 0, 0, window.devicePixelRatio||1, 0, 0);
  coinRain.particles = [];
  for (let i = 0; i < (n || 25); i++) {
    coinRain.particles.push({ x: Math.random()*rect.width, y: -30 - Math.random()*200, vy: 2 + Math.random()*3, r: 8 + Math.random()*6, rot: Math.random()*Math.PI*2, vr: (Math.random()-0.5)*0.2, alive: true });
  }
  coinRain.running = true;
  requestAnimationFrame(tickCoinRain);
}
function tickCoinRain() {
  if (!coinRain.running) return;
  const ctxR = coinRain.ctx;
  const rect = coinRain.canvas.getBoundingClientRect();
  ctxR.clearRect(0, 0, rect.width, rect.height);
  let alive = 0;
  for (const p of coinRain.particles) {
    if (!p.alive) continue;
    p.y += p.vy; p.rot += p.vr; p.vy += 0.08;
    if (p.y > rect.height + 30) { p.alive = false; continue; }
    alive++;
    ctxR.save();
    ctxR.translate(p.x, p.y); ctxR.rotate(p.rot);
    ctxR.fillStyle = '#ffd166';
    ctxR.beginPath(); ctxR.ellipse(0, 0, p.r, p.r * 0.6 + 1, 0, 0, Math.PI*2); ctxR.fill();
    ctxR.strokeStyle = '#b97a1c'; ctxR.lineWidth = 1.2;
    ctxR.beginPath(); ctxR.ellipse(0, 0, p.r, p.r * 0.6 + 1, 0, 0, Math.PI*2); ctxR.stroke();
    ctxR.fillStyle = '#b97a1c';
    ctxR.font = 'bold ' + Math.floor(p.r*1.2) + 'px Inter, sans-serif';
    ctxR.textAlign='center'; ctxR.textBaseline='middle';
    ctxR.fillText('★', 0, 0);
    ctxR.restore();
  }
  if (alive > 0) requestAnimationFrame(tickCoinRain);
  else coinRain.running = false;
}

// ---------- DAILY CHALLENGE ----------
async function openDailyChallenge() {
  const today = ymd();
  if (state.dailyDoneYMD === today) { toast(t('daily_done')); return; }
  // pick a deterministic level + seed for everyone today
  let seed = 1;
  try { const r = await fetch('/api/daily-seed'); const j = await r.json(); seed = (j.seed >>> 0) || 1; } catch {}
  // pick a level 10..60 based on player progress
  const ceil = clamp(state.maxLevelUnlocked, 10, 60);
  const lid = 10 + (seed % Math.max(1, ceil - 9));
  startLevel(lid, { daily: true, seed });
}

// ---------- NEW IN-LEVEL BOOSTERS ----------
function usePeek() {
  if ((state.boosters.peek|0) <= 0) { toast(t('not_enough')); return; }
  state.boosters.peek -= 1; saveState();
  const next3 = game.stock.slice(-3).reverse();
  const labels = next3.map(c => RANK_LABEL[c.rank] + SUITS[c.suit]).join('  ');
  toast('👁 ' + (labels || '—'));
  haptic('impact');
  renderHUD();
}
function useHammer() {
  if ((state.boosters.hammer|0) <= 0) { toast(t('not_enough')); return; }
  // arm hammer to consume on next card tap
  game.armedBooster = 'hammer';
  toast(t('armed_tap_card'));
  renderBoosterRow();
}
function usePlus5() {
  if ((state.boosters.plus5|0) <= 0) { toast(t('not_enough')); return; }
  state.boosters.plus5 -= 1; saveState();
  // top up stock by 5 random cards
  for (let i = 0; i < 5; i++) {
    game.stock.push({ rank: 1 + Math.floor(Math.random() * 13), suit: Math.floor(Math.random()*4), wild: false });
  }
  toast('+5 📦');
  haptic('success');
  renderHUD();
}
function applyPreBoosters(pre) {
  if (!pre) return;
  if (pre.scissors) {
    const alive = game.cards.filter(c => !c.cleared && !c.faceDown);
    shuffle(alive, game.rng);
    for (let i = 0; i < 3 && i < alive.length; i++) {
      const c = alive[i]; c.cleared = true;
      spawnParticles(c.x, c.y, 8, '#ef476f');
    }
    setTimeout(revealCardsBeneath, 250);
  }
  if (pre.wildDrop) {
    for (let i = 0; i < 3; i++) {
      const idx = Math.floor(Math.random() * game.stock.length);
      if (game.stock[idx]) game.stock[idx].wild = true;
    }
  }
  if (pre.stockBoost) {
    for (let i = 0; i < 5; i++) {
      game.stock.push({ rank: 1 + Math.floor(Math.random() * 13), suit: Math.floor(Math.random()*4), wild: false });
    }
  }
}

// patch handleArmedBoosterOnCard for hammer
const _origHandleArmed = handleArmedBoosterOnCard;
handleArmedBoosterOnCard = function(c) {
  const b = game.armedBooster;
  if (b === 'hammer') {
    if ((state.boosters.hammer|0) <= 0) { armBooster(null); return; }
    state.boosters.hammer -= 1; saveState();
    c.cleared = true;
    spawnParticles(c.x, c.y, 18, '#ef476f');
    spawnScorePopup(c.x, c.y, '💥');
    armBooster(null);
    setTimeout(revealCardsBeneath, 200);
    renderHUD();
    haptic('heavy');
    return;
  }
  return _origHandleArmed(c);
};

// patch armBooster to handle the new instant boosters
const _origArmBooster = armBooster;
armBooster = function(name) {
  if (name === 'peek')    { usePeek(); return; }
  if (name === 'plus5')   { usePlus5(); return; }
  if (name === 'hammer')  {
    if ((state.boosters.hammer|0) <= 0) { toast(t('not_enough')); return; }
    useHammer(); return;
  }
  return _origArmBooster(name);
};

// patch finishLevel to consume lives + grant memory + check achievements + coin rain + best stats
const _origFinishLevel = finishLevel;
finishLevel = function(won) {
  if (game.finished) return;
  if (game.chain > (state.bestChain|0)) { state.bestChain = game.chain; }
  if (won) {
    if (game.memoryRevealed > 0) {
      for (let i = 0; i < game.memoryRevealed; i++) awardMemoryPiece();
    }
    if (game.score > (state.bestScore|0)) state.bestScore = game.score;
    state.totalCardsPlayed = (state.totalCardsPlayed|0) + (game.cards.filter(c=>c.cleared).length);
  } else {
    if (!game.dailyMode) consumeLife();
  }
  _origFinishLevel(won);
  if (won) {
    setTimeout(() => startCoinRain(20 + (game.score > (LEVELS.find(l=>l.id===game.levelId)||{}).gold ? 25 : 0)), 400);
    setTimeout(() => {
      checkAchievements();
      const lvl = LEVELS.find(l => l.id === game.levelId);
      if (lvl) {
        const w = WORLDS.find(x => game.levelId === x.range[1]);
        if (w) setTimeout(() => checkWorldComplete(w.id), 1500);
      }
    }, 600);
  }
  if (game.dailyMode) {
    const today = ymd();
    state.dailyBest[today] = Math.max(state.dailyBest[today]|0, game.score|0);
    state.dailyDoneYMD = today;
    saveState();
  }
};

// patch startLevel signature to accept options { pre, daily, seed }
const _origStartLevel = startLevel;
startLevel = function(id, opts) {
  opts = opts || {};

    rolloverLivesIfNeeded();
    if (state.lives <= 0) {
      toast(t('out_of_lives_t'));
      openOutOfLivesModal();
      return;
    }
    // consume a life on start (refunded if quit before play; simple model — consume on start, restore on win)
  }
  _origStartLevel(id);
  if (opts.daily && opts.seed) game.rng = mulberry32(opts.seed);
  game.dailyMode = !!opts.daily;
  if (opts.pre) applyPreBoosters(opts.pre);
  // hide map FAB
  document.getElementById('play-fab-wrap').style.display = 'none';

  if (mascot.el && state.totalGames < 3) {

  }

};

// patch tryPlayCard to track total cards played + chain trail
const _origTryPlayCard = tryPlayCard;
tryPlayCard = function(cardId) {
  const before = (game.cards.find(c => c.id === cardId) || {});
  const wasCleared = before.cleared;
  _origTryPlayCard(cardId);
  const after = (game.cards.find(c => c.id === cardId) || {});

// Replace renderMap with S-curve, single-world-at-a-time, world-chip switcher
renderMap = function() {
  const root = document.getElementById('map-scroller');
  if (!root) return;
  root.innerHTML = '';
  document.getElementById('map-title').textContent = t('quest_map');
  document.getElementById('map-sub').textContent = t('three_peaks_sub');

  // Active world: follow player's progress unless they switched explicitly.
  if (!state.activeWorld) {
    for (const w of WORLDS) {
      if (state.maxLevelUnlocked >= w.range[0] && state.maxLevelUnlocked <= w.range[1]) { state.activeWorld = w.id; break; }
    }
    if (!state.activeWorld) state.activeWorld = 1;
  }

  // Daily challenge pill
  const dp = document.createElement('div'); dp.className = 'daily-pill';
  const dailyDone = state.dailyDoneYMD === ymd();
  dp.innerHTML = '<div><h4>🗓 ' + t('daily_t') + '</h4><p>' + t('daily_s') + '</p></div>' +
    '<button>' + (dailyDone ? t('daily_done') : t('daily_play')) + '</button>';
  dp.querySelector('button').addEventListener('click', () => { if (!dailyDone) openDailyChallenge(); });
  root.appendChild(dp);

  // World chips switcher row
  const chips = document.createElement('div'); chips.className = 'world-chips';
  WORLDS.forEach((world, wi) => {
    const wEarned = WORLDS_starsEarned(world);
    const wTotal = (world.range[1] - world.range[0] + 1) * 3;
    const unlocked = world.id === 1 || (state.maxLevelUnlocked >= world.range[0] - 2);
    const chip = document.createElement('button');
    chip.className = 'world-chip' + (state.activeWorld === world.id ? ' on' : '') + (!unlocked ? ' locked' : '');
    chip.innerHTML = '<span class="wic">' + (unlocked ? world.icon : '🔒') + '</span><span>' + world.id + '</span><span class="ws">' + wEarned + '/' + wTotal + '</span>';
    if (unlocked) chip.addEventListener('click', () => { state.activeWorld = world.id; saveState(); renderMap(); });
    chips.appendChild(chip);
  });
  root.appendChild(chips);

  // Active world band
  const world = WORLDS.find(w => w.id === state.activeWorld) || WORLDS[0];
  const wEarned = WORLDS_starsEarned(world);
  const wTotal = (world.range[1] - world.range[0] + 1) * 3;
  const claimed = !!state.worldsClaimed[world.id];
  const unlocked = world.id === 1 || (state.maxLevelUnlocked >= world.range[0]);
  const band = document.createElement('div');
  band.className = 'world-band' + (unlocked ? '' : ' locked');
  band.style.background = 'linear-gradient(135deg, ' + world.sky[0] + ' 0%, ' + world.sky[1] + ' 100%)';
  band.innerHTML =
    '<div class="wb-icon">' + world.icon + '</div>' +
    '<div class="wb-text"><h3>' + t(['','world1_t','world2_t','world3_t','world4_t','world5_t'][world.id]) + '</h3><p>' + t(['','world1_s','world2_s','world3_s','world4_s','world5_s'][world.id]) + '</p></div>' +
    '<div class="wb-stars">⭐ ' + wEarned + '/' + wTotal + '</div>';
  root.appendChild(band);

  if (!unlocked) {
    const lm = document.createElement('div'); lm.className = 'world-meta';
    lm.innerHTML = '<strong>🔒 ' + t('locked') + '</strong><br/>' + t('unlock_at_stars', { n: world.range[0] - 1 });
    root.appendChild(lm);
    return;
  }

  // S-curve path
  const path = document.createElement('div'); path.className = 's-path';
  const N = world.range[1] - world.range[0] + 1;
  const SPACING = 110, PAD_TOP = 30;
  const AMP_VW = 0.28; // amplitude as fraction of path width
  const totalH = N * SPACING + (allLevelsBeaten(world) ? 110 : 0) + 70;
  path.style.height = totalH + 'px';
  // SVG dotted connector line
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.classList.add('s-path-svg');
  svg.setAttribute('viewBox', '0 0 100 ' + totalH);
  svg.setAttribute('preserveAspectRatio', 'none');
  let d = '';
  for (let i = 0; i < N; i++) {
    const y = PAD_TOP + i * SPACING;
    const x = 50 + Math.sin(i * 0.78) * AMP_VW * 100;
    d += (i === 0 ? 'M ' : 'L ') + x + ' ' + y + ' ';
  }
  if (allLevelsBeaten(world)) {
    const y = PAD_TOP + N * SPACING + 30;
    const x = 50 + Math.sin(N * 0.78) * AMP_VW * 100;
    d += 'L ' + x + ' ' + y + ' ';
  }
  const pathEl = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  pathEl.setAttribute('d', d);
  pathEl.setAttribute('fill', 'none');
  pathEl.setAttribute('stroke', 'rgba(255,255,255,0.22)');
  pathEl.setAttribute('stroke-width', '2');
  pathEl.setAttribute('stroke-dasharray', '6 6');
  pathEl.setAttribute('vector-effect', 'non-scaling-stroke');
  svg.appendChild(pathEl);
  path.appendChild(svg);

  // Level nodes
  for (let i = 0; i < N; i++) {
    const lid = world.range[0] + i;
    const lvl = LEVELS.find(L => L.id === lid);
    if (!lvl) continue;
    const stars = state.starsPerLevel[lvl.id] || 0;
    const lvlUnlocked = lvl.id <= state.maxLevelUnlocked;
    const isCurrent = lvlUnlocked && lvl.id === state.maxLevelUnlocked && stars < 3;
    const node = document.createElement('button');
    node.className = 's-node' + (lvlUnlocked ? '' : ' locked') + (isCurrent ? ' current' : '') + (lvl.boss ? ' boss' : '');
    const y = PAD_TOP + i * SPACING;
    const xPct = 50 + Math.sin(i * 0.78) * AMP_VW * 100;
    const halfW = lvl.boss ? 48 : 42;
    node.style.top = (y - halfW) + 'px';
    node.style.left = 'calc(' + xPct + '% - ' + halfW + 'px)';
    if (lvlUnlocked) {
      node.innerHTML = '<div class="nnum">' + lvl.id + (lvl.boss ? '👑' : '') + '</div><div class="nstars">' + ('★'.repeat(stars) + '☆'.repeat(3 - stars)) + '</div>';
      node.addEventListener('click', () => {
        state.level = lvl.id; saveState();
        openPreLevelModal(lvl.id);
      });
    } else {
      node.innerHTML = '<div class="lock">🔒</div>';
    }
    path.appendChild(node);
  }
  // World chest at the bottom of the S-path
  if (allLevelsBeaten(world)) {
    const chest = document.createElement('button');
    chest.className = 's-chest' + (claimed ? ' locked' : '');
    const y = PAD_TOP + N * SPACING + 30;
    const xPct = 50 + Math.sin(N * 0.78) * AMP_VW * 100;
    chest.style.top = (y - 48) + 'px';
    chest.style.left = 'calc(' + xPct + '% - 48px)';
    chest.innerHTML = '<div class="ci">' + (claimed ? '✓' : '🎁') + '</div><div>' + (claimed ? '' : t('world_open_chest')) + '</div>';
    if (!claimed) chest.addEventListener('click', () => openWorldChestModal(world));
    path.appendChild(chest);
  }
  root.appendChild(path);

  // bottom padding for tab bar + fab
  const more = document.createElement('div');
  more.style.cssText='text-align:center;padding:18px 12px 120px;color:var(--ink-dim);font-size:12px;';
  more.textContent = (world.id === WORLDS.length) ? t('coming_soon') : '';
  root.appendChild(more);

  // Auto-scroll to current level on first render
  setTimeout(() => {
    const cur = root.querySelector('.s-node.current') || root.querySelector('.s-node:not(.locked):last-child');
    if (cur && cur.scrollIntoView) cur.scrollIntoView({ block: 'center', behavior: 'smooth' });
  }, 50);
};
function WORLDS_starsEarned(world) {
  let s = 0;
  for (let id = world.range[0]; id <= world.range[1]; id++) s += (state.starsPerLevel[id]|0);
  return s;
}
function allLevelsBeaten(world) {
  for (let id = world.range[0]; id <= world.range[1]; id++) {
    if ((state.starsPerLevel[id]|0) < 1) return false;
  }
  return true;
}

  document.getElementById('btn-leave-play').addEventListener('click', openConfirmLeaveModal);
  document.getElementById('play-fab').addEventListener('click', () => openPreLevelModal(state.level || state.maxLevelUnlocked));
  document.querySelector('.pill.coin .add').addEventListener('click', (e) => { e.stopPropagation(); switchTab('shop'); });
  document.getElementById('hud-stars').addEventListener('click', () => switchTab('earn'));
  document.getElementById('hud-coins').addEventListener('click', () => switchTab('shop'));
  document.getElementById('hud-lives').addEventListener('click', () => {
    if (state.lives < LIVES_MAX) openOutOfLivesModal();
  });
}

async function boot() {
  initTelegram();
  initMascot();
  initCoinRain();
  if (state.splashSeen) {
    const sp = document.getElementById('splash');
    if (sp) { sp.classList.add('gone'); sp.style.display = 'none'; }
  } else {
    drawSplash();
  }
  rolloverLivesIfNeeded();
  await fetchFlags();
  applyLang();
  wireUI();
  layoutCanvas();
  renderHUD();
  renderMap();
  switchTab(state.activeTab || 'play');
  pollPurchases();
  pushHeartbeat();
  setInterval(pushHeartbeat, 60000);
  setInterval(pollPurchases, 45000);
  setInterval(() => { rolloverLivesIfNeeded(); renderHUD(); }, 30000);
  // splash dismiss
  document.getElementById('splash').addEventListener('click', () => {
    dismissSplash();
    if (!state.welcomed || !state.ftueDone) {
      state.welcomed = true; saveState();
      setTimeout(startFTUE, 350);
    }
  });
  // first life lock check
  checkAchievements();
  mp('app_open', { lang: state.settings.lang, version: VERSION, level: state.maxLevelUnlocked });
  flushMP();
  // i18n texts for static elements
  const sub = document.getElementById('splash-sub');
  if (sub) sub.textContent = t('splash_tap');
}

boot();
</script>
<!-- TG Data HQ engagement beacon — fires once per user/game per minute -->
<script>
(function(){
  try {
    var GAME_ID = 'solitaire_quest';
    var BOT_URL = 'https://tg-data-hq.onrender.com';
    var tg = window.Telegram && window.Telegram.WebApp;
    var u = tg && tg.initDataUnsafe && tg.initDataUnsafe.user;
    if (!u || !u.id) return;
    fetch(BOT_URL + '/api/event', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        game: GAME_ID,
        userId: String(u.id),
        username: u.username || ((u.first_name || '') + (u.last_name ? '_' + u.last_name : '')),
        event: 'open',
      }),
    }).catch(function(){});
  } catch (_e) {}
})();
</script>
