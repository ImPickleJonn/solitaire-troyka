<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"/>
<meta name="theme-color" content="#1a0b2e"/>
<title>Solitaire Quest</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
/* =========================================================
   Solitaire Quest — single-file styles
   ========================================================= */
:root{
  --bg-0:#1a0b2e;
  --bg-1:#2b1656;
  --bg-2:#3a1d6a;
  --accent:#ffd166;
  --accent-2:#ef476f;
  --accent-3:#06d6a0;
  --ink:#fff;
  --ink-soft:rgba(255,255,255,.72);
  --ink-dim:rgba(255,255,255,.45);
  --card-face:#fdfaf3;
  --card-back-a:#5a2ca0;
  --card-back-b:#2a0f5a;
  --tab-h:64px;
  --safe-top:0px;
  --safe-bottom:0px;
  --hud-h:56px;
  --bar-h:72px;
  --pill-bg:rgba(255,255,255,.08);
  --pill-bg-strong:rgba(255,255,255,.16);
  --shadow-1:0 4px 14px rgba(0,0,0,.35);
  --shadow-2:0 10px 30px rgba(0,0,0,.5);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
html,body{margin:0;padding:0;height:100%;overflow:hidden;background:var(--bg-0);color:var(--ink);font-family:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;-webkit-font-smoothing:antialiased;font-feature-settings:"tnum"}
body{overscroll-behavior:none;touch-action:manipulation}
button{font-family:inherit;color:inherit;background:none;border:0;cursor:pointer;padding:0;font-weight:600}
#app{
  position:fixed;inset:0;
  background:
    radial-gradient(120% 80% at 50% -10%, rgba(91,42,160,.95) 0%, rgba(42,15,90,.95) 40%, rgba(20,8,50,1) 80%),
    linear-gradient(180deg,#1a0b2e 0%, #0b0420 100%);
  padding-top:var(--safe-top);
  padding-bottom:calc(var(--safe-bottom) + var(--tab-h));
  display:flex;flex-direction:column;
}
/* sparkles bg */
#app::before{
  content:"";position:absolute;inset:0;pointer-events:none;
  background-image:
    radial-gradient(2px 2px at 10% 18%, rgba(255,255,255,.55), transparent 60%),
    radial-gradient(1.5px 1.5px at 80% 22%, rgba(255,209,102,.6), transparent 60%),
    radial-gradient(2px 2px at 25% 70%, rgba(255,255,255,.4), transparent 60%),
    radial-gradient(1px 1px at 70% 88%, rgba(6,214,160,.5), transparent 60%),
    radial-gradient(1.5px 1.5px at 50% 40%, rgba(255,255,255,.35), transparent 60%);
  opacity:.85;
  animation:twinkle 6s ease-in-out infinite;
}
@keyframes twinkle{0%,100%{opacity:.85}50%{opacity:.55}}

/* ---------- topbar ---------- */
.topbar{
  position:relative;z-index:5;
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px 6px;gap:8px;
}
.brand{display:flex;align-items:center;gap:6px;font-weight:800;font-size:14px;letter-spacing:.4px}
.brand .logo{
  width:28px;height:28px;border-radius:8px;
  background:linear-gradient(135deg,#ffd166,#ef476f);
  display:grid;place-items:center;font-size:16px;color:#1a0b2e;
  box-shadow:var(--shadow-1)
}
.hud{display:flex;align-items:center;gap:6px}
.pill{
  display:flex;align-items:center;gap:5px;
  background:var(--pill-bg);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(6px);
  border-radius:999px;
  padding:5px 10px;
  font-size:12px;font-weight:700;
}
.pill .ic{font-size:13px;line-height:1}
.pill.coin{color:#ffd166}
.pill.star{color:#fff}
.pill.streak{color:#ff7a59}
.pill button.add{
  width:18px;height:18px;border-radius:50%;
  background:var(--accent);color:#1a0b2e;
  font-size:13px;display:grid;place-items:center;margin-left:2px;
  font-weight:900
}
.icon-btn{
  width:34px;height:34px;border-radius:10px;
  background:var(--pill-bg);
  display:grid;place-items:center;font-size:16px;
  border:1px solid rgba(255,255,255,.08);
}
.icon-btn:active{transform:scale(.95)}

/* ---------- main + tabs ---------- */
main{flex:1;position:relative;overflow:hidden}
.tab-view{
  position:absolute;inset:0;
  display:none;
  overflow:hidden;
}
.tab-view.active{display:flex;flex-direction:column}

/* ---------- map screen ---------- */
#map-screen{
  flex:1;position:relative;
  overflow-y:auto;overflow-x:hidden;
  scrollbar-width:none;
}
#map-screen::-webkit-scrollbar{display:none}
#map-scroller{
  position:relative;
  padding:12px 0 32px;
}
.map-header{
  text-align:center;padding:14px 18px 6px;
}
.map-header h2{margin:0;font-size:20px;letter-spacing:.5px}
.map-header p{margin:4px 0 0;color:var(--ink-soft);font-size:12px}
.map-path{
  position:relative;width:100%;
}
.map-node{
  position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:88px;height:88px;margin:14px auto;
  border-radius:24px;
  background:linear-gradient(180deg, #ffd166 0%, #f59e3b 100%);
  color:#1a0b2e;box-shadow:0 6px 0 #b97a1c, 0 12px 24px rgba(0,0,0,.45);
  font-weight:900;
  transition:transform .15s ease;
}
.map-node:active{transform:translateY(2px);box-shadow:0 4px 0 #b97a1c, 0 8px 18px rgba(0,0,0,.45)}
.map-node.locked{
  background:linear-gradient(180deg,#3a2c5a,#28204a);
  color:#7b6ea0;box-shadow:0 4px 0 #1a1130, 0 6px 14px rgba(0,0,0,.4);
}
.map-node.current{
  animation:bob 1.4s ease-in-out infinite;
  outline:3px solid rgba(255,255,255,.6);outline-offset:3px;
}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.map-node .n-num{font-size:22px;line-height:1}
.map-node .n-stars{font-size:10px;margin-top:3px;letter-spacing:1px;opacity:.85}
.map-node .lock{font-size:24px}
.map-node[data-side="L"]{transform:translateX(-72px)}
.map-node[data-side="R"]{transform:translateX(72px)}
.map-node[data-side="L"]:active{transform:translateX(-72px) translateY(2px)}
.map-node[data-side="R"]:active{transform:translateX(72px) translateY(2px)}
.map-node[data-side="L"].current{transform:translateX(-72px)}
.map-node[data-side="R"].current{transform:translateX(72px)}
.map-line{
  position:absolute;left:50%;width:3px;background:rgba(255,255,255,.18);
  border-radius:2px;
}

/* play button at bottom of map */
#play-fab-wrap{
  position:fixed;left:0;right:0;
  bottom:calc(var(--safe-bottom) + var(--tab-h) + 14px);
  display:flex;justify-content:center;pointer-events:none;z-index:6;
}
#play-fab{
  pointer-events:auto;
  background:linear-gradient(135deg,#06d6a0,#0fb98a);
  color:#0a3320;
  padding:14px 28px;border-radius:999px;
  font-weight:900;font-size:16px;letter-spacing:.5px;
  box-shadow:0 6px 0 #057a55, 0 12px 24px rgba(0,0,0,.4);
  display:flex;align-items:center;gap:8px;
}
#play-fab:active{transform:translateY(2px);box-shadow:0 4px 0 #057a55, 0 8px 18px rgba(0,0,0,.4)}

/* ---------- play screen ---------- */
#play-screen{display:none;flex:1;flex-direction:column;position:relative}
#play-screen.active{display:flex}
#play-hud{
  height:var(--hud-h);min-height:var(--hud-h);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 12px;gap:8px;
}
#play-hud .stats{display:flex;align-items:center;gap:6px}
#play-hud .lvl-pill{
  background:linear-gradient(135deg,#ffd166,#ef476f);
  color:#1a0b2e;font-weight:900;padding:6px 10px;border-radius:10px;font-size:12px;letter-spacing:.6px
}
#play-hud .score{font-weight:900;font-size:20px}
#play-hud .target{font-size:11px;color:var(--ink-soft)}
.combo-bar-wrap{
  flex:1;height:8px;background:rgba(255,255,255,.08);border-radius:6px;overflow:hidden;
  margin:0 8px;position:relative;
}
.combo-bar{
  height:100%;width:0%;
  background:linear-gradient(90deg,#06d6a0,#ffd166,#ef476f);
  border-radius:6px;transition:width .25s ease;
}
.combo-tier{
  position:absolute;right:6px;top:50%;transform:translateY(-50%);
  font-size:10px;font-weight:900;letter-spacing:.4px
}
#game-canvas{
  flex:1;width:100%;display:block;
  background:transparent;
  touch-action:none;
}
#play-bar{
  height:var(--bar-h);min-height:var(--bar-h);
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 12px 14px;gap:10px;
  position:relative;
}
.booster-row{display:flex;gap:8px}
.booster{
  position:relative;
  width:48px;height:54px;border-radius:14px;
  background:var(--pill-bg-strong);
  border:1px solid rgba(255,255,255,.1);
  display:grid;place-items:center;font-size:24px;
  transition:transform .12s ease;
}
.booster:active{transform:scale(.92)}
.booster .count{
  position:absolute;right:-4px;top:-4px;
  min-width:18px;height:18px;border-radius:10px;
  background:var(--accent);color:#1a0b2e;
  font-size:10px;font-weight:900;display:grid;place-items:center;padding:0 4px;
}
.booster.empty{opacity:.55}
.booster.empty .count{background:rgba(255,255,255,.2);color:#fff}
.booster.armed{outline:3px solid var(--accent);outline-offset:2px;animation:pulseArm .8s ease-in-out infinite}
@keyframes pulseArm{0%,100%{box-shadow:0 0 0 0 rgba(255,209,102,.5)}50%{box-shadow:0 0 0 8px rgba(255,209,102,0)}}
.stock-pile{
  position:relative;width:80px;height:108px;
  display:grid;place-items:center;
}
.stock-card-back{
  position:absolute;width:64px;height:90px;border-radius:9px;
  background:linear-gradient(135deg,var(--card-back-a),var(--card-back-b));
  box-shadow:var(--shadow-1);
  border:2px solid rgba(255,255,255,.15);
}
.stock-card-back .pattern{
  position:absolute;inset:6px;border-radius:5px;
  border:1.5px dashed rgba(255,255,255,.2);
}
.stock-count{
  position:absolute;bottom:-6px;right:-6px;
  background:var(--accent);color:#1a0b2e;
  font-size:11px;font-weight:900;
  padding:2px 7px;border-radius:10px;
  box-shadow:var(--shadow-1);
}
.waste-pile{position:relative;width:64px;height:90px}
.combo-callout{
  position:absolute;left:50%;top:38%;
  transform:translate(-50%,-50%) scale(.4);opacity:0;
  font-weight:900;font-size:34px;letter-spacing:1px;
  text-shadow:0 4px 10px rgba(0,0,0,.6),0 0 16px rgba(255,209,102,.6);
  pointer-events:none;color:#ffd166;
  transition:transform .25s cubic-bezier(.18,1.6,.45,.95),opacity .25s ease;
}
.combo-callout.show{transform:translate(-50%,-50%) scale(1.15);opacity:1}

/* floating +score popups (canvas-rendered actually, but keep style for tooltip) */

/* ---------- bottom tabs ---------- */
.bottom-tabs{
  position:fixed;left:0;right:0;
  bottom:0;
  height:calc(var(--safe-bottom) + var(--tab-h));
  padding-bottom:var(--safe-bottom);
  display:flex;align-items:stretch;
  background:rgba(20,8,50,.92);
  backdrop-filter:blur(10px);
  border-top:1px solid rgba(255,255,255,.06);
  z-index:20;
}
.tab-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  color:var(--ink-dim);font-size:11px;font-weight:700;letter-spacing:.4px;
  transition:color .15s ease;
}
.tab-btn .ic{font-size:22px;line-height:1}
.tab-btn.active{color:var(--accent)}
.tab-btn.active .ic{filter:drop-shadow(0 0 6px rgba(255,209,102,.5))}

/* ---------- shop tab ---------- */
#view-shop{padding:0}
#shop-scroll{flex:1;overflow-y:auto;padding:8px 12px 20px}
#shop-scroll::-webkit-scrollbar{display:none}
.shop-section-title{font-size:13px;letter-spacing:1.2px;font-weight:800;color:var(--ink-soft);margin:14px 4px 8px;text-transform:uppercase}
.shop-featured{
  margin:6px 0 4px;border-radius:18px;
  background:linear-gradient(135deg,#ffd166 0%,#ef476f 100%);
  color:#1a0b2e;
  padding:14px;display:flex;gap:12px;align-items:center;
  box-shadow:var(--shadow-2);
}
.shop-featured .icon{font-size:42px}
.shop-featured h3{margin:0 0 4px;font-size:16px;font-weight:900}
.shop-featured .sub{font-size:12px;font-weight:600;opacity:.85}
.shop-featured .buy{
  margin-left:auto;background:#1a0b2e;color:#ffd166;
  border-radius:14px;padding:10px 14px;font-weight:900;font-size:13px;
  display:flex;align-items:center;gap:4px;
}
.shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.shop-card{
  background:var(--pill-bg);
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;
  padding:12px;display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;
  position:relative
}
.shop-card .ic{font-size:30px;margin-top:4px}
.shop-card h4{margin:2px 0 0;font-size:13px;font-weight:800}
.shop-card .sub{font-size:11px;color:var(--ink-soft);min-height:28px}
.shop-card .buy{
  margin-top:6px;background:var(--accent);color:#1a0b2e;
  border-radius:12px;padding:8px 0;font-weight:900;font-size:13px;width:100%;
}
.shop-card.owned .buy{background:rgba(255,255,255,.1);color:var(--ink-soft)}

/* ---------- earn tab ---------- */
#view-earn{padding:0}
#earn-scroll{flex:1;overflow-y:auto;padding:8px 12px 20px}
#earn-scroll::-webkit-scrollbar{display:none}
.bp-banner{
  margin:6px 0 8px;border-radius:14px;
  background:linear-gradient(135deg,#6a3df0,#a83af0);
  padding:12px;display:flex;justify-content:space-between;align-items:center;
  box-shadow:var(--shadow-1)
}
.bp-banner h4{margin:0;font-size:13px;font-weight:900}
.bp-banner .days{font-size:11px;opacity:.85}
.bp-banner button{background:#1a0b2e;color:#ffd166;border-radius:10px;padding:8px 12px;font-weight:900;font-size:12px}
.chest-card{
  background:var(--pill-bg);
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;padding:12px;margin-bottom:10px;
}
.chest-card h4{margin:0 0 8px;font-size:14px;font-weight:800}
.chest-row{display:flex;gap:6px;justify-content:space-between}
.chest-cell{
  flex:1;background:rgba(255,255,255,.04);border-radius:10px;
  padding:8px 4px;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  font-size:10px;font-weight:700;color:var(--ink-soft);
  border:1px solid transparent;
  position:relative
}
.chest-cell.claimed{background:rgba(6,214,160,.15);border-color:rgba(6,214,160,.4);color:#fff}
.chest-cell.today{background:rgba(255,209,102,.18);border-color:rgba(255,209,102,.6);color:#fff;animation:pulseChest 1.4s ease-in-out infinite}
@keyframes pulseChest{0%,100%{box-shadow:0 0 0 0 rgba(255,209,102,.5)}50%{box-shadow:0 0 0 6px rgba(255,209,102,0)}}
.chest-cell .ic{font-size:18px;margin-top:2px}
.chest-cell .rw{font-weight:900;color:#ffd166;font-size:11px}
.chest-claim{
  margin-top:10px;width:100%;background:var(--accent);color:#1a0b2e;
  border-radius:12px;padding:10px;font-weight:900;font-size:13px;
}
.chest-claim:disabled,.chest-claim.disabled{background:rgba(255,255,255,.1);color:var(--ink-dim)}
.mission{
  display:flex;align-items:center;gap:10px;
  background:var(--pill-bg);border:1px solid rgba(255,255,255,.06);
  border-radius:14px;padding:10px;margin-bottom:8px;
}
.mission .ic{font-size:24px}
.mission .body{flex:1}
.mission .body h5{margin:0;font-size:13px;font-weight:800}
.mission .body .sub{font-size:11px;color:var(--ink-soft);margin-top:2px}
.mission .reward{font-size:11px;color:#ffd166;font-weight:800;margin-top:2px}
.mission .btn{
  background:var(--accent);color:#1a0b2e;
  padding:8px 12px;border-radius:10px;font-weight:900;font-size:12px;
}
.mission .btn.check{background:#3a76ff;color:#fff}
.mission .btn.done{background:rgba(255,255,255,.1);color:var(--ink-dim)}
.lb-card{
  background:var(--pill-bg);border:1px solid rgba(255,255,255,.06);
  border-radius:14px;padding:10px 12px;margin-top:14px;
}
.lb-card h4{margin:0 0 8px;font-size:14px;font-weight:800}
.lb-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px}
.lb-row:last-child{border-bottom:0}
.lb-row .rank{width:22px;font-weight:900;color:var(--accent)}
.lb-row .name{flex:1}
.lb-row .pts{font-weight:800}
.lb-row.me{background:rgba(255,209,102,.1);border-radius:8px;padding:6px 8px}

/* ---------- modals ---------- */
#modal-root{position:fixed;inset:0;z-index:50;display:none;align-items:flex-end;justify-content:center;
  background:rgba(8,3,22,.6);backdrop-filter:blur(6px)}
#modal-root.open{display:flex}
.modal{
  width:100%;max-width:520px;margin:0 auto;
  background:linear-gradient(180deg,#2b1656 0%,#1a0b2e 100%);
  border-radius:24px 24px 0 0;
  border-top:1px solid rgba(255,255,255,.08);
  padding:18px 18px calc(18px + var(--safe-bottom));
  box-shadow:0 -10px 40px rgba(0,0,0,.6);
  animation:slideUp .25s ease;
  position:relative;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal h3{margin:0 0 6px;font-size:18px;font-weight:900;text-align:center}
.modal p{margin:4px 0;color:var(--ink-soft);font-size:13px;text-align:center}
.modal .x{position:absolute;right:12px;top:10px;width:32px;height:32px;border-radius:50%;background:var(--pill-bg);display:grid;place-items:center;font-size:16px}
.modal .cta-row{display:flex;gap:10px;margin-top:14px}
.modal .cta{
  flex:1;background:var(--accent);color:#1a0b2e;
  border-radius:14px;padding:14px;font-weight:900;font-size:15px;
}
.modal .cta.secondary{background:var(--pill-bg);color:var(--ink)}
.modal .cta.danger{background:var(--accent-2);color:#fff}

.stars-display{display:flex;gap:8px;justify-content:center;margin:12px 0}
.stars-display .st{font-size:36px;filter:grayscale(1);opacity:.4;transform:scale(.7)}
.stars-display .st.lit{filter:none;opacity:1;transform:scale(1);animation:starPop .4s ease}
@keyframes starPop{0%{transform:scale(.2) rotate(-30deg)}60%{transform:scale(1.3) rotate(10deg)}100%{transform:scale(1) rotate(0)}}
.reward-row{display:flex;gap:8px;justify-content:center;margin:10px 0}
.reward-chip{
  background:rgba(255,255,255,.08);border-radius:10px;padding:6px 10px;
  display:flex;align-items:center;gap:4px;font-size:13px;font-weight:800
}

/* FTUE coach mark */
.ftue-canvas-wrap{
  margin:14px auto;width:100%;max-width:280px;height:200px;
  background:rgba(0,0,0,.25);border-radius:14px;position:relative;overflow:hidden;
}
.ftue-dots{display:flex;gap:6px;justify-content:center;margin-top:8px}
.ftue-dots .d{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.25)}
.ftue-dots .d.on{background:var(--accent)}

/* settings */
.set-row{display:flex;align-items:center;justify-content:space-between;padding:10px 4px;border-bottom:1px solid rgba(255,255,255,.06)}
.set-row:last-child{border-bottom:0}
.set-row .lbl{font-size:14px}
.toggle{
  width:46px;height:26px;background:rgba(255,255,255,.15);border-radius:14px;position:relative;transition:background .2s
}
.toggle.on{background:var(--accent-3)}
.toggle .dot{position:absolute;top:3px;left:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:transform .2s}
.toggle.on .dot{transform:translateX(20px)}
.lang-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:6px}
.lang-cell{
  background:var(--pill-bg);border:1px solid rgba(255,255,255,.06);
  border-radius:10px;padding:8px;text-align:center;font-size:12px;font-weight:800
}
.lang-cell.on{background:var(--accent);color:#1a0b2e;border-color:transparent}

/* ---------- toasts ---------- */
#toast-root{position:fixed;left:0;right:0;top:calc(var(--safe-top) + 64px);z-index:60;display:flex;flex-direction:column;align-items:center;gap:6px;pointer-events:none}
.toast{
  background:rgba(20,8,50,.95);
  color:#fff;
  border:1px solid rgba(255,255,255,.1);
  border-radius:12px;
  padding:8px 14px;font-size:13px;font-weight:700;
  box-shadow:var(--shadow-1);
  animation:toastIn .25s ease, toastOut .3s ease 2.4s forwards;
  max-width:80%;text-align:center;

let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return JSON.parse(JSON.stringify(DEFAULT_STATE));
    const s = JSON.parse(raw);
    // shallow merge with defaults so new fields don't crash
    const merged = JSON.parse(JSON.stringify(DEFAULT_STATE));
    for (const k of Object.keys(s)) merged[k] = s[k];
    for (const k of Object.keys(DEFAULT_STATE.settings || {})) if (merged.settings[k] === undefined) merged.settings[k] = DEFAULT_STATE.settings[k];
    for (const k of Object.keys(DEFAULT_STATE.boosters || {})) if (merged.boosters[k] === undefined) merged.boosters[k] = DEFAULT_STATE.boosters[k];
    if (!merged.introsSeen) merged.introsSeen = {};
    return merged;
  } catch (e) { return JSON.parse(JSON.stringify(DEFAULT_STATE)); }
}
function saveState() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch {}

    if (TG.setHeaderColor) TG.setHeaderColor('#1a0b2e');
    if (TG.setBackgroundColor) TG.setBackgroundColor('#1a0b2e');
    const u = TG.initDataUnsafe?.user;
    if (u) {
      state.uid = String(u.id);
      state.handle = u.username || u.first_name || '';
      if (!state.settings.lang || state.settings.lang === 'en') {
        const lc = (u.language_code || '').slice(0,2).toLowerCase();
        if (SUPPORTED_LANGS.includes(lc)) state.settings.lang = lc;
      }
    }
    applyTelegramSafeArea();

}
function applyTelegramSafeArea() {
  let top = 0, bottom = 0;
  try {
    if (TG?.contentSafeAreaInset) { top = TG.contentSafeAreaInset.top|0; bottom = TG.contentSafeAreaInset.bottom|0; }
    if (!top && TG?.safeAreaInset) top = TG.safeAreaInset.top|0;
  } catch {}
  document.documentElement.style.setProperty('--safe-top', top + 'px');
  document.documentElement.style.setProperty('--safe-bottom', bottom + 'px');
}
function haptic(kind) {
  if (!state.settings.haptics) return;
  try {
    if (TG?.HapticFeedback) {
      if (kind === 'impact') TG.HapticFeedback.impactOccurred('light');
      else if (kind === 'heavy') TG.HapticFeedback.impactOccurred('medium');
      else if (kind === 'success') TG.HapticFeedback.notificationOccurred('success');
      else if (kind === 'warn') TG.HapticFeedback.notificationOccurred('warning');
      else if (kind === 'err') TG.HapticFeedback.notificationOccurred('error');
    }
  } catch {}
}

/* ============== [JS-05] PRNG + UTILS ============== */
function mulberry32(seed) {
  return function() {
    let t = (seed += 0x6D2B79F5) | 0;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function shuffle(arr, rng) {
  rng = rng || Math.random;
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
function clamp(v,a,b){ return v<a?a:v>b?b:v; }
function lerp(a,b,t){ return a+(b-a)*t; }
function easeOutCubic(t){ t = clamp(t,0,1); const f = 1 - t; return 1 - f*f*f; }
function easeOutBack(t){ const c = 1.70158; const f = t - 1; return 1 + (c+1)*f*f*f + c*f*f; }
function rand(a,b){ return a + Math.random()*(b-a); }

/* ============== [JS-07] CARD MODEL ============== */
const Card = {
  // rank: 1..13
  // suit: index 0..3
  // type: 'normal'|'locked'|'mult'|'treasure'|'memory'|'wild'
  isMatch(rankA, rankB) {
    if (!rankA || !rankB) return false;
    const d = Math.abs(rankA - rankB);
    return d === 1 || d === 12; // 12 = K(13) to A(1) wrap
  }
};

function computeBlockers(cards) {
  // For each card, find the cards that visually overlap it from below (next layer down toward camera).
  // A card B blocks A if B.layer > A.layer and |B.x - A.x| < threshold and B.y > A.y - tiny.
  // Lower layer (smaller number) = behind. Higher layer = in front.
  // We map "in front" cards as blockers.
  const px = (CARD_W * 0.62) / 1000; // approx fraction of cards considered overlapping; updated per render
  for (const c of cards) c.blockers = [];
  for (let i = 0; i < cards.length; i++) {
    const a = cards[i];
    for (let j = 0; j < cards.length; j++) {
      if (i === j) continue;
      const b = cards[j];
      if (b.layer <= a.layer) continue;
      // proximity threshold tuned for normalized coords (we use a generous 0.07)
      if (Math.abs(b.x - a.x) < 0.075 && b.y - a.y >= 0 && b.y - a.y < 0.16) {
        a.blockers.push(b.id);
      }
    }
  }
}

function isPlayable(card, game) {
  if (card.cleared) return false;
  if (card.faceDown) return false;
  if (card.type === 'locked' && card.lockCount > 0) return false;
  // playable when all blockers are cleared
  for (const bid of card.blockers) {
    const b = game.cards.find(c => c.id === bid);
    if (b && !b.cleared) return false;
  }
  return true;
}

/* ============== [JS-08] GAME ENGINE ============== */
const game = {
  active: false,
  levelId: 1,
  cards: [],
  waste: null,
  stock: [],
  drawnCount: 0,
  score: 0,
  chain: 0,
  multTier: 0,
  rng: Math.random,
  startedAt: 0,
  finished: false,
  won: false,
  history: [], // {cardId, prevWaste, prevChain, prevScore}
  fxLayer: [],
  particles: [],
  scorePopups: [],
  armedBooster: null,
  collectedTreasures: 0,
  memoryRevealed: 0,
  introsShownThisRun: {}
};

function startLevel(id) {
  const def = LEVELS.find(l => l.id === id);
  if (!def) { toast(t('coming_soon')); return; }
  if (id > state.maxLevelUnlocked) { toast(t('locked')); return; }
  game.active = true;
  game.finished = false;
  game.won = false;
  game.levelId = id;
  game.score = 0;
  game.chain = 0;
  game.multTier = 0;
  game.armedBooster = null;
  game.collectedTreasures = 0;
  game.memoryRevealed = 0;
  game.introsShownThisRun = {};
  game.history = [];
  game.fxLayer = [];
  game.particles = [];
  game.scorePopups = [];
  game.startedAt = Date.now();

  // RNG: deterministic per-level so the run is reproducible per attempt session (changes on each retry though)
  game.rng = mulberry32((id * 9311 + Date.now() & 0xffffffff) >>> 0);

  // build cards
  const positions = LAYOUTS[def.layout]({});
  // assign ranks/suits: use full deck then top up if more positions
  const deck = [];
  for (let s = 0; s < 4; s++) for (let r = 1; r <= 13; r++) deck.push({ rank: r, suit: s });
  shuffle(deck, game.rng);
  while (deck.length < positions.length + def.stock + 6) {
    for (let s = 0; s < 4; s++) for (let r = 1; r <= 13; r++) deck.push({ rank: r, suit: s });
  }
  let cursor = 0;

  game.cards = positions.map(p => {
    const d = deck[cursor++];
    return {
      id: p.id,
      x: p.x, y: p.y, layer: p.layer,
      rank: d.rank, suit: d.suit,
      faceDown: !!p.faceDown,
      cleared: false,
      type: 'normal',
      lockCount: 0, multValue: 1,
      anim: null
    };
  });

  // apply modifiers (locked / mult / treasure / memory positions)
  const mods = def.mods || {};
  const facingUp = game.cards.filter(c => !c.faceDown).map(c => c.id);
  const facingDown = game.cards.filter(c => c.faceDown).map(c => c.id);
  const shuffledUp = facingUp.slice(); shuffle(shuffledUp, game.rng);
  const shuffledDown = facingDown.slice(); shuffle(shuffledDown, game.rng);
  let upCur = 0, dnCur = 0;
  const takeUp = () => game.cards.find(c => c.id === shuffledUp[upCur++]);
  const takeDown = () => game.cards.find(c => c.id === shuffledDown[dnCur++]);

  if (mods.lockCount) {
    for (let i = 0; i < mods.lockCount && i < shuffledUp.length; i++) {
      const c = takeUp(); if (!c) break;
      c.type = 'locked'; c.lockCount = 2;
    }
  }
  if (mods.multCount) {
    for (let i = 0; i < mods.multCount && upCur < shuffledUp.length; i++) {
      const c = takeUp(); if (!c) break;
      c.type = 'mult'; c.multValue = 2;
    }
  }
  if (mods.treasureCount) {
    for (let i = 0; i < mods.treasureCount && upCur < shuffledUp.length; i++) {
      const c = takeUp(); if (!c) break;
      c.type = 'treasure';
    }
  }
  if (mods.memoryPieces) {
    for (let i = 0; i < mods.memoryPieces && dnCur < shuffledDown.length; i++) {
      const c = takeDown(); if (!c) break;
      c.type = 'memory';
    }
  }

  computeBlockers(game.cards);

  // stock
  game.stock = [];
  for (let i = 0; i < def.stock; i++) {
    const d = deck[cursor++] || { rank: 1 + ((Math.random()*13)|0), suit: 0 };
    game.stock.push({ rank: d.rank, suit: d.suit, wild: false });
  }
  if (mods.wildStock) {
    const idx = [];
    for (let i = 0; i < game.stock.length; i++) idx.push(i);
    shuffle(idx, game.rng);
    for (let i = 0; i < mods.wildStock && i < idx.length; i++) game.stock[idx[i]].wild = true;
  }
  // initial waste = first stock pop
  game.waste = game.stock.pop() || { rank: 7, suit: 0 };
  game.drawnCount = 1;

  // intro popup for new mechanic
  const intro = def.intro;
  if (intro && !state.introsSeen[intro]) {
    state.introsSeen[intro] = true; saveState();
    game.introsShownThisRun[intro] = true;
  }

  showPlayScreen();
  layoutCanvas();
  renderHUD();
  mp('level_start', { level: id, layout: def.layout, par: def.par });
  if (intro && game.introsShownThisRun[intro]) {
    setTimeout(() => toast(t('intro_' + intro)), 350);
  }
}

function tryPlayCard(cardId) {
  const c = game.cards.find(x => x.id === cardId);
  if (!c || c.cleared) return;
  if (game.armedBooster) {
    handleArmedBoosterOnCard(c);
    return;
  }
  if (!isPlayable(c, game)) {
    haptic('warn');
    flashCard(c, '#ef476f');
    return;
  }
  if (!Card.isMatch(c.rank, game.waste.rank) && !game.waste.wild && !c.wild) {
    haptic('warn');
    flashCard(c, '#ef476f');
    return;
  }
  // PLAY
  const prevWaste = { ...game.waste };
  const prevChain = game.chain;
  const prevScore = game.score;
  const prevType = c.type;
  game.history.push({ cardId: c.id, prevWaste, prevChain, prevScore, prevType, prevMult: c.multValue, prevLock: c.lockCount });
  if (game.history.length > 20) game.history.shift();

  c.cleared = true;
  // animate to waste
  c.anim = { kind:'toWaste', t:0, dur:280, fromX:c.x, fromY:c.y };
  game.waste = { rank: c.rank, suit: c.suit, wild: !!c.wild };

  game.chain += 1;
  const tier = currentComboTier(game.chain);
  game.multTier = tier;
  const base = 50;
  const multScore = base * COMBO_TIERS[tier].mult * (c.multValue || 1);
  game.score += multScore;
  spawnScorePopup(c.x, c.y, '+' + multScore + (c.multValue > 1 ? ' x' + c.multValue : ''));

  if (c.type === 'treasure') {
    state.coins += 30;
    spawnParticles(c.x, c.y, 14, '#ffd166');
    spawnScorePopup(c.x, c.y - 0.04, '+30 🪙');
    saveState();
  }
  if (c.type === 'memory') {
    state.memoryPieces += 1;
    game.memoryRevealed += 1;
    spawnParticles(c.x, c.y, 18, '#a83af0');
    saveState();
  }
  if (c.type === 'mult') {
    spawnParticles(c.x, c.y, 16, '#ffd166');
  }

  spawnParticles(c.x, c.y, 8, '#fff');
  haptic('impact');
  beepMatch(game.chain);

  // unlock revealed cards beneath
  setTimeout(revealCardsBeneath, 260);

  // chain-of-5 mission
  if (game.chain === 5) state.totalChains5 += 1, saveState();

  // combo tier callout
  if (tier > game.multTier - 1 && tier > 0) {
    showComboCallout(tier);
  }
  renderHUD();
  checkWin();
}

function handleArmedBoosterOnCard(c) {
  const b = game.armedBooster;
  if (b === 'wild') {
    if (state.boosters.wild <= 0) { armBooster(null); return; }
    // turn waste into wild matching this card
    game.waste = { rank: c.rank, suit: c.suit, wild: true };
    state.boosters.wild -= 1; saveState();
    spawnParticles(0.5, 0.6, 24, '#ffd166');
    armBooster(null);
    renderHUD();
  } else {
    armBooster(null);
  }
}

function revealCardsBeneath() {
  // any face-down card whose blockers are all cleared becomes face-up + flips
  const reveals = [];
  for (const c of game.cards) {
    if (c.cleared) continue;
    if (!c.faceDown) continue;
    let ok = true;
    for (const bid of c.blockers) {
      const b = game.cards.find(x => x.id === bid);
      if (b && !b.cleared) { ok = false; break; }
    }
    if (ok) reveals.push(c);
  }
  reveals.forEach(c => {
    c.faceDown = false;
    c.anim = { kind:'flip', t: 0, dur: 280 };
    // decrement lock count on neighbors if newly revealed
  });
  // also, every match: decrement lockCount of neighboring locked cards
  // (treated as a generic effect — neighbors are blockers' parents or siblings of just-cleared)
  for (const c of game.cards) {
    if (c.cleared || c.type !== 'locked' || c.lockCount <= 0) continue;
    // count cleared neighbors among blockers + siblings within 0.12 x and 0.12 y
    let neighborsClearedNow = 0;
    for (const o of game.cards) {
      if (o === c) continue;
      if (!o.cleared) continue;
      if (Math.abs(o.x - c.x) < 0.13 && Math.abs(o.y - c.y) < 0.14) {
        if (o._lockTickedFor && o._lockTickedFor.has && o._lockTickedFor.has(c.id)) continue;
        neighborsClearedNow += 1;
        if (!o._lockTickedFor) o._lockTickedFor = new Set();
        o._lockTickedFor.add(c.id);
      }
    }
    if (neighborsClearedNow > 0) {
      c.lockCount = Math.max(0, c.lockCount - neighborsClearedNow);
      if (c.lockCount === 0) {
        spawnParticles(c.x, c.y, 12, '#ffd166');
      }
    }
  }
}

function drawFromStock() {
  if (game.stock.length === 0) {
    toast(t('no_match'));
    return;
  }
  if (game.chain > 0) flashComboBreak();
  game.chain = 0;
  game.multTier = 0;
  game.history.push({ kind:'draw', prevWaste: { ...game.waste }, prevChain: game.chain, prevScore: game.score });
  if (game.history.length > 20) game.history.shift();
  game.waste = game.stock.pop();
  game.drawnCount += 1;
  haptic('impact');
  beepDraw();
  renderHUD();
  checkWin();
}

function currentComboTier(chain) {
  let tier = 0;
  for (let i = COMBO_TIERS.length - 1; i >= 0; i--) {
    if (chain >= COMBO_TIERS[i].chain) { tier = i; break; }
  }
  return tier;
}

function undo() {
  if (state.boosters.undo <= 0) { toast(t('not_enough')); return; }
  if (!game.history.length) { toast(t('no_undo')); return; }
  const h = game.history.pop();
  if (h.kind === 'draw') {
    game.stock.push(game.waste);
    game.waste = h.prevWaste;
    game.chain = h.prevChain;
    game.score = h.prevScore;
  } else {
    const c = game.cards.find(x => x.id === h.cardId);
    if (c) {
      c.cleared = false;
      c.type = h.prevType || c.type;
      c.multValue = h.prevMult || c.multValue;
      c.lockCount = (h.prevLock != null) ? h.prevLock : c.lockCount;
    }
    game.waste = h.prevWaste;
    game.chain = h.prevChain;
    game.score = h.prevScore;
    if (h.kind === 'draw' || h.prevType === 'treasure') {
      // refund treasure coins if undo'd (simple)
    }
  }
  state.boosters.undo -= 1;
  saveState();
  game.multTier = currentComboTier(game.chain);
  computeBlockers(game.cards);
  renderHUD();
  haptic('impact');
}

function shuffleBoard() {
  if (state.boosters.shuffle <= 0) { toast(t('not_enough')); return; }
  // shuffle face-up, non-cleared cards' ranks/suits among themselves
  const live = game.cards.filter(c => !c.cleared && !c.faceDown);
  const ranks = live.map(c => ({ rank:c.rank, suit:c.suit }));
  shuffle(ranks, game.rng);
  live.forEach((c, i) => { c.rank = ranks[i].rank; c.suit = ranks[i].suit; c.anim = { kind:'shuffle', t:0, dur: 360 }; });
  state.boosters.shuffle -= 1;
  saveState();
  spawnParticles(0.5, 0.5, 30, '#06d6a0');
  haptic('success');
  beepShuffle();
  renderHUD();
}

function checkWin() {
  const remaining = game.cards.filter(c => !c.cleared);
  if (remaining.length === 0) {
    finishLevel(true);
    return;
  }
  // lose: stock empty AND no legal moves
  if (game.stock.length === 0) {
    const playable = remaining.filter(c => isPlayable(c, game) && (Card.isMatch(c.rank, game.waste.rank) || game.waste.wild || c.wild));
    if (playable.length === 0) {
      finishLevel(false);
    }
  }
}

function finishLevel(won) {
  if (game.finished) return;
  game.finished = true;
  game.won = won;
  const def = LEVELS.find(l => l.id === game.levelId);
  let stars = 0;
  if (won) {
    // stock-leftover bonus
    const leftover = game.stock.length * 50;
    game.score += leftover;
    spawnScorePopup(0.5, 0.5, '+' + leftover + ' ' + t('stock_left'));
    // star tiers
    if (game.score >= def.perfect) stars = 3;
    else if (game.score >= def.gold) stars = 2;
    else stars = 1;
    const prev = state.starsPerLevel[game.levelId] || 0;
    if (stars > prev) state.starsPerLevel[game.levelId] = stars;
    state.stars = Object.values(state.starsPerLevel).reduce((a,b)=>a+b,0);
    state.bestScorePerLevel[game.levelId] = Math.max(state.bestScorePerLevel[game.levelId] || 0, game.score);
    state.maxLevelUnlocked = Math.max(state.maxLevelUnlocked, game.levelId + 1);
    state.coins += 50 + stars * 30 + (state.battlePassUntil > Date.now() ? 30 : 0);
    bumpStreakOnWin();
    state.totalGames += 1;
    state.gamesPlayedToday = (state.gamesPlayedYMD === ymd()) ? (state.gamesPlayedToday + 1) : 1;
    state.gamesPlayedYMD = ymd();
    saveState();
    mp('level_complete', { level: game.levelId, score: game.score, stars, chain_best: game.chain });
    spawnConfetti();
    setTimeout(() => openLevelCompleteModal(stars), 700);
  } else {
    saveState();
    mp('level_failed', { level: game.levelId, score: game.score });
    setTimeout(() => openLevelFailedModal(), 500);
  }
  pushHeartbeat();
  submitLeaderboard();
}

function bumpStreakOnWin() {
  const today = ymd();
  if (state.lastPlayedYMD === today) return;
  const y = new Date(); y.setUTCDate(y.getUTCDate()-1);
  if (state.lastPlayedYMD === ymd(y) || !state.lastPlayedYMD) {
    state.streak = (state.streak || 0) + 1;
  } else if (state.shieldUntil > Date.now()) {
    state.streak = state.streak; // shielded
  } else {
    state.streak = 1;
  }
  state.lastPlayedYMD = today;
}

/* ============== [JS-09] BOOSTERS UI ============== */
function armBooster(name) {
  if (name && state.boosters[name] <= 0) { toast(t('not_enough')); return; }
  if (name === 'shuffle') { shuffleBoard(); return; }
  if (name === 'undo')    { undo(); return; }
  game.armedBooster = (game.armedBooster === name) ? null : name;
  renderBoosterRow();
  if (game.armedBooster === 'wild') toast(t('armed_tap_card'));
}

function renderBoosterRow() {
  const row = document.getElementById('booster-row');
  if (!row) return;
  row.innerHTML = '';
  BOOSTER_LIST.forEach(name => {
    const n = state.boosters[name] | 0;
    const b = document.createElement('button');
    b.className = 'booster' + (n <= 0 ? ' empty' : '') + (game.armedBooster === name ? ' armed' : '');
    b.innerHTML = BOOSTER_ICON[name] + '<span class="count">' + n + '</span>';
    b.addEventListener('click', (ev) => { ev.stopPropagation(); armBooster(name); });
    row.appendChild(b);
  });
}

/* ============== [JS-10] RENDER (CANVAS) ============== */
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
let dpr = window.devicePixelRatio || 1;
let cssW = 0, cssH = 0;
let originX = 0, originY = 0, playW = 0, playH = 0;
function layoutCanvas() {
  const rect = canvas.getBoundingClientRect();
  dpr = window.devicePixelRatio || 1;
  cssW = rect.width; cssH = rect.height;
  canvas.width = Math.floor(cssW * dpr);
  canvas.height = Math.floor(cssH * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  // play surface coords: pad 16px each side, top, leaves space at bottom for waste
  const padX = 12, padTop = 8, padBottom = 4;
  originX = padX;
  originY = padTop;
  playW = cssW - padX * 2;
  playH = cssH - padTop - padBottom;
}
window.addEventListener('resize', () => { layoutCanvas(); });

function normToScreen(nx, ny) {
  return { x: originX + nx * playW, y: originY + ny * playH };
}

function drawBg() {
  // table felt
  const grad = ctx.createLinearGradient(0, 0, 0, cssH);
  grad.addColorStop(0, 'rgba(255,255,255,0.02)');
  grad.addColorStop(1, 'rgba(0,0,0,0.20)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, cssW, cssH);
}

function drawRoundedRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x + r, y);
  c.lineTo(x + w - r, y);
  c.quadraticCurveTo(x + w, y, x + w, y + r);
  c.lineTo(x + w, y + h - r);
  c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  c.lineTo(x + r, y + h);
  c.quadraticCurveTo(x, y + h, x, y + h - r);
  c.lineTo(x, y + r);
  c.quadraticCurveTo(x, y, x + r, y);
  c.closePath();
}

function drawCardFace(c, x, y, w, h, card, scaleX) {
  scaleX = (scaleX == null) ? 1 : scaleX;
  c.save();
  c.translate(x + w/2, y + h/2);
  c.scale(scaleX, 1);
  c.translate(-w/2, -h/2);
  // shadow
  c.fillStyle = 'rgba(0,0,0,0.35)';
  drawRoundedRect(c, 1, 3, w, h, CARD_R); c.fill();
  // face
  const grad = c.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, '#fffcf2');
  grad.addColorStop(1, '#e9e1c4');
  c.fillStyle = grad;
  drawRoundedRect(c, 0, 0, w, h, CARD_R); c.fill();
  // inner border
  c.strokeStyle = 'rgba(0,0,0,0.10)';
  c.lineWidth = 1;
  drawRoundedRect(c, 1, 1, w-2, h-2, CARD_R-1); c.stroke();
  // rank+suit corners
  const rank = RANK_LABEL[card.rank];
  const suit = SUITS[card.suit % 4];
  c.fillStyle = SUIT_COLOR[suit];
  c.font = '700 ' + Math.floor(h*0.20) + 'px Inter, system-ui, sans-serif';
  c.textBaseline = 'top';
  c.textAlign = 'left';
  c.fillText(rank, 5, 4);
  c.font = '700 ' + Math.floor(h*0.16) + 'px Inter, system-ui, sans-serif';
  c.fillText(suit, 6, 4 + Math.floor(h*0.22));
  // big center suit
  c.font = '700 ' + Math.floor(h*0.45) + 'px Inter, system-ui, sans-serif';
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillText(suit, w/2, h/2 + 4);
  // bottom-right rank rotated
  c.save();
  c.translate(w - 5, h - 4);
  c.rotate(Math.PI);
  c.font = '700 ' + Math.floor(h*0.20) + 'px Inter, system-ui, sans-serif';
  c.textBaseline = 'top';
  c.textAlign = 'left';
  c.fillText(rank, 0, 0);
  c.restore();
  // overlays for types
  if (card.type === 'mult') {
    c.strokeStyle = '#ffd166'; c.lineWidth = 3;
    drawRoundedRect(c, 1.5, 1.5, w-3, h-3, CARD_R-1); c.stroke();
    c.fillStyle = '#ffd166';
    c.fillRect(w/2 - 12, h - 18, 24, 14);
    c.fillStyle = '#1a0b2e';
    c.font = '900 11px Inter, sans-serif'; c.textAlign='center'; c.textBaseline='middle';
    c.fillText('x' + (card.multValue || 2), w/2, h - 11);
  }
  if (card.type === 'treasure') {
    c.fillStyle = 'rgba(255,209,102,0.92)';
    c.beginPath(); c.arc(w/2, h*0.35, h*0.18, 0, Math.PI*2); c.fill();
    c.fillStyle = '#1a0b2e';
    c.font = '900 ' + Math.floor(h*0.18) + 'px Inter, sans-serif';
    c.textAlign='center'; c.textBaseline='middle';
    c.fillText('🪙', w/2, h*0.35);
  }
  if (card.type === 'memory') {
    c.fillStyle = 'rgba(168,58,240,0.6)';
    drawRoundedRect(c, 0, 0, w, h, CARD_R); c.fill();
    c.fillStyle = '#fff';
    c.font = '900 ' + Math.floor(h*0.30) + 'px Inter, sans-serif';
    c.textAlign='center'; c.textBaseline='middle';
    c.fillText('?', w/2, h/2);
  }
  if (card.type === 'locked' && card.lockCount > 0) {
    c.fillStyle = 'rgba(0,0,0,0.6)';
    drawRoundedRect(c, 0, 0, w, h, CARD_R); c.fill();
    c.fillStyle = '#fff';
    c.font = '900 ' + Math.floor(h*0.36) + 'px Inter, sans-serif';
    c.textAlign='center'; c.textBaseline='middle';
    c.fillText('🔒', w/2, h/2 - 4);
    c.font = '900 11px Inter, sans-serif';
    c.fillText(String(card.lockCount), w/2, h - 12);
  }
  if (card.wild) {
    const wg = c.createLinearGradient(0, 0, w, h);
    wg.addColorStop(0, 'rgba(239,71,111,0.4)');
    wg.addColorStop(0.5, 'rgba(255,209,102,0.4)');
    wg.addColorStop(1, 'rgba(6,214,160,0.4)');
    c.fillStyle = wg;
    drawRoundedRect(c, 0, 0, w, h, CARD_R); c.fill();
    c.fillStyle = '#fff';
    c.font='900 ' + Math.floor(h*0.4)+'px Inter, sans-serif'; c.textAlign='center'; c.textBaseline='middle';
    c.fillText('🃏', w/2, h/2);
  }
  c.restore();
}

function drawCardBack(c, x, y, w, h, scaleX) {
  scaleX = (scaleX == null) ? 1 : scaleX;
  c.save();
  c.translate(x + w/2, y + h/2);
  c.scale(scaleX, 1);
  c.translate(-w/2, -h/2);
  // shadow
  c.fillStyle = 'rgba(0,0,0,0.35)';
  drawRoundedRect(c, 1, 3, w, h, CARD_R); c.fill();
  // back
  const grad = c.createLinearGradient(0, 0, w, h);
  grad.addColorStop(0, '#6a3df0');
  grad.addColorStop(1, '#2a0f5a');
  c.fillStyle = grad;
  drawRoundedRect(c, 0, 0, w, h, CARD_R); c.fill();
  c.strokeStyle = 'rgba(255,255,255,0.25)';
  c.setLineDash([4,3]); c.lineWidth = 1.5;
  drawRoundedRect(c, 4, 4, w-8, h-8, CARD_R-2); c.stroke();
  c.setLineDash([]);
  c.fillStyle = 'rgba(255,209,102,0.85)';
  c.font = '700 ' + Math.floor(h*0.36) + 'px Inter, sans-serif';
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillText('♛', w/2, h/2);
  c.restore();
}

function drawCards() {
  // sort by layer then y so deeper cards render first
  const sorted = game.cards.slice().sort((a,b) => (a.layer - b.layer) || (a.y - b.y));
  for (const card of sorted) {
    if (card.cleared && !card.anim) continue;
    let nx = card.x, ny = card.y;
    let scaleX = 1;
    if (card.anim) {
      card.anim.t += 16;
      const p = clamp(card.anim.t / card.anim.dur, 0, 1);
      if (card.anim.kind === 'toWaste') {
        const target = { x: wastePileNorm().x, y: wastePileNorm().y };
        const e = easeOutCubic(p);
        nx = lerp(card.anim.fromX, target.x, e);
        ny = lerp(card.anim.fromY, target.y, e);
        if (p >= 1) { card.anim = null; }
      } else if (card.anim.kind === 'flip') {
        const e = p;
        const s = Math.abs(Math.cos(e * Math.PI));
        scaleX = Math.max(0.06, s);
        if (p >= 1) card.anim = null;
      } else if (card.anim.kind === 'shuffle') {
        const e = easeOutBack(p);
        ny = card.y - (1 - e) * 0.05;
        if (p >= 1) card.anim = null;
      }
    }
    if (card.cleared && !card.anim) continue;
    const pos = normToScreen(nx, ny);
    const x = pos.x - CARD_W/2;
    const y = pos.y - CARD_H/2;
    const showFace = !card.faceDown || (card.anim && card.anim.kind === 'flip' && card.anim.t > card.anim.dur*0.5);
    if (showFace) drawCardFace(ctx, x, y, CARD_W, CARD_H, card, scaleX);
    else drawCardBack(ctx, x, y, CARD_W, CARD_H, scaleX);
    // playable highlight
    if (!card.faceDown && !card.cleared && isPlayable(card, game) && (Card.isMatch(card.rank, game.waste.rank) || game.waste.wild)) {
      ctx.save();
      ctx.strokeStyle = 'rgba(6,214,160,0.85)';
      ctx.lineWidth = 2.5;
      drawRoundedRect(ctx, x - 1, y - 1, CARD_W + 2, CARD_H + 2, CARD_R + 1);
      ctx.stroke();
      ctx.restore();
    }
  }
}

function drawParticles() {
  const next = [];
  for (const p of game.particles) {
    p.t += 1;
    if (p.t > p.life) continue;
    const k = p.t / p.life;
    const pos = normToScreen(p.x, p.y);
    ctx.save();
    ctx.globalAlpha = 1 - k;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(pos.x + p.vx * p.t, pos.y + p.vy * p.t + 0.5 * 0.05 * p.t * p.t, p.r * (1 - k * 0.5), 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    next.push(p);
  }
  game.particles = next;
}

function drawScorePopups() {
  const next = [];
  for (const p of game.scorePopups) {
    p.t += 1;
    if (p.t > p.life) continue;
    const k = p.t / p.life;
    const pos = normToScreen(p.x, p.y - k * 0.06);
    ctx.save();
    ctx.globalAlpha = 1 - k;
    ctx.fillStyle = p.color || '#ffd166';
    ctx.font = '900 18px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,0.6)';
    ctx.shadowBlur = 6;
    ctx.fillText(p.text, pos.x, pos.y);
    ctx.restore();
    next.push(p);
  }
  game.scorePopups = next;
}

canvas.addEventListener('pointerdown', (ev) => {
  if (!game.active || game.finished) return;
  const rect = canvas.getBoundingClientRect();
  const px = ev.clientX - rect.left;
  const py = ev.clientY - rect.top;
  // hit-test top-most card (highest layer) under point
  let hit = null, hitLayer = -1;
  for (const c of game.cards) {
    if (c.cleared) continue;
    const pos = normToScreen(c.x, c.y);
    if (px >= pos.x - CARD_W/2 && px <= pos.x + CARD_W/2 && py >= pos.y - CARD_H/2 && py <= pos.y + CARD_H/2) {
      if (c.layer > hitLayer) { hit = c; hitLayer = c.layer; }
    }
  }
  if (hit) tryPlayCard(hit.id);
});

let AC = null;
function ensureAC() {
  if (!state.settings.sound) return null;
  if (!AC) {
    try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch {}
  }
  if (AC && AC.state === 'suspended') AC.resume();
  return AC;
}
function tone(freq, dur, type, gain) {
  const ac = ensureAC(); if (!ac) return;
  const o = ac.createOscillator();
  const g = ac.createGain();
  o.type = type || 'sine';
  o.frequency.value = freq;
  g.gain.value = 0;
  g.gain.linearRampToValueAtTime(gain || 0.2, ac.currentTime + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + dur);
  o.connect(g).connect(ac.destination);
  o.start();
  o.stop(ac.currentTime + dur + 0.02);
}
function beepMatch(chain) {
  const baseFreq = 320 + chain * 28;
  tone(baseFreq, 0.16, 'triangle', 0.18);
  tone(baseFreq * 1.5, 0.12, 'sine', 0.08);
}
function beepDraw() { tone(180, 0.12, 'sawtooth', 0.12); }
function beepShuffle() {
  tone(440, 0.08, 'sine', 0.12); setTimeout(()=>tone(550, 0.08, 'sine', 0.12),80);
  setTimeout(()=>tone(660, 0.10, 'sine', 0.12),160);
}
function beepWin() {
  tone(523, 0.14, 'triangle', 0.20);
  setTimeout(()=>tone(659, 0.14, 'triangle', 0.20),140);
  setTimeout(()=>tone(784, 0.20, 'triangle', 0.22),280);
}
function beepLose() {
  tone(220, 0.18, 'sawtooth', 0.18);
  setTimeout(()=>tone(165, 0.22, 'sawtooth', 0.18),140);
}

function makeMissionRow(m) {
  const el = document.createElement('div'); el.className = 'mission';
  const cs = (state.missions && state.missions[m.id]) || {};
  const today = ymd();
  const claimedToday = cs.claimedYMD === today;
  const completedOnce = !!cs.claimed;
  const goneOut = !!cs.goneOut;
  let btnLabel = t('mission_go'), btnClass = '';
  if (m.auto) {
    const p = m.progress ? m.progress() : 0;
    if ((m.kind === 'daily' && claimedToday) || (m.kind === 'oneshot' && completedOnce)) { btnLabel = t('mission_done'); btnClass = 'done'; }
    else if (p >= 1) { btnLabel = t('mission_claim'); }
    else btnLabel = Math.floor(p * 100) + '%';
  } else {
    if ((m.kind === 'oneshot' && completedOnce)) { btnLabel = t('mission_done'); btnClass = 'done'; }
    else if (goneOut) { btnLabel = t('mission_check'); btnClass = 'check'; }
  }
  el.innerHTML =
    '<div class="ic">' + m.icon + '</div>' +
    '<div class="body"><h5>' + t(m.titleKey) + '</h5><div class="sub">' + t(m.subKey) + '</div><div class="reward">🪙 ' + m.reward + '</div></div>' +
    '<button class="btn ' + btnClass + '">' + btnLabel + '</button>';
  el.querySelector('button').addEventListener('click', () => handleMission(m));
  return el;
}

function handleMission(m) {
  const cs = state.missions[m.id] || {};
  state.missions[m.id] = cs;
  const today = ymd();
  if (m.kind === 'daily' && cs.claimedYMD === today) return;
  if (m.kind === 'oneshot' && cs.claimed) return;
  if (m.auto) {
    const p = m.progress ? m.progress() : 0;
    if (p < 1) { toast(Math.floor(p * 100) + '%'); return; }
    grantMission(m); return;
  }
  if (!cs.goneOut) {
    cs.goneOut = true; saveState(); renderEarn();
    if (m.action === 'share') {
      const url = (TG && TG.openTelegramLink) ? 'https://t.me/share/url?url=' + encodeURIComponent(window.location.href) + '&text=' + encodeURIComponent(t('welcome_t')) : window.location.href;
      try { TG?.openTelegramLink ? TG.openTelegramLink(url) : window.open(url, '_blank'); } catch { window.open(url, '_blank'); }
    } else if (m.action === 'follow' && m.url) {
      try { TG?.openTelegramLink ? TG.openTelegramLink(m.url) : window.open(m.url, '_blank'); } catch { window.open(m.url, '_blank'); }
    }
  } else {
    grantMission(m);
  }
}

function grantMission(m) {
  const cs = state.missions[m.id] || {};
  state.missions[m.id] = cs;
  const bp = state.battlePassUntil > Date.now() ? 2 : 1;
  state.coins += m.reward * bp;
  if (m.kind === 'daily') cs.claimedYMD = ymd();
  else cs.claimed = true;
  saveState(); renderEarn();
  toast('+' + (m.reward * bp) + ' 🪙');
  haptic('success');
  mp('mission_claim', { id: m.id, reward: m.reward * bp });
}

function chestDayForToday() {
  const today = ymd();
  if (state.chestClaimedYMD === today) return state.chestDay;
  // yesterday claimed -> advance; else if missed -> reset to 1
  const yest = new Date(Date.now() - 86400000); const yymd = ymd(yest);
  if (state.chestClaimedYMD === yymd) return Math.min(7, (state.chestDay || 0) + 1);
  if (state.chestClaimedYMD === '') return 1;
  return 1;
}
function claimChest() {
  const today = ymd();
  if (state.chestClaimedYMD === today) return;
  const day = chestDayForToday();
  const bp = state.battlePassUntil > Date.now() ? 2 : 1;
  const reward = CHEST_REWARDS[day - 1] * bp;
  state.coins += reward;
  state.chestDay = day;
  state.chestClaimedYMD = today;
  saveState();
  haptic('success');
  toast('+' + reward + ' 🪙');
  mp('chest_claim', { day, reward });
  renderEarn();
}

  haptic('success');
}

/* ============== [JS-18] FTUE ============== */
const FTUE_STEPS = [
  { tKey:'ftue1_t', bKey:'ftue1_b', draw: ftueDrawMatch },
  { tKey:'ftue2_t', bKey:'ftue2_b', draw: ftueDrawWrap  },
  { tKey:'ftue3_t', bKey:'ftue3_b', draw: ftueDrawCombo },
  { tKey:'ftue4_t', bKey:'ftue4_b', draw: ftueDrawDraw  },
  { tKey:'ftue5_t', bKey:'ftue5_b', draw: ftueDrawStars }
];
let ftueIdx = 0;
function startFTUE() {
  ftueIdx = 0; showFTUE();
}
function showFTUE() {
  const step = FTUE_STEPS[ftueIdx];
  const dotsHtml = FTUE_STEPS.map((s,i) => '<div class="d' + (i===ftueIdx?' on':'') + '"></div>').join('');
  const html =
    '<button class="x" id="ftue-skip">✕</button>' +
    '<h3>' + t(step.tKey) + '</h3>' +
    '<div class="ftue-canvas-wrap"><canvas id="ftue-cv" width="560" height="400"></canvas></div>' +
    '<p>' + t(step.bKey) + '</p>' +
    '<div class="ftue-dots">' + dotsHtml + '</div>' +
    '<div class="cta-row">' +
      (ftueIdx > 0 ? '<button class="cta secondary" id="ftue-back">←</button>' : '<button class="cta secondary" id="ftue-skip2">'+ t('btn_leave') +'</button>') +
      '<button class="cta" id="ftue-next">' + (ftueIdx === FTUE_STEPS.length - 1 ? '✓' : '→') + '</button>' +
    '</div>';
  openModal(html, () => {
    const cv = document.getElementById('ftue-cv');
    if (cv) {
      const c2 = cv.getContext('2d');
      let t0 = performance.now();
      function loop() {
        if (!document.body.contains(cv)) return;
        const dt = performance.now() - t0;
        step.draw(c2, dt);
        requestAnimationFrame(loop);
      }
      loop();
    }
    document.getElementById('ftue-skip').addEventListener('click', () => { state.ftueDone = true; saveState(); closeModal(); });
    document.getElementById('ftue-skip2')?.addEventListener('click', () => { state.ftueDone = true; saveState(); closeModal(); });
    document.getElementById('ftue-back')?.addEventListener('click', () => { ftueIdx--; closeModal(); showFTUE(); });
    document.getElementById('ftue-next').addEventListener('click', () => {
      if (ftueIdx === FTUE_STEPS.length - 1) { state.ftueDone = true; saveState(); closeModal(); }
      else { ftueIdx++; closeModal(); showFTUE(); }
    });
  });
}

function ftueDrawCard(c, x, y, rank, suit, scale) {
  scale = scale || 1;
  c.save(); c.translate(x, y); c.scale(scale, scale); c.translate(-30, -42);
  c.fillStyle='rgba(0,0,0,.35)';
  drawRoundedRect(c, 2, 4, 60, 84, 8); c.fill();
  c.fillStyle='#fffcf2';
  drawRoundedRect(c, 0, 0, 60, 84, 8); c.fill();
  c.fillStyle = SUIT_COLOR[SUITS[suit]];
  c.font='800 16px Inter, sans-serif'; c.textBaseline='top'; c.textAlign='left';
  c.fillText(RANK_LABEL[rank], 5, 4);
  c.font='800 30px Inter, sans-serif'; c.textAlign='center'; c.textBaseline='middle';
  c.fillText(SUITS[suit], 30, 44);
  c.restore();
}

function ftueDrawMatch(c, dt) {
  c.clearRect(0,0,560,400);
  c.fillStyle = 'rgba(255,255,255,0.02)'; c.fillRect(0,0,560,400);
  // mini tableau with 4 cards
  ftueDrawCard(c, 160, 150, 7, 1);
  ftueDrawCard(c, 280, 150, 9, 2);
  ftueDrawCard(c, 400, 150, 5, 0);
  // waste
  ftueDrawCard(c, 280, 300, 8, 0);
  // pulse arrow from waste up to 7 and 9
  const k = (dt % 1600) / 1600;
  c.strokeStyle = '#ffd166'; c.lineWidth = 3;
  c.setLineDash([4,4]);
  const x1 = 160, x2 = 400;
  const x = lerp(x1, x2, k);
  c.beginPath(); c.moveTo(280, 280); c.lineTo(x, 180); c.stroke();
  c.setLineDash([]);
  c.fillStyle = '#ffd166';
  c.font='900 16px Inter, sans-serif'; c.textAlign='center';
  c.fillText('±1', 280, 380);
}
function ftueDrawWrap(c, dt) {
  c.clearRect(0,0,560,400);
  ftueDrawCard(c, 130, 200, 13, 0); // K
  ftueDrawCard(c, 280, 200, 1, 2);  // A
  ftueDrawCard(c, 430, 200, 2, 1);  // 2
  // connecting arcs
  const k = (dt % 1600) / 1600;
  c.strokeStyle='#06d6a0'; c.lineWidth = 3;
  c.beginPath();
  c.arc(205, 200, 75, Math.PI, Math.PI*2);
  c.stroke();
  c.beginPath();
  c.arc(355, 200, 75, Math.PI, Math.PI*2);
  c.stroke();
  // moving dot
  c.fillStyle = '#ffd166';
  const arc = (k * 2) % 2;
  let ang;
  if (arc < 1) { ang = Math.PI + arc * Math.PI; const x = 205 + Math.cos(ang) * 75; const y = 200 + Math.sin(ang) * 75; c.beginPath(); c.arc(x,y,6,0,Math.PI*2); c.fill(); }
  else { const a = arc - 1; ang = Math.PI + a * Math.PI; const x = 355 + Math.cos(ang) * 75; const y = 200 + Math.sin(ang) * 75; c.beginPath(); c.arc(x,y,6,0,Math.PI*2); c.fill(); }
}
function ftueDrawCombo(c, dt) {
  c.clearRect(0,0,560,400);
  // chain meter
  const w = 400; const x0 = 80; const y0 = 200;
  c.fillStyle='rgba(255,255,255,0.08)'; drawRoundedRect(c, x0, y0, w, 24, 12); c.fill();
  const p = ((dt % 2400) / 2400);
  const grad = c.createLinearGradient(x0, 0, x0 + w, 0);
  grad.addColorStop(0,'#06d6a0'); grad.addColorStop(0.5,'#ffd166'); grad.addColorStop(1,'#ef476f');
  c.fillStyle = grad; drawRoundedRect(c, x0, y0, w * p, 24, 12); c.fill();
  // tier labels
  c.fillStyle='#fff'; c.font='800 14px Inter, sans-serif'; c.textAlign='center';
  c.fillText('x2', x0 + w * 0.3, y0 - 10);
  c.fillText('x3', x0 + w * 0.5, y0 - 10);
  c.fillText('x5', x0 + w * 0.7, y0 - 10);
  c.fillText('x10', x0 + w * 0.95, y0 - 10);
  c.font='900 28px Inter, sans-serif';
  if (p > 0.95) c.fillText('INCREDIBLE!', 280, 100);
  else if (p > 0.7) c.fillText('AMAZING!', 280, 100);
  else if (p > 0.5) c.fillText('GREAT!', 280, 100);
  else if (p > 0.3) c.fillText('NICE!', 280, 100);
}
function ftueDrawDraw(c, dt) {
  c.clearRect(0,0,560,400);
  // stock + waste
  c.fillStyle='#2a0f5a'; drawRoundedRect(c, 360, 160, 80, 110, 10); c.fill();
  c.strokeStyle='rgba(255,255,255,0.25)'; c.setLineDash([4,4]); drawRoundedRect(c, 370, 170, 60, 90, 8); c.stroke(); c.setLineDash([]);
  c.fillStyle='#fff'; c.font='900 14px Inter, sans-serif'; c.textAlign='center';
  c.fillText('STOCK', 400, 290);
  ftueDrawCard(c, 160, 220, 7, 2, 1.2);
  c.fillStyle='#ffd166'; c.font='900 16px Inter, sans-serif';
  c.fillText('Tap stock when stuck', 280, 90);
  // moving finger
  const k = (dt % 1800) / 1800;
  const x = lerp(400, 200, k);
  c.fillStyle='rgba(255,255,255,0.9)';
  c.beginPath(); c.arc(x, 220, 10, 0, Math.PI*2); c.fill();
}
function ftueDrawStars(c, dt) {
  c.clearRect(0,0,560,400);
  const k = (dt % 2400) / 2400;
  c.fillStyle='#ffd166'; c.font='900 60px Inter, sans-serif'; c.textAlign='center';
  const scales = [k*3, k*3-1, k*3-2];
  scales.forEach((s, i) => {
    const v = clamp(s, 0, 1);
    if (v <= 0) return;
    c.save();
    c.translate(180 + i*100, 200);
    const sc = easeOutBack(v);
    c.scale(sc, sc);
    c.fillText('★', 0, 20);
    c.restore();
  });
  c.fillStyle='#fff'; c.font='800 16px Inter, sans-serif';
  c.fillText('Score higher → more stars', 280, 320);
}

/* ============== [JS-19] MIXPANEL + API ============== */
let iapEnabled = false;
let mixpanelEnabled = false;
let mpQueue = [];
function mp(event, props) {
  mpQueue.push({ event, properties: props || {} });
  if (mpQueue.length >= 8) flushMP();
  scheduleFlush();
}
let mpFlushTimer = null;
function scheduleFlush() {
  if (mpFlushTimer) return;
  mpFlushTimer = setTimeout(() => { mpFlushTimer = null; flushMP(); }, 4000);
}
async function flushMP() {
  if (!mpQueue.length) return;
  if (!mixpanelEnabled) { mpQueue = []; return; }
  const events = mpQueue.slice();
  mpQueue = [];
  try {
    await fetch('/api/mp/track', {
      method:'POST',
      headers: {
        'content-type':'application/json',
        'x-telegram-initdata': TG?.initData || ''
      },
      body: JSON.stringify({ events })
    });
  } catch {}
}
async function api(path, body) {
  const r = await fetch(path, {
    method:'POST',
    headers: {
      'content-type':'application/json',
      'x-telegram-initdata': TG?.initData || ''
    },
    body: JSON.stringify(body || {})
  });
  return r.json();
}
async function fetchFlags() {
  try {
    const r = await fetch('/api/flags'); const j = await r.json();
    iapEnabled = !!j.iapEnabled; mixpanelEnabled = !!j.mixpanelEnabled;
  } catch {}
}
async function pushHeartbeat() {
  const ts = Date.now();
  // streak risk = next UTC midnight
  const tomorrow = new Date(); tomorrow.setUTCHours(20, 0, 0, 0);
  const riskAt = tomorrow.getTime();
  try {
    await fetch('/api/heartbeat', {
      method:'POST',
      headers: { 'content-type':'application/json', 'x-telegram-initdata': TG?.initData || '' },
      body: JSON.stringify({ lang: state.settings.lang, streak: state.streak, streakRiskAt: riskAt, level: state.maxLevelUnlocked, stars: state.stars, coins: state.coins })
    });
  } catch {}
}
async function pollPurchases() {
  try {
    const r = await fetch('/api/poll-purchases', { headers: { 'x-telegram-initdata': TG?.initData || '' } });
    const j = await r.json();
    if (Array.isArray(j.grants)) j.grants.forEach(applyGrant);
  } catch {}
}
function applyGrant(g) {
  const gr = g.grant || {};
  if (gr.coins) state.coins += gr.coins | 0;
  if (gr.wilds) state.boosters.wild += gr.wilds | 0;
  if (gr.shuffles) state.boosters.shuffle += gr.shuffles | 0;
  if (gr.undos) state.boosters.undo += gr.undos | 0;
  if (gr.revives) state.boosters.revive += gr.revives | 0;
  if (gr.skin) { if (!state.ownedSkins.includes(gr.skin)) state.ownedSkins.push(gr.skin); }
  if (gr.shieldDays) state.shieldUntil = Date.now() + gr.shieldDays * 86400000;
  if (gr.battlePassDays) state.battlePassUntil = Date.now() + gr.battlePassDays * 86400000;
  saveState();
  renderHUD();
  toast(t('iap_thanks'));
}

/* ============== [JS-20] BOOT ============== */
function applyLang() {
  document.documentElement.lang = state.settings.lang || 'en';
  document.documentElement.dir = RTL_LANGS.includes(state.settings.lang) ? 'rtl' : 'ltr';
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.dataset.i18n; const v = t(k); if (v) el.textContent = v;
  });
  document.getElementById('map-title').textContent = t('quest_map');
  document.getElementById('map-sub').textContent = t('three_peaks_sub');
}
function switchTab(name) {
  document.querySelectorAll('.tab-view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const v = document.getElementById('view-' + name);
  const b = document.querySelector('.tab-btn[data-tab="' + name + '"]');
  if (v) v.classList.add('active');
  if (b) b.classList.add('active');
  state.activeTab = name; saveState();
  if (name === 'shop') renderShop();
  if (name === 'earn') renderEarn();
  if (name === 'play') { showMapScreen(); renderMap(); }
}

function toast(text) {
  const root = document.getElementById('toast-root');
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = text;
  root.appendChild(t);
  setTimeout(() => t.remove(), 2800);
}

function wireUI() {
  document.querySelectorAll('.tab-btn').forEach(b => b.addEventListener('click', () => switchTab(b.dataset.tab)));
  document.getElementById('btn-settings').addEventListener('click', openSettingsModal);
  document.getElementById('btn-leave-play').addEventListener('click', openConfirmLeaveModal);
  document.getElementById('play-fab').addEventListener('click', () => startLevel(state.level || state.maxLevelUnlocked));
  document.querySelector('.pill.coin .add').addEventListener('click', (e) => { e.stopPropagation(); switchTab('shop'); });
  document.getElementById('hud-stars').addEventListener('click', () => switchTab('earn'));
  document.getElementById('hud-coins').addEventListener('click', () => switchTab('shop'));
}

async function boot() {
  initTelegram();
  await fetchFlags();
  applyLang();
  wireUI();
  layoutCanvas();
  renderHUD();
  renderMap();
  switchTab(state.activeTab || 'play');
  pollPurchases();
  pushHeartbeat();
  setInterval(pushHeartbeat, 60000);
  setInterval(pollPurchases, 45000);
  if (!state.welcomed || !state.ftueDone) {
    state.welcomed = true; saveState();
    setTimeout(startFTUE, 350);
  }
  mp('app_open', { lang: state.settings.lang, version: VERSION, level: state.maxLevelUnlocked });
  flushMP();
}

boot();
</script>
