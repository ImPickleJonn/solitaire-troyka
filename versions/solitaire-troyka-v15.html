    c.innerHTML = '<div class="v">' + s.v + '</div><div class="l">' + s.l + '</div>';
    grid.appendChild(c);
  });
  wrap.appendChild(grid);
  root.appendChild(wrap);
}

// ---------- NEW IN-LEVEL BOOSTERS ----------
function usePeek() {
  if ((state.boosters.peek|0) <= 0) { toast(t('not_enough')); return; }
  state.boosters.peek -= 1; saveState();
  const next3 = game.stock.slice(-3).reverse();
  const labels = next3.map(c => RANK_LABEL[c.rank] + SUITS[c.suit]).join('  ');
  toast('👁 ' + (labels || '—'));
  haptic('impact');
  renderHUD();
}
function useHammer() {
  if ((state.boosters.hammer|0) <= 0) { toast(t('not_enough')); return; }
  // arm hammer to consume on next card tap
  game.armedBooster = 'hammer';
  toast(t('armed_tap_card'));
  renderBoosterRow();
}
function usePlus5() {
  if ((state.boosters.plus5|0) <= 0) { toast(t('not_enough')); return; }
  state.boosters.plus5 -= 1; saveState();
  // top up stock by 5 random cards
  for (let i = 0; i < 5; i++) {
    game.stock.push({ rank: 1 + Math.floor(Math.random() * 13), suit: Math.floor(Math.random()*4), wild: false });
  }
  toast('+5 📦');
  haptic('success');
  renderHUD();
}
function applyPreBoosters(pre) {
  if (!pre) return;
  if (pre.scissors) {
    const alive = game.cards.filter(c => !c.cleared && !c.faceDown);
    shuffle(alive, game.rng);
    for (let i = 0; i < 3 && i < alive.length; i++) {
      const c = alive[i]; c.cleared = true;
      spawnParticles(c.x, c.y, 8, '#ef476f');
    }
    setTimeout(revealCardsBeneath, 250);
  }
  if (pre.wildDrop) {
    for (let i = 0; i < 3; i++) {
      const idx = Math.floor(Math.random() * game.stock.length);
      if (game.stock[idx]) game.stock[idx].wild = true;
    }
  }
  if (pre.stockBoost) {
    for (let i = 0; i < 5; i++) {
      game.stock.push({ rank: 1 + Math.floor(Math.random() * 13), suit: Math.floor(Math.random()*4), wild: false });
    }
  }
}

// patch handleArmedBoosterOnCard for hammer
const _origHandleArmed = handleArmedBoosterOnCard;
handleArmedBoosterOnCard = function(c) {
  const b = game.armedBooster;
  if (b === 'hammer') {
    if ((state.boosters.hammer|0) <= 0) { armBooster(null); return; }
    state.boosters.hammer -= 1; saveState();
    c.cleared = true;
    spawnParticles(c.x, c.y, 18, '#ef476f');
    spawnScorePopup(c.x, c.y, '💥');
    armBooster(null);
    setTimeout(revealCardsBeneath, 200);
    renderHUD();
    haptic('heavy');
    return;
  }
  return _origHandleArmed(c);
};

// patch armBooster to handle the new instant boosters
const _origArmBooster = armBooster;
armBooster = function(name) {
  if (name === 'peek')    { usePeek(); return; }
  if (name === 'plus5')   { usePlus5(); return; }
  if (name === 'hammer')  {
    if ((state.boosters.hammer|0) <= 0) { toast(t('not_enough')); return; }
    useHammer(); return;
  }
  return _origArmBooster(name);
};

// patch finishLevel to consume lives + grant memory + check achievements + coin rain + best stats
const _origFinishLevel = finishLevel;
finishLevel = function(won) {
  if (game.finished) return;
  if (game.chain > (state.bestChain|0)) { state.bestChain = game.chain; }
  if (won) {
    if (game.memoryRevealed > 0) {
      for (let i = 0; i < game.memoryRevealed; i++) awardMemoryPiece();
    }
    if (game.score > (state.bestScore|0)) state.bestScore = game.score;
    state.totalCardsPlayed = (state.totalCardsPlayed|0) + (game.cards.filter(c=>c.cleared).length);
  } else {
    if (!game.dailyMode) consumeLife();
  }
  _origFinishLevel(won);
  if (won) {
    setTimeout(() => startCoinRain(20 + (game.score > (LEVELS.find(l=>l.id===game.levelId)||{}).gold ? 25 : 0)), 400);
    setTimeout(() => {
      checkAchievements();
      const lvl = LEVELS.find(l => l.id === game.levelId);
      if (lvl) {
        const w = WORLDS.find(x => game.levelId === x.range[1]);
        if (w) setTimeout(() => checkWorldComplete(w.id), 1500);
      }
    }, 600);
  }
  if (game.dailyMode) {
    const today = ymd();
    state.dailyBest[today] = Math.max(state.dailyBest[today]|0, game.score|0);
    state.dailyDoneYMD = today;
    saveState();
  }
};

// patch startLevel signature to accept options { pre, daily, seed }
const _origStartLevel = startLevel;
startLevel = function(id, opts) {
  opts = opts || {};
  if (!opts.daily) {
    rolloverLivesIfNeeded();
    if (state.lives <= 0) {
      toast(t('out_of_lives_t'));
      openOutOfLivesModal();
      return;
    }
    // consume a life on start (refunded if quit before play; simple model — consume on start, restore on win)
  }
  _origStartLevel(id);
  if (opts.daily && opts.seed) game.rng = mulberry32(opts.seed);
  game.dailyMode = !!opts.daily;
  if (opts.pre) applyPreBoosters(opts.pre);
  // hide map FAB
  document.getElementById('play-fab-wrap').style.display = 'none';
  // mascot hint
  if (mascot.el && state.totalGames < 3) {
    mascotSay(t('ftue1_b'));
  }
  renderHUD();
};

// patch tryPlayCard to track total cards played + chain trail
const _origTryPlayCard = tryPlayCard;
tryPlayCard = function(cardId) {
  const before = (game.cards.find(c => c.id === cardId) || {});
  const wasCleared = before.cleared;
  _origTryPlayCard(cardId);
  const after = (game.cards.find(c => c.id === cardId) || {});
  if (!wasCleared && after.cleared && !game.armedBooster) {
    spawnChainTrail(after);
    // mascot encouragement
    if (game.chain === 5 && mascot.el) mascotSay('🔥 5-chain!');
    if (game.chain === 10 && mascot.el) mascotSay('💥 INCREDIBLE!');
  }
};

// Out-of-lives modal
function openOutOfLivesModal() {
  const ms = state.livesRefillAt - Date.now();
  const mTxt = ms > 0 ? formatLivesTimer() : '—';
  const html =
    '<button class="x" onclick="closeModal()">✕</button>' +
    '<h3>❤️ ' + t('out_of_lives_t') + '</h3>' +
    '<p>' + t('out_of_lives_s') + '</p>' +
    '<p style="font-size:11px;color:var(--ink-soft)">' + t('next_life_in', { m: mTxt }) + '</p>' +
    '<div class="cta-row">' +
      '<button class="cta secondary" id="cta-wait">' + t('wait_for_life') + '</button>' +
      '<button class="cta" id="cta-buy">⭐ ' + t('refill_lives', { n: LIVES_REFILL_COST }) + '</button>' +
    '</div>';
  openModal(html, () => {
    document.getElementById('cta-wait').addEventListener('click', closeModal);
    document.getElementById('cta-buy').addEventListener('click', () => { closeModal(); purchase('revive'); /* fallback */ });
  });
}

// Patch renderHUD to include lives pill
const _origRenderHUD = renderHUD;
renderHUD = function() {
  _origRenderHUD();
  rolloverLivesIfNeeded();
  const ln = document.getElementById('hud-lives-n'); if (ln) ln.textContent = state.lives | 0;
  const tm = document.getElementById('hud-lives-timer'); if (tm) tm.textContent = state.lives < LIVES_MAX ? formatLivesTimer() : '';
};

// Replace renderMap with S-curve, single-world-at-a-time, world-chip switcher
renderMap = function() {
  const root = document.getElementById('map-scroller');
  if (!root) return;
  root.innerHTML = '';
  document.getElementById('map-title').textContent = t('quest_map');
  document.getElementById('map-sub').textContent = t('three_peaks_sub');

  // Active world: follow player's progress unless they switched explicitly.
  if (!state.activeWorld) {
    for (const w of WORLDS) {
      if (state.maxLevelUnlocked >= w.range[0] && state.maxLevelUnlocked <= w.range[1]) { state.activeWorld = w.id; break; }
    }
    if (!state.activeWorld) state.activeWorld = 1;
  }

  // Daily challenge pill
  const dp = document.createElement('div'); dp.className = 'daily-pill';
  const dailyDone = state.dailyDoneYMD === ymd();
  dp.innerHTML = '<div><h4>🗓 ' + t('daily_t') + '</h4><p>' + t('daily_s') + '</p></div>' +
    '<button>' + (dailyDone ? t('daily_done') : t('daily_play')) + '</button>';
  dp.querySelector('button').addEventListener('click', () => { if (!dailyDone) openDailyChallenge(); });
  root.appendChild(dp);

  // World chips switcher row
  const chips = document.createElement('div'); chips.className = 'world-chips';
  WORLDS.forEach((world, wi) => {
    const wEarned = WORLDS_starsEarned(world);
    const wTotal = (world.range[1] - world.range[0] + 1) * 3;
    const unlocked = world.id === 1 || (state.maxLevelUnlocked >= world.range[0] - 2);
    const chip = document.createElement('button');
    chip.className = 'world-chip' + (state.activeWorld === world.id ? ' on' : '') + (!unlocked ? ' locked' : '');
    chip.innerHTML = '<span class="wic">' + (unlocked ? world.icon : '🔒') + '</span><span>' + world.id + '</span><span class="ws">' + wEarned + '/' + wTotal + '</span>';
    if (unlocked) chip.addEventListener('click', () => { state.activeWorld = world.id; saveState(); renderMap(); });
    chips.appendChild(chip);
  });
  root.appendChild(chips);

  // Active world band
  const world = WORLDS.find(w => w.id === state.activeWorld) || WORLDS[0];
  const wEarned = WORLDS_starsEarned(world);
  const wTotal = (world.range[1] - world.range[0] + 1) * 3;
  const claimed = !!state.worldsClaimed[world.id];
  const unlocked = world.id === 1 || (state.maxLevelUnlocked >= world.range[0]);
  const band = document.createElement('div');
  band.className = 'world-band' + (unlocked ? '' : ' locked');
  band.style.background = 'linear-gradient(135deg, ' + world.sky[0] + ' 0%, ' + world.sky[1] + ' 100%)';
  band.innerHTML =
    '<div class="wb-icon">' + world.icon + '</div>' +
    '<div class="wb-text"><h3>' + t(['','world1_t','world2_t','world3_t','world4_t','world5_t'][world.id]) + '</h3><p>' + t(['','world1_s','world2_s','world3_s','world4_s','world5_s'][world.id]) + '</p></div>' +
    '<div class="wb-stars">⭐ ' + wEarned + '/' + wTotal + '</div>';
  root.appendChild(band);

  if (!unlocked) {
    const lm = document.createElement('div'); lm.className = 'world-meta';
    lm.innerHTML = '<strong>🔒 ' + t('locked') + '</strong><br/>' + t('unlock_at_stars', { n: world.range[0] - 1 });
    root.appendChild(lm);
    return;
  }

  // S-curve path
  const path = document.createElement('div'); path.className = 's-path';
  const N = world.range[1] - world.range[0] + 1;
  const SPACING = 110, PAD_TOP = 30;
  const AMP_VW = 0.28; // amplitude as fraction of path width
  const totalH = N * SPACING + (allLevelsBeaten(world) ? 110 : 0) + 70;
  path.style.height = totalH + 'px';
  // SVG dotted connector line
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.classList.add('s-path-svg');
  svg.setAttribute('viewBox', '0 0 100 ' + totalH);
  svg.setAttribute('preserveAspectRatio', 'none');
  let d = '';
  for (let i = 0; i < N; i++) {
    const y = PAD_TOP + i * SPACING;
    const x = 50 + Math.sin(i * 0.78) * AMP_VW * 100;
    d += (i === 0 ? 'M ' : 'L ') + x + ' ' + y + ' ';
  }
  if (allLevelsBeaten(world)) {
    const y = PAD_TOP + N * SPACING + 30;
    const x = 50 + Math.sin(N * 0.78) * AMP_VW * 100;
    d += 'L ' + x + ' ' + y + ' ';
  }
  const pathEl = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  pathEl.setAttribute('d', d);
  pathEl.setAttribute('fill', 'none');
  pathEl.setAttribute('stroke', 'rgba(255,255,255,0.22)');
  pathEl.setAttribute('stroke-width', '2');
  pathEl.setAttribute('stroke-dasharray', '6 6');
  pathEl.setAttribute('vector-effect', 'non-scaling-stroke');
  svg.appendChild(pathEl);
  path.appendChild(svg);

  // Level nodes
  for (let i = 0; i < N; i++) {
    const lid = world.range[0] + i;
    const lvl = LEVELS.find(L => L.id === lid);
    if (!lvl) continue;
    const stars = state.starsPerLevel[lvl.id] || 0;
    const lvlUnlocked = lvl.id <= state.maxLevelUnlocked;
    const isCurrent = lvlUnlocked && lvl.id === state.maxLevelUnlocked && stars < 3;
    const node = document.createElement('button');
    node.className = 's-node' + (lvlUnlocked ? '' : ' locked') + (isCurrent ? ' current' : '') + (lvl.boss ? ' boss' : '');
    const y = PAD_TOP + i * SPACING;
    const xPct = 50 + Math.sin(i * 0.78) * AMP_VW * 100;
    const halfW = lvl.boss ? 48 : 42;
    node.style.top = (y - halfW) + 'px';
    node.style.left = 'calc(' + xPct + '% - ' + halfW + 'px)';
    if (lvlUnlocked) {
      node.innerHTML = '<div class="nnum">' + lvl.id + (lvl.boss ? '👑' : '') + '</div><div class="nstars">' + ('★'.repeat(stars) + '☆'.repeat(3 - stars)) + '</div>';
      node.addEventListener('click', () => {
        state.level = lvl.id; saveState();
        openPreLevelModal(lvl.id);
      });
    } else {
      node.innerHTML = '<div class="lock">🔒</div>';
    }
    path.appendChild(node);
  }
  // World chest at the bottom of the S-path
  if (allLevelsBeaten(world)) {
    const chest = document.createElement('button');
    chest.className = 's-chest' + (claimed ? ' locked' : '');
    const y = PAD_TOP + N * SPACING + 30;
    const xPct = 50 + Math.sin(N * 0.78) * AMP_VW * 100;
    chest.style.top = (y - 48) + 'px';
    chest.style.left = 'calc(' + xPct + '% - 48px)';
    chest.innerHTML = '<div class="ci">' + (claimed ? '✓' : '🎁') + '</div><div>' + (claimed ? '' : t('world_open_chest')) + '</div>';
    if (!claimed) chest.addEventListener('click', () => openWorldChestModal(world));
    path.appendChild(chest);
  }
  root.appendChild(path);

  // bottom padding for tab bar + fab
  const more = document.createElement('div');
  more.style.cssText='text-align:center;padding:18px 12px 120px;color:var(--ink-dim);font-size:12px;';
  more.textContent = (world.id === WORLDS.length) ? t('coming_soon') : '';
  root.appendChild(more);

  // Auto-scroll to current level on first render
  setTimeout(() => {
    const cur = root.querySelector('.s-node.current') || root.querySelector('.s-node:not(.locked):last-child');
    if (cur && cur.scrollIntoView) cur.scrollIntoView({ block: 'center', behavior: 'smooth' });
  }, 50);
};
function WORLDS_starsEarned(world) {
  let s = 0;
  for (let id = world.range[0]; id <= world.range[1]; id++) s += (state.starsPerLevel[id]|0);
  return s;
}
function allLevelsBeaten(world) {
  for (let id = world.range[0]; id <= world.range[1]; id++) {
    if ((state.starsPerLevel[id]|0) < 1) return false;
  }
  return true;
}

// Patch renderEarn to add postcards, achievements, stats
const _origRenderEarn = renderEarn;
renderEarn = function() {
  _origRenderEarn();
  const root = document.getElementById('earn-scroll');
  if (!root) return;

  // POSTCARDS
  const pcHead = document.createElement('div'); pcHead.className = 'shop-section-title'; pcHead.textContent = '📸 ' + t('postcards_title');
  root.appendChild(pcHead);
  const pcGrid = document.createElement('div'); pcGrid.className = 'postcard-grid';
  POSTCARDS.forEach(pc => {
    const ps = ensurePostcard(pc.id);
    const cell = document.createElement('div');
    cell.className = 'postcard-cell' + (ps.complete ? ' complete' : ps.pieces === 0 ? ' locked' : '');
    cell.innerHTML =
      '<canvas width="200" height="120"></canvas>' +
      '<div class="pc-title">' + t(pc.tKey) + '</div>' +
      '<div class="pc-progress">' + t('postcards_progress', { n: ps.pieces }) +
        '<span class="bar"><span class="fill" style="width:' + clamp(ps.pieces / pc.pieces * 100, 0, 100) + '%"></span></span>' +
      '</div>';
    const cv = cell.querySelector('canvas');
    drawPostcardArt(cv.getContext('2d'), cv.width, cv.height, pc.key, ps.complete);
    pcGrid.appendChild(cell);
  });
  root.appendChild(pcGrid);

  // ACHIEVEMENTS
  const achHead = document.createElement('div'); achHead.className = 'shop-section-title'; achHead.textContent = '🏆 ' + t('achievements_title');
  root.appendChild(achHead);
  const achGrid = document.createElement('div'); achGrid.className = 'ach-grid';
  ACHIEVEMENTS.forEach(ach => {
    const cur = state.achievements[ach.id] || {};
    const cell = document.createElement('div');
    cell.className = 'ach-cell' + (cur.claimed ? ' claimed' : cur.unlocked ? ' unlocked' : '');
    cell.innerHTML = '<div class="ic">' + ach.icon + '</div><div class="nm">' + t(ach.tKey) + '</div><div class="rw">🪙 ' + ach.reward + '</div>';
    if (cur.unlocked && !cur.claimed) cell.addEventListener('click', () => claimAchievement(ach.id));
    achGrid.appendChild(cell);
  });
  root.appendChild(achGrid);

  // STATS
  renderStatsPanel(root);
};

// Patch checkWin to award score popups + revealCardsBeneath now triggers fireworks on peak clear
const _origRevealCardsBeneath = revealCardsBeneath;
revealCardsBeneath = function() {
  const before = game.cards.filter(c => !c.cleared && !c.faceDown).length;
  _origRevealCardsBeneath();
  // any layer-0 card just cleared = peak clear fireworks
  // simple heuristic: if a card at layer 0 was just cleared we spawn extra particles at its position
  // (we keep it simple — celebrate on each peak)
  for (const c of game.cards) {
    if (c.cleared && c.layer === 0 && !c._peakCelebrated) {
      c._peakCelebrated = true;
      spawnParticles(c.x, c.y, 30, '#ffd166');
      spawnParticles(c.x, c.y, 30, '#ef476f');
      spawnScorePopup(c.x, c.y - 0.03, 'PEAK!');
      haptic('heavy');
    }
  }
};


function applyLang() {
  document.documentElement.lang = state.settings.lang || 'en';
  document.documentElement.dir = RTL_LANGS.includes(state.settings.lang) ? 'rtl' : 'ltr';
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.dataset.i18n; const v = t(k); if (v) el.textContent = v;
  });
  document.getElementById('map-title').textContent = t('quest_map');
  document.getElementById('map-sub').textContent = t('three_peaks_sub');
}
function switchTab(name) {
  document.querySelectorAll('.tab-view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const v = document.getElementById('view-' + name);
  const b = document.querySelector('.tab-btn[data-tab="' + name + '"]');
  if (v) v.classList.add('active');
  if (b) b.classList.add('active');
  state.activeTab = name; saveState();
  if (name === 'shop') renderShop();
  if (name === 'earn') renderEarn();
  if (name === 'play') { showMapScreen(); renderMap(); }
}

function toast(text) {
  const root = document.getElementById('toast-root');
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = text;
  root.appendChild(t);
  setTimeout(() => t.remove(), 2800);
}

function wireUI() {
  document.querySelectorAll('.tab-btn').forEach(b => b.addEventListener('click', () => switchTab(b.dataset.tab)));
  document.getElementById('btn-settings').addEventListener('click', openSettingsModal);
  document.getElementById('btn-leave-play').addEventListener('click', openConfirmLeaveModal);
  document.getElementById('play-fab').addEventListener('click', () => openPreLevelModal(state.level || state.maxLevelUnlocked));
  document.querySelector('.pill.coin .add').addEventListener('click', (e) => { e.stopPropagation(); switchTab('shop'); });
  document.getElementById('hud-stars').addEventListener('click', () => switchTab('earn'));
  document.getElementById('hud-coins').addEventListener('click', () => switchTab('shop'));
  document.getElementById('hud-lives').addEventListener('click', () => {
    if (state.lives < LIVES_MAX) openOutOfLivesModal();
  });
}

async function boot() {
  initTelegram();
  initMascot();
  initCoinRain();
  if (state.splashSeen) {
    const sp = document.getElementById('splash');
    if (sp) { sp.classList.add('gone'); sp.style.display = 'none'; }
  } else {
    drawSplash();
  }
  rolloverLivesIfNeeded();
  await fetchFlags();
  applyLang();
  wireUI();
  layoutCanvas();
  renderHUD();
  renderMap();
  switchTab(state.activeTab || 'play');
  pollPurchases();
  pushHeartbeat();
  setInterval(pushHeartbeat, 60000);
  setInterval(pollPurchases, 45000);
  setInterval(() => { rolloverLivesIfNeeded(); renderHUD(); }, 30000);
  // splash dismiss
  document.getElementById('splash').addEventListener('click', () => {
    dismissSplash();
    if (!state.welcomed || !state.ftueDone) {
      state.welcomed = true; saveState();
      setTimeout(startFTUE, 350);
    }
  });
  // first life lock check
  checkAchievements();
  mp('app_open', { lang: state.settings.lang, version: VERSION, level: state.maxLevelUnlocked });
  flushMP();
  // i18n texts for static elements
  const sub = document.getElementById('splash-sub');
  if (sub) sub.textContent = t('splash_tap');
}

boot();
