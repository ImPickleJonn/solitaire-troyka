<head>

<title>Solitaire Troyka</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
/* v0.8: Universal kawaii font rule — beats every legacy explicit family declaration in one shot */
*{font-family:'Fredoka','Baloo 2',-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',system-ui,sans-serif!important;-webkit-tap-highlight-color:transparent}
/* =========================================================
   Solitaire Troyka — single-file styles
   ========================================================= */
:root{
  --bg-0:#fef6e4;
  --bg-1:#fff3dc;
  --bg-2:#ffe7f0;
  --accent:#ffd84a;
  --accent-2:#ff6e9c;
  --accent-3:#a3e060;
  /* v0.8 kawaii palette (Dumpling-Drop-aligned) — chocolate ink, cream paper, golden buttons */
  --ink:#5a3a18;
  --ink-deep:#4a2412;
  --ink-soft:#a85a18;
  --ink-dim:rgba(74,36,18,.45);
  --paper:#fff7e6;
  --gold:#ffd84a;
  --gold-deep:#d68a18;
  --bg-mid:#ff9e5e;
  --candy-pink:#ff6e9c;
  --candy-purple:#a259ff;
  --candy-green:#a3e060;
  --btn-top:#ffe896;
  --btn-mid:#ffd24a;
  --btn-low:#f5b528;
  --btn-bot:#e09a1e;
  --btn-shadow:#9a5e14;
  --btn-border:#6e4310;
  --card-face:#ffffff;
  --card-back-a:#1e8be5;
  --card-back-b:#3aa5ee;
  --tab-h:64px;
  --safe-top:0px;
  --safe-bottom:0px;
  --hud-h:56px;
  --bar-h:210px; /* v0.8 — was 72px. Now holds stock-row + booster-row stacked */
  --pill-bg:#fff7e6;
  --pill-bg-strong:#ffe2a8;
  --shadow-1:0 4px 14px rgba(74,36,18,.32);
  --shadow-2:0 10px 30px rgba(74,36,18,.45);
  --vignette:rgba(74,36,18,.40);
  --disney-navy:#1e2a5a;
  --disney-red:#c8243a;
  --popup-green:#a3e060;
  --tut-red:#ff6e9c;
  --tut-blue:#4ec5ff;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
html,body{margin:0;padding:0;height:100%;overflow:hidden;background:var(--bg-0);color:var(--ink);font-family:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;-webkit-font-smoothing:antialiased;font-feature-settings:"tnum"}
body{overscroll-behavior:none;touch-action:manipulation}
button{font-family:inherit;color:inherit;background:none;border:0;cursor:pointer;padding:0;font-weight:600}
#app{
  position:fixed;inset:0;
  background:
    radial-gradient(120% 80% at 50% -10%, rgba(91,42,160,.95) 0%, rgba(42,15,90,.95) 40%, rgba(20,8,50,1) 80%),
    linear-gradient(180deg,#1a0b2e 0%, #0b0420 100%);
  padding-top:var(--safe-top);
  padding-bottom:calc(var(--safe-bottom) + var(--tab-h));
  display:flex;flex-direction:column;
}
/* sparkles bg */
#app::before{
  content:"";position:absolute;inset:0;pointer-events:none;
  background-image:
    radial-gradient(2px 2px at 10% 18%, rgba(255,255,255,.55), transparent 60%),
    radial-gradient(1.5px 1.5px at 80% 22%, rgba(255,209,102,.6), transparent 60%),
    radial-gradient(2px 2px at 25% 70%, rgba(255,255,255,.4), transparent 60%),
    radial-gradient(1px 1px at 70% 88%, rgba(6,214,160,.5), transparent 60%),
    radial-gradient(1.5px 1.5px at 50% 40%, rgba(255,255,255,.35), transparent 60%);
  opacity:.85;
  animation:twinkle 6s ease-in-out infinite;
}
@keyframes twinkle{0%,100%{opacity:.85}50%{opacity:.55}}

/* ---------- topbar ---------- */
.topbar{
  position:relative;z-index:5;
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px 6px;gap:8px;
}
.brand{display:flex;align-items:center;gap:6px;font-weight:800;font-size:14px;letter-spacing:.4px}
.brand .logo{
  width:28px;height:28px;border-radius:8px;
  background:linear-gradient(135deg,#ffd166,#ef476f);
  display:grid;place-items:center;font-size:16px;color:#1a0b2e;
  box-shadow:var(--shadow-1)
}
.hud{display:flex;align-items:center;gap:6px}
.pill{
  display:flex;align-items:center;gap:5px;
  background:var(--pill-bg);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(6px);
  border-radius:999px;
  padding:5px 10px;
  font-size:12px;font-weight:700;
}
.pill .ic{font-size:13px;line-height:1}
.pill.coin{color:#ffd166}
.pill.star{color:#fff}
.pill.streak{color:#ff7a59}
.pill button.add{
  width:18px;height:18px;border-radius:50%;
  background:var(--accent);color:#1a0b2e;
  font-size:13px;display:grid;place-items:center;margin-left:2px;
  font-weight:900
}
.icon-btn{
  width:34px;height:34px;border-radius:10px;
  background:var(--pill-bg);
  display:grid;place-items:center;font-size:16px;
  border:1px solid rgba(255,255,255,.08);
}
.icon-btn:active{transform:scale(.95)}

/* ---------- main + tabs ---------- */
main{flex:1;position:relative;overflow:hidden}
.tab-view{
  position:absolute;inset:0;
  display:none;
  overflow:hidden;
}
.tab-view.active{display:flex;flex-direction:column}

/* ---------- map screen ---------- */
#map-screen{
  flex:1;position:relative;
  overflow-y:auto;overflow-x:hidden;
  scrollbar-width:none;
}
#map-screen::-webkit-scrollbar{display:none}
#map-scroller{
  position:relative;
  padding:12px 0 32px;
}
.map-header{
  text-align:center;padding:14px 18px 6px;
}
.map-header h2{margin:0;font-size:20px;letter-spacing:.5px}
.map-header p{margin:4px 0 0;color:var(--ink-soft);font-size:12px}
.map-path{
  position:relative;width:100%;
}
.map-node{
  position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:88px;height:88px;margin:14px auto;
  border-radius:24px;
  background:linear-gradient(180deg, #ffd166 0%, #f59e3b 100%);
  color:#1a0b2e;box-shadow:0 6px 0 #b97a1c, 0 12px 24px rgba(0,0,0,.45);
  font-weight:900;
  transition:transform .15s ease;
}
.map-node:active{transform:translateY(2px);box-shadow:0 4px 0 #b97a1c, 0 8px 18px rgba(0,0,0,.45)}
.map-node.locked{
  background:linear-gradient(180deg,#3a2c5a,#28204a);
  color:#7b6ea0;box-shadow:0 4px 0 #1a1130, 0 6px 14px rgba(0,0,0,.4);
}
.map-node.current{
  animation:bob 1.4s ease-in-out infinite;
  outline:3px solid rgba(255,255,255,.6);outline-offset:3px;
}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.map-node .n-num{font-size:22px;line-height:1}
.map-node .n-stars{font-size:10px;margin-top:3px;letter-spacing:1px;opacity:.85}
.map-node .lock{font-size:24px}
.map-node[data-side="L"]{transform:translateX(-72px)}
.map-node[data-side="R"]{transform:translateX(72px)}
.map-node[data-side="L"]:active{transform:translateX(-72px) translateY(2px)}
.map-node[data-side="R"]:active{transform:translateX(72px) translateY(2px)}
.map-node[data-side="L"].current{transform:translateX(-72px)}
.map-node[data-side="R"].current{transform:translateX(72px)}
.map-line{
  position:absolute;left:50%;width:3px;background:rgba(255,255,255,.18);
  border-radius:2px;
}

/* play button at bottom of map */
#play-fab-wrap{
  position:fixed;left:0;right:0;
  bottom:calc(var(--safe-bottom) + var(--tab-h) + 14px);
  display:flex;justify-content:center;pointer-events:none;z-index:6;
}
#play-fab{
  pointer-events:auto;
  background:linear-gradient(135deg,#06d6a0,#0fb98a);
  color:#0a3320;
  padding:14px 28px;border-radius:999px;
  font-weight:900;font-size:16px;letter-spacing:.5px;
  box-shadow:0 6px 0 #057a55, 0 12px 24px rgba(0,0,0,.4);
  display:flex;align-items:center;gap:8px;
}
#play-fab:active{transform:translateY(2px);box-shadow:0 4px 0 #057a55, 0 8px 18px rgba(0,0,0,.4)}

/* ---------- play screen ---------- */
#play-screen{display:none;flex:1;flex-direction:column;position:relative}
#play-screen.active{display:flex}
#play-hud{
  height:var(--hud-h);min-height:var(--hud-h);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 12px;gap:8px;
}
#play-hud .stats{display:flex;align-items:center;gap:6px}
#play-hud .lvl-pill{
  background:linear-gradient(135deg,#ffd166,#ef476f);
  color:#1a0b2e;font-weight:900;padding:6px 10px;border-radius:10px;font-size:12px;letter-spacing:.6px
}
#play-hud .score{font-weight:900;font-size:20px}
#play-hud .target{font-size:11px;color:var(--ink-soft)}
.combo-dots{
  flex:1;display:flex;align-items:center;justify-content:center;gap:6px;margin:0 8px;
  position:relative;height:18px;
}
.cdot{
  width:11px;height:11px;border-radius:50%;
  background:rgba(255,255,255,.10);
  border:1px solid rgba(255,255,255,.18);
  transition:transform .18s cubic-bezier(.18,1.6,.45,.95), background .18s, box-shadow .18s, border-color .18s;
}
.cdot.lit{
  background:linear-gradient(135deg,#06d6a0,#ffd166);
  border-color:transparent;
  box-shadow:0 0 8px rgba(255,209,102,.7), inset 0 0 4px rgba(255,255,255,.5);
  transform:scale(1.25);
}
.cdot.tier2{background:linear-gradient(135deg,#ffd166,#ef476f);box-shadow:0 0 10px rgba(255,209,102,.8)}
.cdot.tier3{background:linear-gradient(135deg,#ef476f,#a83af0);box-shadow:0 0 12px rgba(239,71,111,.8)}
.cdot.tier4{background:linear-gradient(135deg,#a83af0,#06d6a0);box-shadow:0 0 16px rgba(168,58,240,.9)}
.combo-mult{
  position:absolute;right:0;top:50%;transform:translateY(-50%);
  font-size:11px;font-weight:900;letter-spacing:.4px;color:#ffd166;
  opacity:0;transition:opacity .2s ease;
}
.combo-mult.show{opacity:1}
#game-canvas{
  flex:1;width:100%;display:block;
  background:transparent;
  touch-action:none;
  position:relative;z-index:2;   /* v0.5: must paint ABOVE .scene-bg */
}
/* v0.8: Two-row stacked layout — stock+waste row on top, boosters below.
   Container is column-flex; --bar-h is bumped to 210px in :root. */
#play-bar{
  height:var(--bar-h);min-height:var(--bar-h);
  display:flex;flex-direction:column;align-items:stretch;justify-content:flex-start;
  gap:10px;
  padding:10px 12px calc(12px + var(--safe-bottom));
  box-sizing:border-box;
  position:relative;
}
#stock-row{
  display:flex;flex-direction:row;
  align-items:flex-end;justify-content:center;
  gap:18px;width:100%;height:130px;
  position:relative;z-index:1;
}
.booster-row{
  display:flex;flex-direction:row;align-items:center;justify-content:center;
  gap:8px;width:100%;
}
.booster{
  position:relative;
  width:48px;height:54px;border-radius:14px;
  background:var(--pill-bg-strong);
  border:1px solid rgba(255,255,255,.1);
  display:grid;place-items:center;font-size:24px;
  transition:transform .12s ease;
}
.booster:active{transform:scale(.92)}
.booster .count{
  position:absolute;right:-4px;top:-4px;
  min-width:18px;height:18px;border-radius:10px;
  background:var(--accent);color:#1a0b2e;
  font-size:10px;font-weight:900;display:grid;place-items:center;padding:0 4px;
}
.booster.empty{opacity:.55}
.booster.empty .count{background:rgba(255,255,255,.2);color:#fff}
.booster.armed{outline:3px solid var(--accent);outline-offset:2px;animation:pulseArm .8s ease-in-out infinite}
@keyframes pulseArm{0%,100%{box-shadow:0 0 0 0 rgba(255,209,102,.5)}50%{box-shadow:0 0 0 8px rgba(255,209,102,0)}}
/* v0.6: Disney-style fanned stock pile — the deck visibly stacks horizontally
   so the player feels the depth. Each edge is ~3px wider than the last. */
.stock-pile{
  position:relative;width:140px;height:130px;
  cursor:pointer;flex:0 0 auto;
}
.stock-pile .stock-empty{
  position:absolute;left:0;top:0;width:84px;height:118px;
  border-radius:11px;
  border:2px dashed rgba(74,36,18,.45);
  background:rgba(255,255,255,.30);
}
.stock-card-back{
  position:absolute;top:0;width:84px;height:118px;border-radius:11px;
  background:#fff;
  /* white border baked into the bg by drawing only the inner royal panel */
  box-shadow:0 2px 0 rgba(74,36,18,.30), 0 3px 6px rgba(74,36,18,.18);
  border:2px solid #fff;
  transition:transform .18s cubic-bezier(.34,1.56,.64,1);
}
.stock-card-back::before{
  content:'';position:absolute;inset:2px;border-radius:9px;
  background:#1e8be5; /* v0.8 cobalt — matches Pixi card-back palette */
}
.stock-card-back::after{
  content:'';position:absolute;inset:6px;border-radius:6px;
  background:#3aa5ee;
  box-shadow:inset 0 0 0 1px rgba(0,0,0,.12);
}
.stock-card-back.top{
  box-shadow:0 4px 0 rgba(74,36,18,.40), 0 8px 14px rgba(74,36,18,.30);
}
.stock-card-back.top::after{
  background:
    radial-gradient(circle at 50% 55%, rgba(255,247,194,.55) 0%, transparent 35%),
    #3aa5ee;
}
.stock-card-back.top .star{
  position:absolute;inset:0;display:grid;place-items:center;
  color:rgba(255,247,194,.55);
  font:700 22px Inter,sans-serif;
  text-shadow:0 1px 0 rgba(0,0,0,.2);
}
.stock-pile.drawing .stock-card-back.top{transform:translateY(-6px) rotate(-3deg)}
/* Count badge now visually subordinate — only shown over a STACK of 1 */
.stock-count{
  position:absolute;bottom:-6px;right:-6px;
  background:#c92f4d;color:#fff;border:2px solid #fff;
  font-family:'Fredoka','Inter',sans-serif;
  font-size:11px;font-weight:700;
  padding:2px 7px;border-radius:10px;
  box-shadow:0 2px 0 rgba(0,0,0,.3);
  display:none;
}
.stock-pile.low .stock-count{display:block}
.waste-pile{position:relative;width:84px;height:118px;filter:drop-shadow(0 0 12px rgba(255,216,74,.35));flex:0 0 auto}
.combo-callout{
  position:absolute;left:50%;top:38%;
  transform:translate(-50%,-50%) scale(.4);opacity:0;
  font-weight:900;font-size:34px;letter-spacing:1px;
  text-shadow:0 4px 10px rgba(0,0,0,.6),0 0 16px rgba(255,209,102,.6);
  pointer-events:none;color:#ffd166;
  transition:transform .25s cubic-bezier(.18,1.6,.45,.95),opacity .25s ease;
}
.combo-callout.show{transform:translate(-50%,-50%) scale(1.15);opacity:1}

/* floating +score popups (canvas-rendered actually, but keep style for tooltip) */

/* ---------- bottom tabs ---------- */
.bottom-tabs{
  position:fixed;left:0;right:0;
  bottom:0;
  height:calc(var(--safe-bottom) + var(--tab-h));
  padding-bottom:var(--safe-bottom);
  display:flex;align-items:stretch;
  background:rgba(20,8,50,.92);
  backdrop-filter:blur(10px);
  border-top:1px solid rgba(255,255,255,.06);
  z-index:20;
}
.tab-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  color:var(--ink-dim);font-size:11px;font-weight:700;letter-spacing:.4px;
  transition:color .15s ease;
}
.tab-btn .ic{font-size:22px;line-height:1}
.tab-btn.active{color:var(--accent)}
.tab-btn.active .ic{filter:drop-shadow(0 0 6px rgba(255,209,102,.5))}

/* ---------- shop tab ---------- */
#view-shop{padding:0}
#shop-scroll{flex:1;overflow-y:auto;padding:8px 12px 20px}
#shop-scroll::-webkit-scrollbar{display:none}
.shop-section-title{font-size:13px;letter-spacing:1.2px;font-weight:800;color:var(--ink-soft);margin:14px 4px 8px;text-transform:uppercase}
.shop-featured{
  margin:6px 0 4px;border-radius:18px;
  background:linear-gradient(135deg,#ffd166 0%,#ef476f 100%);
  color:#1a0b2e;
  padding:14px;display:flex;gap:12px;align-items:center;
  box-shadow:var(--shadow-2);
}
.shop-featured .icon{font-size:42px}
.shop-featured h3{margin:0 0 4px;font-size:16px;font-weight:900}
.shop-featured .sub{font-size:12px;font-weight:600;opacity:.85}
.shop-featured .buy{
  margin-left:auto;background:#1a0b2e;color:#ffd166;
  border-radius:14px;padding:10px 14px;font-weight:900;font-size:13px;
  display:flex;align-items:center;gap:4px;
}
.shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.shop-card{
  background:var(--pill-bg);
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;
  padding:12px;display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;
  position:relative
}
.shop-card .ic{font-size:30px;margin-top:4px}
.shop-card h4{margin:2px 0 0;font-size:13px;font-weight:800}
.shop-card .sub{font-size:11px;color:var(--ink-soft);min-height:28px}
.shop-card .buy{
  margin-top:6px;background:var(--accent);color:#1a0b2e;
  border-radius:12px;padding:8px 0;font-weight:900;font-size:13px;width:100%;
}
.shop-card.owned .buy{background:rgba(255,255,255,.1);color:var(--ink-soft)}

/* ---------- earn tab ---------- */
#view-earn{padding:0}
#earn-scroll{flex:1;overflow-y:auto;padding:8px 12px 20px}
#earn-scroll::-webkit-scrollbar{display:none}
.bp-banner{
  margin:6px 0 8px;border-radius:14px;
  background:linear-gradient(135deg,#6a3df0,#a83af0);
  padding:12px;display:flex;justify-content:space-between;align-items:center;
  box-shadow:var(--shadow-1)
}
.bp-banner h4{margin:0;font-size:13px;font-weight:900}
.bp-banner .days{font-size:11px;opacity:.85}
.bp-banner button{background:#1a0b2e;color:#ffd166;border-radius:10px;padding:8px 12px;font-weight:900;font-size:12px}
.chest-card{
  background:var(--pill-bg);
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;padding:12px;margin-bottom:10px;
}
.chest-card h4{margin:0 0 8px;font-size:14px;font-weight:800}
.chest-row{display:flex;gap:6px;justify-content:space-between}
.chest-cell{
  flex:1;background:rgba(255,255,255,.04);border-radius:10px;
  padding:8px 4px;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  font-size:10px;font-weight:700;color:var(--ink-soft);
  border:1px solid transparent;
  position:relative
}
.chest-cell.claimed{background:rgba(6,214,160,.15);border-color:rgba(6,214,160,.4);color:#fff}
.chest-cell.today{background:rgba(255,209,102,.18);border-color:rgba(255,209,102,.6);color:#fff;animation:pulseChest 1.4s ease-in-out infinite}
@keyframes pulseChest{0%,100%{box-shadow:0 0 0 0 rgba(255,209,102,.5)}50%{box-shadow:0 0 0 6px rgba(255,209,102,0)}}
.chest-cell .ic{font-size:18px;margin-top:2px}
.chest-cell .rw{font-weight:900;color:#ffd166;font-size:11px}
.chest-claim{
  margin-top:10px;width:100%;background:var(--accent);color:#1a0b2e;
  border-radius:12px;padding:10px;font-weight:900;font-size:13px;
}
.chest-claim:disabled,.chest-claim.disabled{background:rgba(255,255,255,.1);color:var(--ink-dim)}
.mission{
  display:flex;align-items:center;gap:10px;
  background:var(--pill-bg);border:1px solid rgba(255,255,255,.06);
  border-radius:14px;padding:10px;margin-bottom:8px;
}
.mission .ic{font-size:24px}
.mission .body{flex:1}
.mission .body h5{margin:0;font-size:13px;font-weight:800}
.mission .body .sub{font-size:11px;color:var(--ink-soft);margin-top:2px}
.mission .reward{font-size:11px;color:#ffd166;font-weight:800;margin-top:2px}
.mission .btn{
  background:var(--accent);color:#1a0b2e;
  padding:8px 12px;border-radius:10px;font-weight:900;font-size:12px;
}
.mission .btn.check{background:#3a76ff;color:#fff}
.mission .btn.done{background:rgba(255,255,255,.1);color:var(--ink-dim)}
.lb-card{
  background:var(--pill-bg);border:1px solid rgba(255,255,255,.06);
  border-radius:14px;padding:10px 12px;margin-top:14px;
}
.lb-card h4{margin:0 0 8px;font-size:14px;font-weight:800}
.lb-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px}
.lb-row:last-child{border-bottom:0}
.lb-row .rank{width:22px;font-weight:900;color:var(--accent)}
.lb-row .name{flex:1}
.lb-row .pts{font-weight:800}
.lb-row.me{background:rgba(255,209,102,.1);border-radius:8px;padding:6px 8px}

/* ---------- modals ---------- */
#modal-root{position:fixed;inset:0;z-index:50;display:none;align-items:flex-end;justify-content:center;
  background:rgba(8,3,22,.6);backdrop-filter:blur(6px)}
#modal-root.open{display:flex}
.modal{
  width:100%;max-width:520px;margin:0 auto;
  background:linear-gradient(180deg,#2b1656 0%,#1a0b2e 100%);
  border-radius:24px 24px 0 0;
  border-top:1px solid rgba(255,255,255,.08);
  padding:18px 18px calc(18px + var(--safe-bottom));
  box-shadow:0 -10px 40px rgba(0,0,0,.6);
  animation:slideUp .25s ease;
  position:relative;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal h3{margin:0 0 6px;font-size:18px;font-weight:900;text-align:center}
.modal p{margin:4px 0;color:var(--ink-soft);font-size:13px;text-align:center}
.modal .x{position:absolute;right:12px;top:10px;width:32px;height:32px;border-radius:50%;background:var(--pill-bg);display:grid;place-items:center;font-size:16px}
.modal .cta-row{display:flex;gap:10px;margin-top:14px}
.modal .cta{
  flex:1;background:var(--accent);color:#1a0b2e;
  border-radius:14px;padding:14px;font-weight:900;font-size:15px;
}
.modal .cta.secondary{background:var(--pill-bg);color:var(--ink)}
.modal .cta.danger{background:var(--accent-2);color:#fff}

.stars-display{display:flex;gap:8px;justify-content:center;margin:12px 0}
.stars-display .st{font-size:36px;filter:grayscale(1);opacity:.4;transform:scale(.7)}
.stars-display .st.lit{filter:none;opacity:1;transform:scale(1);animation:starPop .4s ease}
@keyframes starPop{0%{transform:scale(.2) rotate(-30deg)}60%{transform:scale(1.3) rotate(10deg)}100%{transform:scale(1) rotate(0)}}
.reward-row{display:flex;gap:8px;justify-content:center;margin:10px 0}
.reward-chip{
  background:rgba(255,255,255,.08);border-radius:10px;padding:6px 10px;
  display:flex;align-items:center;gap:4px;font-size:13px;font-weight:800
}

/* FTUE coach mark */
.ftue-canvas-wrap{
  margin:14px auto;width:100%;max-width:280px;height:200px;
  background:rgba(0,0,0,.25);border-radius:14px;position:relative;overflow:hidden;
}
.ftue-dots{display:flex;gap:6px;justify-content:center;margin-top:8px}
.ftue-dots .d{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.25)}
.ftue-dots .d.on{background:var(--accent)}

/* settings */
.set-row{display:flex;align-items:center;justify-content:space-between;padding:10px 4px;border-bottom:1px solid rgba(255,255,255,.06)}
.set-row:last-child{border-bottom:0}
.set-row .lbl{font-size:14px}
.toggle{
  width:46px;height:26px;background:rgba(255,255,255,.15);border-radius:14px;position:relative;transition:background .2s
}
.toggle.on{background:var(--accent-3)}
.toggle .dot{position:absolute;top:3px;left:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:transform .2s}
.toggle.on .dot{transform:translateX(20px)}
.lang-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:6px}
.lang-cell{
  background:var(--pill-bg);border:1px solid rgba(255,255,255,.06);
  border-radius:10px;padding:8px;text-align:center;font-size:12px;font-weight:800
}
.lang-cell.on{background:var(--accent);color:#1a0b2e;border-color:transparent}

/* ---------- toasts ---------- */
#toast-root{position:fixed;left:0;right:0;top:calc(var(--safe-top) + 64px);z-index:60;display:flex;flex-direction:column;align-items:center;gap:6px;pointer-events:none}
.toast{
  background:rgba(20,8,50,.95);
  color:#fff;
  border:1px solid rgba(255,255,255,.1);
  border-radius:12px;
  padding:8px 14px;font-size:13px;font-weight:700;
  box-shadow:var(--shadow-1);
  animation:toastIn .25s ease, toastOut .3s ease 2.4s forwards;
  max-width:80%;text-align:center;
}
@keyframes toastIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{to{opacity:0;transform:translateY(-12px)}}

/* RTL */
html[dir="rtl"] .map-node[data-side="L"]{transform:translateX(72px)}
html[dir="rtl"] .map-node[data-side="R"]{transform:translateX(-72px)}

/* ---------- lives pill ---------- */
.pill.lives{color:#ff7a7a}
.pill.lives .timer{font-size:9px;font-weight:700;color:var(--ink-dim);margin-left:2px}

/* ---------- splash screen ---------- */
#splash{
  position:fixed;inset:0;z-index:200;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(120% 100% at 50% 0%, rgba(255,209,102,.25) 0%, transparent 60%),
             radial-gradient(120% 100% at 50% 110%, rgba(168,58,240,.35) 0%, transparent 65%),
             linear-gradient(180deg,#1a0b2e 0%, #0b0420 100%);
  opacity:1;transition:opacity .5s ease;
}
#splash.gone{opacity:0;pointer-events:none}
#splash-canvas{width:300px;height:200px;display:block}
#splash-title{margin-top:-20px;font-size:32px;font-weight:900;letter-spacing:1px;text-shadow:0 6px 18px rgba(0,0,0,.5);
  background:linear-gradient(135deg,#ffd166,#ef476f);-webkit-background-clip:text;background-clip:text;color:transparent}
#splash-sub{margin-top:8px;color:var(--ink-soft);font-size:13px;font-weight:700;letter-spacing:1px;animation:tapBlink 1.5s ease-in-out infinite}
@keyframes tapBlink{0%,100%{opacity:.4}50%{opacity:1}}

/* ---------- mascot ---------- */
.mascot-bubble{
  position:absolute;left:12px;top:80px;z-index:10;display:flex;align-items:flex-end;gap:8px;pointer-events:none;opacity:0;transition:opacity .3s ease, transform .3s ease;transform:translateY(8px);
}
.mascot-bubble.show{opacity:1;transform:translateY(0)}
.mascot-canvas{width:54px;height:54px}
.mascot-text{
  background:rgba(255,255,255,.92);color:#1a0b2e;
  border-radius:14px;padding:6px 10px;font-size:11px;font-weight:800;max-width:170px;
  box-shadow:var(--shadow-1);position:relative;
}
.mascot-text::after{content:"";position:absolute;left:-8px;bottom:8px;border:6px solid transparent;border-right-color:rgba(255,255,255,.92)}

/* ---------- world header band ---------- */
.world-band{
  position:relative;margin:14px 0 8px;padding:14px 16px;border-radius:18px;overflow:hidden;
  display:flex;align-items:center;gap:12px;
  box-shadow:var(--shadow-2);
}
.world-band .wb-icon{font-size:42px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.4))}
.world-band .wb-text{flex:1}
.world-band .wb-text h3{margin:0;font-size:18px;font-weight:900;letter-spacing:.4px}
.world-band .wb-text p{margin:2px 0 0;font-size:11px;color:rgba(255,255,255,.8)}
.world-band .wb-stars{
  display:flex;align-items:center;gap:4px;background:rgba(0,0,0,.3);padding:6px 10px;border-radius:12px;
  font-weight:900;font-size:12px;
}
.world-band.locked{opacity:.55}
.world-band.locked .wb-icon{filter:grayscale(.7) brightness(.7)}
.world-band .chest-btn{
  position:absolute;right:12px;bottom:-12px;
  background:linear-gradient(135deg,#ffd166,#ef476f);color:#1a0b2e;
  padding:6px 14px;border-radius:14px;font-weight:900;font-size:11px;letter-spacing:.5px;
  box-shadow:0 4px 0 #b97a1c, 0 10px 20px rgba(0,0,0,.4);
  animation:bob 1.4s ease-in-out infinite;
}

/* world chooser chip row */
.world-chips{
  display:flex;gap:6px;overflow-x:auto;padding:8px 12px 4px;
  scroll-snap-type:x mandatory;scrollbar-width:none;
}
.world-chips::-webkit-scrollbar{display:none}
.world-chip{
  flex:0 0 auto;scroll-snap-align:center;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);
  padding:8px 12px;border-radius:14px;
  display:flex;align-items:center;gap:6px;
  font-size:12px;font-weight:800;color:var(--ink-soft);
  transition:transform .15s, background .15s;
}
.world-chip .wic{font-size:18px}
.world-chip.on{background:linear-gradient(135deg,var(--accent),#ef476f);color:#1a0b2e;border-color:transparent;transform:scale(1.05)}
.world-chip.locked{opacity:.45}
.world-chip .ws{font-size:10px;background:rgba(0,0,0,.25);padding:2px 6px;border-radius:8px;color:#fff;font-weight:700}
.world-chip.on .ws{background:rgba(255,255,255,.3);color:#1a0b2e}

/* S-curve path within a world */
.s-path{
  position:relative;width:100%;
}
.s-node{
  position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:84px;height:84px;
  border-radius:22px;
  background:linear-gradient(180deg, #ffd166 0%, #f59e3b 100%);
  color:#1a0b2e;box-shadow:0 5px 0 #b97a1c, 0 10px 22px rgba(0,0,0,.45);
  font-weight:900;
  border:0;cursor:pointer;
  transition:transform .15s ease;
}
.s-node:active{transform:translateY(2px);box-shadow:0 3px 0 #b97a1c, 0 6px 14px rgba(0,0,0,.45)}
.s-node.locked{
  background:linear-gradient(180deg,#3a2c5a,#28204a);color:#7b6ea0;
  box-shadow:0 3px 0 #1a1130, 0 5px 12px rgba(0,0,0,.4);cursor:default;
}
.s-node.current{
  outline:3px solid rgba(255,255,255,.7);outline-offset:3px;
  animation:bob 1.4s ease-in-out infinite;
}
.s-node.boss{
  background:linear-gradient(180deg,#ef476f 0%, #c92f4d 100%);
  box-shadow:0 5px 0 #7a1c30, 0 10px 22px rgba(0,0,0,.5);
  width:96px;height:96px;border-radius:26px;
}
.s-node .nnum{font-size:22px;line-height:1}
.s-node.boss .nnum{font-size:24px;color:#fff}
.s-node .nstars{font-size:10px;margin-top:3px;letter-spacing:1px;opacity:.85}
.s-node.boss .nstars{color:#fff}
.s-node .lock{font-size:24px}
.s-path-svg{position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:none}
.s-chest{
  position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:96px;height:96px;border-radius:24px;
  background:linear-gradient(135deg,#ffd166,#ef476f);color:#1a0b2e;
  box-shadow:0 6px 0 #b97a1c, 0 12px 30px rgba(0,0,0,.55);
  font-weight:900;font-size:11px;text-align:center;letter-spacing:.4px;
  border:0;cursor:pointer;animation:bob 1.2s ease-in-out infinite;
}
.s-chest .ci{font-size:32px;line-height:1;margin-bottom:2px}
.s-chest.locked{background:linear-gradient(135deg,#3a2c5a,#28204a);color:#7b6ea0;box-shadow:0 4px 0 #1a1130;animation:none;cursor:default}
.world-meta{
  text-align:center;padding:6px 14px 14px;color:var(--ink-soft);font-size:12px;
}
.world-meta strong{color:#fff;font-size:14px}
.daily-pill{
  margin:8px 12px 0;padding:12px;
  background:linear-gradient(135deg,#06d6a0,#118ab2);
  color:#fff;border-radius:14px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  box-shadow:var(--shadow-1)
}
.daily-pill h4{margin:0;font-size:13px;font-weight:900}
.daily-pill p{margin:1px 0 0;font-size:11px;opacity:.85}
.daily-pill button{background:#1a0b2e;color:#06d6a0;padding:8px 12px;border-radius:10px;font-weight:900;font-size:12px}

/* ---------- pre-level screen ---------- */
.pre-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:10px 0}
.pre-card{
  background:var(--pill-bg-strong);border:1px solid rgba(255,255,255,.08);
  border-radius:14px;padding:10px 6px;text-align:center;
  position:relative;transition:transform .12s;
}
.pre-card:active{transform:scale(.95)}
.pre-card.equipped{outline:3px solid var(--accent);outline-offset:-3px;background:rgba(255,209,102,.18)}
.pre-card .ic{font-size:30px}
.pre-card .nm{font-size:12px;font-weight:800;margin-top:2px}
.pre-card .sb{font-size:10px;color:var(--ink-soft);margin-top:2px;min-height:22px}
.pre-card .cnt{position:absolute;right:-4px;top:-4px;background:var(--accent);color:#1a0b2e;font-size:10px;font-weight:900;padding:2px 6px;border-radius:8px}
.pre-card .cnt.empty{background:rgba(255,255,255,.15);color:#fff}
.target-row{display:flex;justify-content:space-around;background:rgba(255,255,255,.04);border-radius:12px;padding:10px;margin:8px 0}
.target-row .tg{text-align:center}
.target-row .tg .lbl{font-size:10px;color:var(--ink-soft);font-weight:700}
.target-row .tg .val{font-size:16px;font-weight:900;margin-top:2px}

/* ---------- postcards UI ---------- */
.postcard-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:8px 0 14px}
.postcard-cell{
  position:relative;border-radius:14px;overflow:hidden;
  background:linear-gradient(135deg,#2a0f5a,#1a0b2e);
  padding-bottom:8px;cursor:pointer;
}
.postcard-cell.locked{opacity:.5}
.postcard-cell canvas{width:100%;height:120px;display:block;background:rgba(0,0,0,.18)}
.postcard-cell .pc-title{font-size:12px;font-weight:900;margin:6px 8px 0;text-align:center}
.postcard-cell .pc-progress{font-size:10px;text-align:center;color:var(--ink-soft);margin-top:2px}
.postcard-cell .pc-progress .bar{display:block;width:80%;height:5px;margin:4px auto 0;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.postcard-cell .pc-progress .bar .fill{display:block;height:100%;background:linear-gradient(90deg,#06d6a0,#ffd166)}
.postcard-cell.complete{border:2px solid #ffd166;box-shadow:0 0 20px rgba(255,209,102,.4)}

/* ---------- achievements grid ---------- */
.ach-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:6px 0 14px}
.ach-cell{
  position:relative;background:var(--pill-bg);border:1px solid rgba(255,255,255,.06);
  border-radius:12px;padding:8px 4px;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:2px;
}
.ach-cell.unlocked{background:rgba(6,214,160,.12);border-color:rgba(6,214,160,.35)}
.ach-cell.claimed{background:rgba(255,209,102,.12);border-color:rgba(255,209,102,.4)}
.ach-cell .ic{font-size:24px;filter:grayscale(1);opacity:.5;transition:all .3s}
.ach-cell.unlocked .ic, .ach-cell.claimed .ic{filter:none;opacity:1}
.ach-cell .nm{font-size:10px;font-weight:800;line-height:1.2;min-height:24px}
.ach-cell .rw{font-size:10px;font-weight:900;color:#ffd166;margin-top:2px}
.ach-cell.unlocked .rw::after{content:" ↳ tap"}
.ach-cell.claimed::after{content:"✓";position:absolute;top:4px;right:4px;color:#ffd166;font-size:11px;font-weight:900}

/* ---------- stats panel ---------- */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:6px 0 14px}
.stat-cell{background:var(--pill-bg);border-radius:12px;padding:10px;text-align:center}
.stat-cell .v{font-size:20px;font-weight:900;color:#ffd166}
.stat-cell .l{font-size:11px;color:var(--ink-soft);margin-top:2px}

/* ---------- big achievement toast ---------- */
.ach-popup{
  position:fixed;left:50%;top:30%;transform:translate(-50%,-50%) scale(.3);
  background:linear-gradient(135deg,#ffd166,#ef476f);color:#1a0b2e;
  padding:14px 18px;border-radius:18px;font-weight:900;
  box-shadow:0 10px 40px rgba(0,0,0,.5),0 0 80px rgba(255,209,102,.3);
  display:flex;align-items:center;gap:10px;z-index:80;
  opacity:0;transition:opacity .25s ease, transform .25s cubic-bezier(.18,1.6,.45,.95);
  pointer-events:none;
}
.ach-popup.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.ach-popup .ic{font-size:32px}
.ach-popup .t{font-size:11px;letter-spacing:.6px;opacity:.7}
.ach-popup .nm{font-size:15px}

/* ---------- coin rain overlay ---------- */
.coin-rain-canvas{position:absolute;inset:0;pointer-events:none;z-index:30}

/* ---------- world chest modal ---------- */
.world-chest-art{
  margin:10px auto 6px;width:160px;height:140px;display:block;
  filter:drop-shadow(0 10px 30px rgba(255,209,102,.4));
}

/* ---------- mode tabs (endless/daily) ---------- */
.mode-tabs{display:flex;gap:6px;justify-content:center;margin:8px 0 0;padding:0 12px}
.mode-tab{
  flex:1;background:var(--pill-bg);border-radius:10px;padding:6px 8px;
  text-align:center;font-size:11px;font-weight:800;color:var(--ink-soft);
  border:1px solid rgba(255,255,255,.06);
}
.mode-tab.on{background:linear-gradient(135deg,#06d6a0,#118ab2);color:#fff;border-color:transparent}

/* ============================================
   [Z] Massive UI overhaul (v0.3 — Disney-aligned)
   ============================================ */

/* In-play mode: hide tab bar + non-essential HUD pills + brand text */
body.in-play .bottom-tabs{display:none}
body.in-play #app{padding-bottom:var(--safe-bottom)}
body.in-play .pill.streak,
body.in-play .pill.lives,
body.in-play .brand{display:none}
body.in-play .topbar{padding:6px 8px 4px}
body.in-play .pill.star,
body.in-play .pill.coin{padding:6px 12px;font-size:13px}
body.in-play .pill.coin .ic,body.in-play .pill.star .ic{font-size:15px}
body.in-play .pill.coin .add{display:none}

/* Persistent tutorial tip (Disney's L1 pattern — text lives in-game) */
.play-tip{
  position:absolute;left:50%;transform:translateX(-50%);
  top:calc(var(--hud-h) + 4px);
  background:rgba(20,8,50,.78);
  border:1px solid rgba(255,255,255,.12);
  backdrop-filter:blur(6px);
  color:#fff;
  padding:9px 18px;border-radius:16px;
  font-size:13px;font-weight:700;text-align:center;
  max-width:88%;line-height:1.3;
  pointer-events:none;z-index:6;
  box-shadow:0 6px 18px rgba(0,0,0,.4);
  opacity:0;transform:translateX(-50%) translateY(-4px);
  transition:opacity .25s ease, transform .25s ease;
}
.play-tip.show{opacity:1;transform:translateX(-50%) translateY(0)}
.play-tip em{color:#06d6a0;font-style:normal;font-weight:900}
.play-tip b{color:#ef476f;font-weight:900}

/* Reposition mascot to bottom-left during play (Disney pattern) */
body.in-play .mascot-bubble{
  left:6px;
  top:auto;
  bottom:calc(var(--bar-h) + var(--safe-bottom) + 8px);
  flex-direction:column-reverse;
  align-items:flex-start;
}
body.in-play .mascot-text{
  margin:0 0 4px 8px;
  position:relative;
}
body.in-play .mascot-text::after{
  content:"";position:absolute;left:14px;bottom:-6px;
  border:6px solid transparent;
  border-top-color:rgba(255,255,255,.92);
  border-right-color:transparent;
}

/* ============================================
   YOU DID IT! theatrical win overlay
   ============================================ */
#win-overlay{
  position:fixed;inset:0;z-index:90;display:none;
  align-items:center;justify-content:center;
  pointer-events:auto;
}
#win-overlay.show{display:flex}
#win-overlay .win-bg{
  position:absolute;inset:0;
  background:radial-gradient(80% 60% at 50% 40%, rgba(255,209,102,.22) 0%, rgba(20,8,50,.92) 60%, rgba(8,3,22,.96) 100%);
  animation:winBgFade .4s ease both;
}
@keyframes winBgFade{from{opacity:0}to{opacity:1}}

/* Theater curtains */
#win-overlay .curtain{
  position:absolute;top:0;bottom:0;width:30%;
  background:
    /* directional shading — left curtain dark on right, right curtain dark on left */
    linear-gradient(180deg, rgba(0,0,0,.32) 0%, transparent 8%, transparent 92%, rgba(0,0,0,.32) 100%),
    repeating-linear-gradient(90deg,
      #4a0410 0px, #7a0d24 14px, #a51d30 28px, #c92f4d 42px, #a51d30 56px, #7a0d24 70px, #4a0410 84px);
  box-shadow:
    inset 0 0 80px rgba(0,0,0,.65),
    inset 0 8px 0 rgba(255,255,255,.04);
}
#win-overlay .curtain.l{box-shadow:inset 8px 0 60px rgba(0,0,0,.55), inset -20px 0 50px rgba(0,0,0,.7)}
#win-overlay .curtain.r{box-shadow:inset -8px 0 60px rgba(0,0,0,.55), inset 20px 0 50px rgba(0,0,0,.7)}
#win-overlay .curtain.l{left:0;border-right:6px solid #ffd166;animation:curtainL .55s cubic-bezier(.18,1.05,.45,1) both}
#win-overlay .curtain.r{right:0;border-left:6px solid #ffd166;animation:curtainR .55s cubic-bezier(.18,1.05,.45,1) both}
@keyframes curtainL{from{transform:translateX(-100%)}to{transform:translateX(0)}}
@keyframes curtainR{from{transform:translateX(100%)}to{transform:translateX(0)}}
#win-overlay .curtain-tassel{
  position:absolute;top:30%;width:36px;height:80px;
  background:radial-gradient(40% 50% at 50% 50%, #ffd166 0%, #b97a1c 100%);
  border-radius:50% 50% 40% 40%;
}
#win-overlay .curtain.l .curtain-tassel{right:-6px}
#win-overlay .curtain.r .curtain-tassel{left:-6px}

/* "YOU DID IT!" title */
.win-title{
  position:relative;z-index:5;
  font-size:46px;font-weight:900;letter-spacing:1.5px;
  text-align:center;
  background:linear-gradient(180deg, #fff7d9 0%, #ffd166 60%, #ef476f 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  text-shadow:0 4px 16px rgba(0,0,0,.5);
  margin-bottom:8px;
  animation:winTitle .5s cubic-bezier(.18,1.6,.45,.95) .35s both;
  font-family:'Inter',-apple-system,system-ui,sans-serif;
}
@keyframes winTitle{from{transform:scale(.3) rotate(-8deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}

/* Giant star with rays */
.win-star-wrap{
  position:relative;z-index:5;
  width:200px;height:200px;display:grid;place-items:center;
  animation:winStarPop .55s cubic-bezier(.18,1.6,.45,.95) .5s both;
}
@keyframes winStarPop{from{transform:scale(.1) rotate(-90deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.win-star{
  font-size:120px;line-height:1;
  filter:drop-shadow(0 0 24px rgba(255,209,102,.9)) drop-shadow(0 0 60px rgba(255,209,102,.5));
  animation:winStarSpin 4s linear infinite;
}
@keyframes winStarSpin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.win-rays{
  position:absolute;inset:-30px;
  background:conic-gradient(from 0deg, rgba(255,209,102,.6), transparent 8%, rgba(255,209,102,.4), transparent 16%, rgba(255,209,102,.5), transparent 24%, rgba(255,209,102,.3), transparent 32%, rgba(255,209,102,.6), transparent 40%, rgba(255,209,102,.4), transparent 48%, rgba(255,209,102,.5), transparent 56%, rgba(255,209,102,.3), transparent 64%, rgba(255,209,102,.6), transparent 72%, rgba(255,209,102,.4), transparent 80%, rgba(255,209,102,.5), transparent 88%, rgba(255,209,102,.3), transparent 96%);
  border-radius:50%;
  animation:winRays 6s linear infinite;
  z-index:-1;
}
@keyframes winRays{from{transform:rotate(0)}to{transform:rotate(-360deg)}}

/* Coin reward count-up */
.win-reward{
  position:relative;z-index:5;
  margin-top:8px;
  background:rgba(255,209,102,.18);
  border:2px solid rgba(255,209,102,.5);
  border-radius:18px;
  padding:8px 22px;
  font-size:28px;font-weight:900;color:#ffd166;
  text-shadow:0 3px 12px rgba(0,0,0,.5);
  animation:winReward .35s ease .8s both;
}
@keyframes winReward{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

/* Star ratings under reward */
.win-stars{display:flex;gap:14px;margin-top:14px;justify-content:center;position:relative;z-index:5}
.win-stars .ws{
  font-size:42px;filter:grayscale(1) brightness(.5);opacity:.4;transform:scale(.7);
  transition:filter .3s, opacity .3s, transform .3s cubic-bezier(.18,1.6,.45,.95);
}
.win-stars .ws.lit{filter:drop-shadow(0 0 12px rgba(255,209,102,.9));opacity:1;transform:scale(1);color:#ffd166}

/* Tap-to-continue hint */
.win-cta-row{position:relative;z-index:5;margin-top:24px;display:flex;gap:10px}
.win-cta{
  background:linear-gradient(180deg,#06d6a0,#0a9a72);
  color:#fff;
  border-radius:18px;padding:14px 26px;
  font-weight:900;font-size:15px;letter-spacing:.6px;
  box-shadow:0 6px 0 #057a55, 0 12px 24px rgba(0,0,0,.4);
  animation:winReward .35s ease 1.1s both;
}
.win-cta:active{transform:translateY(3px);box-shadow:0 3px 0 #057a55, 0 6px 12px rgba(0,0,0,.4)}
.win-cta.secondary{background:rgba(255,255,255,.15);box-shadow:0 4px 0 rgba(0,0,0,.3), 0 8px 18px rgba(0,0,0,.4);color:#fff}
.win-cta.secondary:active{transform:translateY(2px)}

#win-overlay .win-inner{
  position:relative;z-index:5;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}

/* ---------- chain ribbon (top during gameplay) ---------- */
.chain-ribbon{
  position:absolute;left:50%;top:8px;transform:translateX(-50%);
  display:none;font-size:10px;font-weight:900;letter-spacing:1px;
  background:rgba(0,0,0,.45);color:#ffd166;padding:3px 10px;border-radius:8px;
  pointer-events:none;
}
.chain-ribbon.on{display:block;animation:chainPulse .25s ease}
@keyframes chainPulse{from{transform:translateX(-50%) scale(.7)}to{transform:translateX(-50%) scale(1)}}

/* ============================================================
   [Z2] v0.4 — DISNEY-DEEP OVERHAUL (scene, mascot perch, fly-coin,
   score-pop, tut-hand, balloon star, curtain wipe, postcard cine)
   ============================================================ */

/* Painted storybook scene background — sits BEHIND the game canvas */
.scene-bg{position:absolute;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.scene-floor{
  position:absolute;inset:0;
  background:radial-gradient(120% 80% at 50% 60%,#f1b87a 0%,#d18b4a 38%,#a05a25 72%,#5a2a05 100%);
}
.scene-vignette{
  position:absolute;inset:0;
  background:radial-gradient(60% 50% at 50% 50%,transparent 30%,var(--vignette) 100%);
  mix-blend-mode:multiply;
}
.scene-prop{position:absolute;pointer-events:none;filter:drop-shadow(0 8px 16px rgba(0,0,0,.25))}
.scene-prop-leaf{top:0;left:0;width:130px;height:170px;transform:rotate(-12deg) translate(-25px,-30px);opacity:.85}
.scene-prop-cushion{bottom:6%;right:-20px;width:140px;height:100px;opacity:.7}
.scene-prop-books{top:8%;right:-10px;width:90px;height:80px;opacity:.7}
/* Per-world scene tints (driven by body[data-world]) */
body[data-world="2"] .scene-floor{background:radial-gradient(120% 80% at 50% 60%,#e0c878 0%,#a08440 38%,#6a4f1a 72%,#3a2810 100%)}
body[data-world="3"] .scene-floor{background:radial-gradient(120% 80% at 50% 60%,#9bd8b8 0%,#3a9d6f 38%,#1a5a3a 72%,#0a2a1a 100%)}
body[data-world="4"] .scene-floor{background:radial-gradient(120% 80% at 50% 60%,#c4d8ff 0%,#5a7ae0 38%,#2a3a8a 72%,#10183a 100%)}
body[data-world="5"] .scene-floor{background:radial-gradient(120% 80% at 50% 60%,#e0c4ff 0%,#9a7add 38%,#5a3aa0 72%,#2a1a5a 100%)}

/* Mascot perch — chest + canvas mascot on top, bottom-left */
.mascot-perch{
  position:absolute;
  left:6px;
  bottom:calc(var(--bar-h) + var(--safe-bottom) + 6px);
  width:118px;height:130px;pointer-events:none;z-index:8;
  display:none;
}
body.in-play .mascot-perch{display:block}
.mascot-chest{position:absolute;bottom:0;left:0;width:118px;height:54px;filter:drop-shadow(0 6px 12px rgba(0,0,0,.4))}
.mascot-perch .mascot-canvas{position:absolute;bottom:34px;left:11px;width:96px;height:96px;transition:transform .12s ease}
.mascot-perch .mascot-canvas.react{animation:mascotHop .55s cubic-bezier(.34,1.56,.64,1)}
@keyframes mascotHop{0%,100%{transform:translateY(0) scale(1)}40%{transform:translateY(-18px) scale(1.06,.94)}}
/* speech bubble (still uses existing #mascot-bubble) — hide during in-play in favor of perch */
body.in-play .mascot-bubble{display:none}

/* Mickey-glove tutorial pointer */
.tut-hand{
  position:fixed;width:54px;height:72px;pointer-events:none;display:none;z-index:40;
  will-change:transform;filter:drop-shadow(0 4px 8px rgba(0,0,0,.45));
}
.tut-hand.show{display:block;animation:handBob .65s ease-in-out infinite}
@keyframes handBob{0%,100%{transform:translateY(0) rotate(-6deg)}50%{transform:translateY(10px) rotate(-6deg)}}

/* DOM-based flying coin (arcs from card to HUD pill) */
.fly-coin{
  position:fixed;width:20px;height:20px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#fff7c2 0%,#ffd166 55%,#b97a1c 100%);
  box-shadow:0 0 12px rgba(255,209,102,.7);
  pointer-events:none;z-index:35;will-change:transform,opacity;
}
#hud-coins.land{animation:hudCoinLand .25s cubic-bezier(.34,1.56,.64,1)}
@keyframes hudCoinLand{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}

/* DOM-based score popup (replaces canvas text) */
.score-pop{
  position:fixed;transform:translate(-50%,-50%);
  font:700 22px 'Fredoka','Inter',sans-serif;
  color:var(--popup-green);
  -webkit-text-stroke:1.2px #fff;
  text-shadow:0 2px 0 rgba(0,0,0,.3),0 4px 6px rgba(0,0,0,.25);
  pointer-events:none;opacity:0;z-index:36;
  transition:transform .6s cubic-bezier(.18,1.45,.4,1),opacity .6s ease;
  display:flex;align-items:center;gap:3px;white-space:nowrap;
}
.score-pop .sp-num{display:inline-block}
.score-pop .sp-coin{display:inline-block;vertical-align:middle;filter:drop-shadow(0 1px 0 rgba(0,0,0,.3))}
.score-pop.gold{color:#ffd166}
.score-pop.go{transform:translate(-50%,-50%) translateY(-50px) scale(1.08);opacity:0}

/* HUD-exit animations for the "win is coming" pre-roll */
body.win-leaving .pill.coin{animation:hudExitTL .4s ease both}
@keyframes hudExitTL{to{transform:translateY(-60px);opacity:0}}
body.win-leaving .pill.star{animation:hudExitTR .4s ease .05s both}
@keyframes hudExitTR{to{transform:translateY(-60px);opacity:0}}
body.win-leaving #btn-settings{animation:hudExitTR .4s ease .08s both}
body.win-leaving .mascot-perch{animation:hudExitBL .4s ease .1s both}
@keyframes hudExitBL{to{transform:translateY(80px);opacity:0}}
body.win-leaving #play-bar{animation:hudExitB .4s ease .15s both}
@keyframes hudExitB{to{transform:translateY(140px);opacity:0}}
body.win-leaving .play-tip{animation:hudExitT .3s ease both}
@keyframes hudExitT{to{transform:translateX(-50%) translateY(-30px);opacity:0}}

/* Tutorial-L1 HUD-naked state */
body.tutorial-l1 .pill.coin,
body.tutorial-l1 .pill.star,
body.tutorial-l1 #btn-settings,
body.tutorial-l1 .combo-dots{visibility:hidden;pointer-events:none}
body.tutorial-l1 .pill.coin{animation:none}
.pill.coin.reveal-hud{animation:hudReveal .5s cubic-bezier(.34,1.56,.64,1) both}
@keyframes hudReveal{from{transform:translateY(-40px);opacity:0}to{transform:translateY(0);opacity:1}}

/* Updated play-tip (tail + Disney red/blue + Fredoka) */
.play-tip{font-family:'Fredoka','Inter',sans-serif;font-weight:600}
.play-tip em{color:var(--tut-blue);font-style:normal;font-weight:700}
.play-tip b{color:var(--tut-red);font-weight:700}
.play-tip::after{
  content:'';position:absolute;bottom:-8px;left:50%;
  transform:translateX(-50%);width:0;height:0;
  border-left:8px solid transparent;border-right:8px solid transparent;
  border-top:8px solid rgba(20,8,50,.82);
}

/* Waste pile glow halo + ledge */
.waste-pile{filter:drop-shadow(0 0 16px rgba(255,209,102,.22))}
#play-bar::before{
  content:'';position:absolute;left:50%;bottom:14px;transform:translateX(-50%);
  width:220px;height:24px;
  background:radial-gradient(ellipse,rgba(0,0,0,.42) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}

/* ====== WIN OVERLAY — balloon star upgrade ====== */
#win-overlay .win-star{
  width:170px;height:170px;
  font-size:0;            /* hide unicode ★ fallback */
  animation:winStarSquash .6s cubic-bezier(.34,1.56,.64,1) .5s both,
            winStarBob 2.5s ease-in-out 1.5s infinite;
}
@keyframes winStarSquash{
  0%{transform:scale(0)}
  45%{transform:scale(1.2,.85)}
  65%{transform:scale(.92,1.08)}
  100%{transform:scale(1)}
}
@keyframes winStarBob{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-6px) rotate(3deg)}}
#win-overlay .win-star svg{width:100%;height:100%;display:block;filter:drop-shadow(0 0 28px rgba(255,209,102,.85)) drop-shadow(0 0 70px rgba(255,209,102,.45))}

/* Conic rays — 12 segments with mask for halo donut */
#win-overlay .win-rays{
  position:absolute;inset:-50px;
  background:conic-gradient(from 0deg,
    rgba(255,255,255,.85) 0deg, transparent 12deg,
    rgba(255,255,255,.55) 30deg, transparent 42deg,
    rgba(255,255,255,.85) 60deg, transparent 72deg,
    rgba(255,255,255,.55) 90deg, transparent 102deg,
    rgba(255,255,255,.85) 120deg, transparent 132deg,
    rgba(255,255,255,.55) 150deg, transparent 162deg,
    rgba(255,255,255,.85) 180deg, transparent 192deg,
    rgba(255,255,255,.55) 210deg, transparent 222deg,
    rgba(255,255,255,.85) 240deg, transparent 252deg,
    rgba(255,255,255,.55) 270deg, transparent 282deg,
    rgba(255,255,255,.85) 300deg, transparent 312deg,
    rgba(255,255,255,.55) 330deg, transparent 342deg);
  border-radius:50%;
  -webkit-mask:radial-gradient(closest-side,transparent 30%,#000 55%,#000 100%);
          mask:radial-gradient(closest-side,transparent 30%,#000 55%,#000 100%);
  animation:winRays 9s linear infinite;
  z-index:-1;
}

/* Balloon "YOU DID IT!" typography */
.win-title{
  font-family:'Fredoka','Lilita One','Inter',sans-serif;
  font-weight:700;
  letter-spacing:1.2px;
  background:none;
  -webkit-background-clip:initial;background-clip:initial;color:#ffd166;
  text-shadow:
    3px 3px 0 #5a2a05,-3px -3px 0 #5a2a05,
    3px -3px 0 #5a2a05,-3px 3px 0 #5a2a05,
    0 6px 0 #3a1700,
    0 10px 16px rgba(0,0,0,.45);
}

/* Win sparkle halo */
.win-sparkles{position:absolute;inset:0;pointer-events:none;z-index:4}
.win-sparkles .twk{
  position:absolute;width:8px;height:8px;
  background:radial-gradient(circle,#fff 0%,transparent 70%);
  border-radius:50%;
  animation:twkFlicker 1.4s ease-in-out infinite;
}
@keyframes twkFlicker{0%,100%{opacity:0;transform:scale(.3)}50%{opacity:1;transform:scale(1.2)}}

/* Tap-anywhere hint */
.win-tap-hint{
  position:absolute;bottom:30px;left:50%;transform:translateX(-50%);
  color:rgba(255,255,255,.92);
  font:600 13px 'Fredoka','Inter',sans-serif;
  letter-spacing:.22em;text-transform:uppercase;
  animation:tapPulse 1.3s ease-in-out infinite;
  z-index:5;pointer-events:none;
  opacity:0;animation-delay:2.3s;
}
@keyframes tapPulse{0%,100%{opacity:.55}50%{opacity:1}}

/* Curtain-wipe (full-screen scene transition) */
#curtain-wipe{position:fixed;inset:0;z-index:120;pointer-events:none}
#curtain-wipe .cw{
  position:absolute;top:0;bottom:0;width:52%;
  background:repeating-linear-gradient(90deg,
    #5a0814 0px,#a51d30 18px,#7a1224 32px,#c92f4d 48px,#7a1224 64px,#5a0814 80px);
  box-shadow:inset 0 0 60px rgba(0,0,0,.6);
  transition:transform .55s cubic-bezier(.5,0,.5,1);
  will-change:transform;
}
#curtain-wipe .cw.l{left:0;transform:translateX(-104%);border-right:4px solid #ffd166}
#curtain-wipe .cw.r{right:0;transform:translateX(104%);border-left:4px solid #ffd166}
#curtain-wipe.in .cw.l,#curtain-wipe.in .cw.r{transform:translateX(0)}

/* Coin-fly layer container */
#coin-fly-layer{position:fixed;inset:0;pointer-events:none;z-index:30}

/* v0.8 — fx-canvas sits over game-canvas so particles/score popups draw
   on a separate buffer that Pixi never touches. */
#game-canvas{position:relative;z-index:2}
#fx-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:3}

/* ============================================================
   [Z3] v0.5 — FULL DISNEY COLOR PALETTE OVERHAUL
   Cream + gold + warm-red. Replaces the cool dark-purple chrome
   wherever it touched the in-play surface.
   ============================================================ */

/* In-play, swap the entire #app background to warm cream-to-amber
   so the scene-bg blends seamlessly and never shows dark void */
body.in-play #app{
  /* v0.8: kawaii warm-bright base — cream → peach → pink (Dumpling-Drop palette).
     The painted scene-bg layers ride on TOP of this with vignette + props. */
  background:linear-gradient(180deg, #fef6e4 0%, #fff3dc 40%, #ffe7f0 100%);
  transition:background .5s ease;
}
body.in-play .topbar{
  background:linear-gradient(180deg, rgba(106,58,31,.0) 0%, rgba(106,58,31,.0) 100%);
}

/* v0.7 — TRUE Disney painted scene: warm orange-red wallpaper at top,
   dusty mauve floor with perspective, deep maroon vignette at corners. */
body.in-play .scene-bg{z-index:0}
body.in-play .scene-floor{
  /* v0.8 kawaii scene — yellow sunlight top → peach → pink mat. Dumpling-Drop feel. */
  background:
    /* warm sunlight glow */
    radial-gradient(70% 30% at 50% 22%, rgba(255,236,140,.55) 0%, transparent 70%),
    /* sky → peach → pink */
    linear-gradient(180deg,
      #ffe896 0%,    /* sunshine top */
      #ffd24a 18%,   /* gold band */
      #ffb072 38%,   /* peach */
      #ff8aa8 55%,   /* candy pink horizon */
      #ffb0c8 78%,   /* soft pink floor */
      #ffd2dc 100%); /* warm cream-pink near */
}
body.in-play .scene-vignette{
  background:
    radial-gradient(85% 65% at 50% 50%, transparent 40%, rgba(74,36,18,.30) 100%);
  mix-blend-mode:multiply;
}

/* Updated tutorial bubble — cream w/ stitched brown border (matches Disney scene) */
body.in-play .play-tip{
  background:#fff7e6;
  color:#5a2a05;
  border:2px solid #b97a1c;
  box-shadow:0 6px 0 #5a2a05, 0 10px 24px rgba(0,0,0,.35);
  font-family:'Fredoka','Inter',sans-serif;
  font-weight:600;
  font-size:14px;
  padding:10px 18px;
  border-radius:18px;
  letter-spacing:.2px;
}
body.in-play .play-tip em{color:#1e7ad9;font-style:normal;font-weight:700}
body.in-play .play-tip b{color:#c92f4d;font-weight:700}
body.in-play .play-tip::after{

  filter:drop-shadow(0 4px 0 #b97a1c);
}

/* Cream HUD pills with gold trim during play */

  background:linear-gradient(180deg, #fff7e6 0%, #ffe2a8 100%);
  color:#5a2a05;
  border:2px solid #b97a1c;

  font-weight:800;
  letter-spacing:.3px;
}
body.in-play .pill.coin{color:#5a2a05}
body.in-play .pill.coin .ic,
body.in-play .pill.star .ic{filter:drop-shadow(0 1px 0 rgba(255,255,255,.6))}
body.in-play #btn-settings{
  background:linear-gradient(180deg, #fff7e6 0%, #ffe2a8 100%);
  color:#5a2a05;
  border:2px solid #b97a1c;
  box-shadow:0 3px 0 #5a2a05, 0 6px 12px rgba(0,0,0,.25);
}
body.in-play #btn-leave-play{
  background:linear-gradient(180deg, #ffd3a8 0%, #f0a06a 100%);
  color:#5a2a05;
  border:2px solid #b97a1c;
  box-shadow:0 3px 0 #5a2a05, 0 6px 10px rgba(0,0,0,.25);
}

/* play-hud during play — slim warm row */
body.in-play #play-hud{
  background:transparent;
  padding:8px 12px 0;
}
body.in-play .lvl-pill{
  background:linear-gradient(180deg, #ffd166 0%, #d18b4a 100%);
  color:#5a2a05;
  border:2px solid #b97a1c;
  box-shadow:0 3px 0 #5a2a05, 0 5px 10px rgba(0,0,0,.25);
  font-family:'Fredoka','Inter',sans-serif;
  font-weight:700;
}
body.in-play .stats .score{color:#5a2a05;text-shadow:0 2px 0 rgba(255,255,255,.4);font-family:'Fredoka','Inter',sans-serif}
body.in-play .stats .target{color:rgba(90,42,5,.7)}

/* Cream-coloured booster row chips */
body.in-play .booster{
  background:linear-gradient(180deg, #fff7e6 0%, #ffd9a8 100%);
  border:2px solid #b97a1c;
  box-shadow:0 3px 0 #7a3e0f, 0 5px 10px rgba(0,0,0,.25);
  border-radius:16px;
  color:#5a2a05;
  width:54px;height:60px;
  display:grid;place-items:center;
}
body.in-play .booster svg{display:block}
body.in-play .booster.empty svg{opacity:.45;filter:grayscale(.6)}
body.in-play .booster-row{
  /* v0.8: warm kawaii wood-mat — caramel gradient, soft brown border, only as wide as needed */
  background:linear-gradient(180deg,#b97a3a 0%, #8a4a18 100%);
  padding:8px 10px;border-radius:20px;
  border:3px solid #4a2412;
  box-shadow:0 4px 0 #4a2412, 0 10px 18px rgba(74,36,18,.45), inset 0 2px 0 rgba(255,236,180,.30);
  display:flex;gap:8px;
  margin:0 auto;width:max-content;max-width:calc(100% - 8px);
  justify-content:center;align-items:center;
}
body.in-play .booster .count{
  background:#c92f4d;
  color:#fff;
  border:2px solid #fff;
  font-family:'Fredoka','Inter',sans-serif;
  box-shadow:0 2px 0 #7a1a30;
}
body.in-play .booster.empty{opacity:.6}
body.in-play .booster.empty .count{background:#5a2a05;color:#fff}

/* Stock pile + waste platform — wood ledge */
/* v0.6: Pink-mauve "play mat" + shelf line where cards rest. Matches the
   Disney reference: a clear horizontal surface edge plus a soft mat under
   stock + waste. */
body.in-play #play-bar{

function loadState() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return JSON.parse(JSON.stringify(DEFAULT_STATE));
    const s = JSON.parse(raw);
    // shallow merge with defaults so new fields don't crash
    const merged = JSON.parse(JSON.stringify(DEFAULT_STATE));
    for (const k of Object.keys(s)) merged[k] = s[k];
    for (const k of Object.keys(DEFAULT_STATE.settings || {})) if (merged.settings[k] === undefined) merged.settings[k] = DEFAULT_STATE.settings[k];
    for (const k of Object.keys(DEFAULT_STATE.boosters || {})) if (merged.boosters[k] === undefined) merged.boosters[k] = DEFAULT_STATE.boosters[k];
    if (!merged.pre) merged.pre = {};
    for (const k of Object.keys(DEFAULT_STATE.pre || {})) if (merged.pre[k] === undefined) merged.pre[k] = DEFAULT_STATE.pre[k];
    if (!merged.introsSeen) merged.introsSeen = {};
    if (!merged.postcards) merged.postcards = {};
    if (!merged.achievements) merged.achievements = {};
    if (!merged.worldsClaimed) merged.worldsClaimed = {};
    if (!merged.dailyBest) merged.dailyBest = {};
    if (merged.lives === undefined) merged.lives = LIVES_MAX;
    if (!merged.activeWorld) merged.activeWorld = 1;
    if (merged.l1Done === undefined) merged.l1Done = false;
    if (merged.displayedCoins === undefined || merged.displayedCoins == null) merged.displayedCoins = merged.coins | 0;
    return merged;
  } catch (e) { return JSON.parse(JSON.stringify(DEFAULT_STATE)); }
}

const TG = (typeof window !== 'undefined' && window.Telegram && window.Telegram.WebApp) ? window.Telegram.WebApp : null;
function initTelegram() {
  if (!TG) return;
  try {
    TG.ready();
    TG.expand();
    if (TG.disableVerticalSwipes) TG.disableVerticalSwipes();
    if (TG.setHeaderColor) TG.setHeaderColor('#1a0b2e');
    if (TG.setBackgroundColor) TG.setBackgroundColor('#1a0b2e');
    const u = TG.initDataUnsafe?.user;
    if (u) {
      state.uid = String(u.id);
      state.handle = u.username || u.first_name || '';
      if (!state.settings.lang || state.settings.lang === 'en') {
        const lc = (u.language_code || '').slice(0,2).toLowerCase();
        if (SUPPORTED_LANGS.includes(lc)) state.settings.lang = lc;
      }
    }
    applyTelegramSafeArea();
    if (TG.onEvent) TG.onEvent('viewportChanged', applyTelegramSafeArea);
  } catch (e) { console.warn('TG init', e); }
}
function applyTelegramSafeArea() {
  let top = 0, bottom = 0;
  try {
    if (TG?.contentSafeAreaInset) { top = TG.contentSafeAreaInset.top|0; bottom = TG.contentSafeAreaInset.bottom|0; }
    if (!top && TG?.safeAreaInset) top = TG.safeAreaInset.top|0;
  } catch {}
  document.documentElement.style.setProperty('--safe-top', top + 'px');
  document.documentElement.style.setProperty('--safe-bottom', bottom + 'px');
}
function haptic(kind) {
  if (!state.settings.haptics) return;
  try {
    if (TG?.HapticFeedback) {
      if (kind === 'impact') TG.HapticFeedback.impactOccurred('light');
      else if (kind === 'heavy') TG.HapticFeedback.impactOccurred('medium');
      else if (kind === 'success') TG.HapticFeedback.notificationOccurred('success');
      else if (kind === 'warn') TG.HapticFeedback.notificationOccurred('warning');
      else if (kind === 'err') TG.HapticFeedback.notificationOccurred('error');

  } catch {}
}

function mulberry32(seed) {
  return function() {
    let t = (seed += 0x6D2B79F5) | 0;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function shuffle(arr, rng) {
  rng = rng || Math.random;
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
function clamp(v,a,b){ return v<a?a:v>b?b:v; }
function lerp(a,b,t){ return a+(b-a)*t; }
function easeOutCubic(t){ t = clamp(t,0,1); const f = 1 - t; return 1 - f*f*f; }
function easeOutBack(t){ const c = 1.70158; const f = t - 1; return 1 + (c+1)*f*f*f + c*f*f; }
function rand(a,b){ return a + Math.random()*(b-a); }

/* Each level has a layout function generating relative card positions, plus modifiers.

   The render layer maps these to canvas pixels with safe padding.

  singleRow(opts) {
    const out = [];
    let id = 0;
    const N = 7;
    for (let i = 0; i < N; i++) {
      const x = 0.12 + i * (0.76 / (N - 1));
      out.push({ id: id++, x, y: 0.26, layer: 0, faceDown: false });

  },
  // Single small peak: 1+2+3+4 = 10 cards. Bottom row face-up. Genuine "you can't lose this" Level-1 shape.
  easyPeak(opts) {
    const out = [];
    let id = 0;
    const rows = [0.10, 0.19, 0.28, 0.44];
    const widths = [1, 2, 3, 4];
    rows.forEach((y, ri) => {
      const w = widths[ri];
      const startX = 0.5 - (w - 1) * 0.10;
      for (let i = 0; i < w; i++) {
        out.push({ id:id++, x: startX + i * 0.20, y, layer: rows.length - 1 - ri, faceDown: ri < rows.length - 1 });
      }

  },

  hourglass(opts) {
