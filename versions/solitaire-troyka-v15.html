/* ============== [JS-07] CARD MODEL ============== */
const Card = {
  // rank: 1..13
  // suit: index 0..3
  // type: 'normal'|'locked'|'mult'|'treasure'|'memory'|'wild'
  isMatch(rankA, rankB) {
    if (!rankA || !rankB) return false;
    const d = Math.abs(rankA - rankB);
    return d === 1 || d === 12; // 12 = K(13) to A(1) wrap
  }
};

function computeBlockers(cards) {
  // For each card, find the cards that visually overlap it from below (next layer down toward camera).
  // A card B blocks A if B.layer > A.layer and |B.x - A.x| < threshold and B.y > A.y - tiny.
  // Lower layer (smaller number) = behind. Higher layer = in front.
  // We map "in front" cards as blockers.
  const px = (CARD_W * 0.62) / 1000; // approx fraction of cards considered overlapping; updated per render
  for (const c of cards) c.blockers = [];
  for (let i = 0; i < cards.length; i++) {
    const a = cards[i];
    for (let j = 0; j < cards.length; j++) {
      if (i === j) continue;
      const b = cards[j];
      if (b.layer <= a.layer) continue;
      // proximity threshold tuned for normalized coords (we use a generous 0.07)
      if (Math.abs(b.x - a.x) < 0.075 && b.y - a.y >= 0 && b.y - a.y < 0.16) {
        a.blockers.push(b.id);
      }
    }
  }
}

function isPlayable(card, game) {
  if (card.cleared) return false;
  if (card.faceDown) return false;
  if (card.type === 'locked' && card.lockCount > 0) return false;
  // playable when all blockers are cleared
  for (const bid of card.blockers) {
    const b = game.cards.find(c => c.id === bid);
    if (b && !b.cleared) return false;
  }
  return true;
}

/* ============== [JS-08] GAME ENGINE ============== */
const game = {
  active: false,
  levelId: 1,
  cards: [],
  waste: null,
  stock: [],
  drawnCount: 0,
  score: 0,
  chain: 0,
  multTier: 0,
  rng: Math.random,
  startedAt: 0,
  finished: false,
  won: false,
  history: [], // {cardId, prevWaste, prevChain, prevScore}
  fxLayer: [],
  particles: [],
  scorePopups: [],
  armedBooster: null,
  collectedTreasures: 0,
  memoryRevealed: 0,
  introsShownThisRun: {}
};

function startLevel(id) {
  const def = LEVELS.find(l => l.id === id);
  if (!def) { toast(t('coming_soon')); return; }
  if (id > state.maxLevelUnlocked) { toast(t('locked')); return; }
  game.active = true;
  game.finished = false;
  game.won = false;
  game.levelId = id;
  game.score = 0;
  game.chain = 0;
  game.multTier = 0;
  game.armedBooster = null;
  game.collectedTreasures = 0;
  game.memoryRevealed = 0;
  game.introsShownThisRun = {};
  game.history = [];
  game.fxLayer = [];
  game.particles = [];
  game.scorePopups = [];
  game.startedAt = Date.now();

  // RNG: deterministic per-level so the run is reproducible per attempt session (changes on each retry though)
  game.rng = mulberry32((id * 9311 + Date.now() & 0xffffffff) >>> 0);

  // build cards
  const positions = LAYOUTS[def.layout]({});
  // assign ranks/suits: use full deck then top up if more positions
  const deck = [];
  for (let s = 0; s < 4; s++) for (let r = 1; r <= 13; r++) deck.push({ rank: r, suit: s });
  shuffle(deck, game.rng);
  while (deck.length < positions.length + def.stock + 6) {
    for (let s = 0; s < 4; s++) for (let r = 1; r <= 13; r++) deck.push({ rank: r, suit: s });
  }
  let cursor = 0;

  game.cards = positions.map(p => {
    const d = deck[cursor++];
    return {
      id: p.id,
      x: p.x, y: p.y, layer: p.layer,
      rank: d.rank, suit: d.suit,
      faceDown: !!p.faceDown,
      cleared: false,
      type: 'normal',
      lockCount: 0, multValue: 1,
      anim: null
    };
  });

  // apply modifiers (locked / mult / treasure / memory positions)
  const mods = def.mods || {};
  const facingUp = game.cards.filter(c => !c.faceDown).map(c => c.id);
  const facingDown = game.cards.filter(c => c.faceDown).map(c => c.id);
  const shuffledUp = facingUp.slice(); shuffle(shuffledUp, game.rng);
  const shuffledDown = facingDown.slice(); shuffle(shuffledDown, game.rng);
  let upCur = 0, dnCur = 0;
  const takeUp = () => game.cards.find(c => c.id === shuffledUp[upCur++]);
  const takeDown = () => game.cards.find(c => c.id === shuffledDown[dnCur++]);

  if (mods.lockCount) {
    for (let i = 0; i < mods.lockCount && i < shuffledUp.length; i++) {
      const c = takeUp(); if (!c) break;
      c.type = 'locked'; c.lockCount = 2;
    }
  }
  if (mods.multCount) {
    for (let i = 0; i < mods.multCount && upCur < shuffledUp.length; i++) {
      const c = takeUp(); if (!c) break;
      c.type = 'mult'; c.multValue = 2;
    }
  }
  if (mods.treasureCount) {
    for (let i = 0; i < mods.treasureCount && upCur < shuffledUp.length; i++) {
      const c = takeUp(); if (!c) break;
      c.type = 'treasure';
    }
  }
  if (mods.memoryPieces) {
    for (let i = 0; i < mods.memoryPieces && dnCur < shuffledDown.length; i++) {
      const c = takeDown(); if (!c) break;
      c.type = 'memory';
    }
  }

  computeBlockers(game.cards);

  // stock
  game.stock = [];
  for (let i = 0; i < def.stock; i++) {
    const d = deck[cursor++] || { rank: 1 + ((Math.random()*13)|0), suit: 0 };
    game.stock.push({ rank: d.rank, suit: d.suit, wild: false });
  }
  if (mods.wildStock) {
    const idx = [];
    for (let i = 0; i < game.stock.length; i++) idx.push(i);
    shuffle(idx, game.rng);
    for (let i = 0; i < mods.wildStock && i < idx.length; i++) game.stock[idx[i]].wild = true;
  }
  // initial waste = first stock pop
  game.waste = game.stock.pop() || { rank: 7, suit: 0 };
  game.drawnCount = 1;

  // intro popup for new mechanic
  const intro = def.intro;
  if (intro && !state.introsSeen[intro]) {
    state.introsSeen[intro] = true; saveState();
    game.introsShownThisRun[intro] = true;
  }

  // v0.4: world data attribute drives scene-floor + prop tinting via CSS
  document.body.dataset.world = String(def.world || 1);
  // tutorial-l1 HUD-naked state (Disney shows NO HUD on the very first level)
  if (id === 1 && !state.l1Done) {
    document.body.classList.add('tutorial-l1');
    state._tutorialTaps = 0;
  } else {
    document.body.classList.remove('tutorial-l1');
  }
  state.displayedCoins = state.coins;
  showPlayScreen();
  layoutCanvas();
  renderHUD();
  updateSceneBadge();
  // v0.7 card deal-out intro — each card flies in from the deck position
  dealCardsIntro();
  armTutorialWatchdog();
  mp('level_start', { level: id, layout: def.layout, par: def.par });
  if (intro && game.introsShownThisRun[intro]) {
    setTimeout(() => toast(t('intro_' + intro)), 350);
  }
}

function tryPlayCard(cardId) {
  const c = game.cards.find(x => x.id === cardId);
  if (!c || c.cleared) return;
  if (game.armedBooster) {
    handleArmedBoosterOnCard(c);
    return;
  }
  if (!isPlayable(c, game)) {
    haptic('warn');
    flashCard(c, '#ef476f');
    return;
  }
  if (!Card.isMatch(c.rank, game.waste.rank) && !game.waste.wild && !c.wild) {
    haptic('warn');
    flashCard(c, '#ef476f');
    return;
  }
  // PLAY
  const prevWaste = { ...game.waste };
  const prevChain = game.chain;
  const prevScore = game.score;
  const prevType = c.type;
  game.history.push({ cardId: c.id, prevWaste, prevChain, prevScore, prevType, prevMult: c.multValue, prevLock: c.lockCount });
  if (game.history.length > 20) game.history.shift();

  c.cleared = true;
  c.clearedAt = performance.now();
  hideHand();
  // animate to waste (bezier arc handled in drawCards)
  c.anim = { kind:'toWaste', t:0, dur:520, fromX:c.x, fromY:c.y };
  game.waste = { rank: c.rank, suit: c.suit, wild: !!c.wild };

  game.chain += 1;
  const tier = currentComboTier(game.chain);
  game.multTier = tier;
  const base = 50;
  const multScore = base * COMBO_TIERS[tier].mult * (c.multValue || 1);
  game.score += multScore;
  // v0.4 Disney compound reward: cloud puff + coin arc + green popup + sparkle ring
  spawnCloudPuff(c.x, c.y);
  // Derive coins from score for the visible feel (the actual coin balance only ticks at level end via queueCoinRollup)
  const coinShown = Math.max(1, Math.floor(multScore / 10));
  state.coins += coinShown;
  flyCoinToHUD(c.x, c.y, Math.min(3, 1 + Math.floor(game.chain / 2)));
  spawnScorePopup(c.x, c.y, '+' + coinShown + (c.multValue > 1 ? ' ×' + c.multValue : ''));

  if (c.type === 'treasure') {
    state.coins += 30;
    spawnParticles(c.x, c.y, 14, '#ffd166');
    spawnScorePopup(c.x, c.y - 0.04, '+30', '#ffd166');
    flyCoinToHUD(c.x, c.y, 3);
    saveState();
  }
  if (c.type === 'memory') {
    state.memoryPieces += 1;
    game.memoryRevealed += 1;
    spawnParticles(c.x, c.y, 18, '#a83af0');
    saveState();
  }
  if (c.type === 'mult') {
    spawnParticles(c.x, c.y, 16, '#ffd166');
  }

  haptic('impact');
  beepMatch(game.chain);

  // unlock revealed cards beneath
  setTimeout(revealCardsBeneath, 260);

  // chain-of-5 mission
  if (game.chain === 5) state.totalChains5 += 1, saveState();

  // combo tier callout + mascot react milestone hops
  if (tier > game.multTier - 1 && tier > 0) {
    showComboCallout(tier);
  }
  if (game.chain === 3 || game.chain === 5 || game.chain === 7) triggerMascotReact();
  // tutorial-l1 reveal-after-N-taps system
  if (document.body.classList.contains('tutorial-l1')) {
    state._tutorialTaps = (state._tutorialTaps | 0) + 1;
    if (state._tutorialTaps >= 3) {
      document.body.classList.remove('tutorial-l1');
      const coinPill = document.getElementById('hud-coins');
      if (coinPill) coinPill.classList.add('reveal-hud');
      state.l1Done = true;
      saveState();
    }
  }
  renderHUD();
  queueCoinRollup();
  armTutorialWatchdog();
  checkWin();
}

function handleArmedBoosterOnCard(c) {
  const b = game.armedBooster;
  if (b === 'wild') {
    if (state.boosters.wild <= 0) { armBooster(null); return; }
    // turn waste into wild matching this card
    game.waste = { rank: c.rank, suit: c.suit, wild: true };
    state.boosters.wild -= 1; saveState();
    spawnParticles(0.5, 0.6, 24, '#ffd166');
    armBooster(null);
    renderHUD();
  } else {
    armBooster(null);
  }
}

function revealCardsBeneath() {
  // any face-down card whose blockers are all cleared becomes face-up + flips
  const reveals = [];
  for (const c of game.cards) {
    if (c.cleared) continue;
    if (!c.faceDown) continue;
    let ok = true;
    for (const bid of c.blockers) {
      const b = game.cards.find(x => x.id === bid);
      if (b && !b.cleared) { ok = false; break; }
    }
    if (ok) reveals.push(c);
  }
  reveals.forEach(c => {
    c.faceDown = false;
    c.anim = { kind:'flip', t: 0, dur: 280 };
    // v0.4: sparkle pop + reveal bounce + tiny pitch sweep
    spawnSparkleRing(c.x, c.y);
    c._revealBounceT = performance.now() + 280; // bounce starts when flip ends
    sfxCardReveal();
  });
  // also, every match: decrement lockCount of neighboring locked cards
  // (treated as a generic effect — neighbors are blockers' parents or siblings of just-cleared)
  for (const c of game.cards) {
    if (c.cleared || c.type !== 'locked' || c.lockCount <= 0) continue;
    // count cleared neighbors among blockers + siblings within 0.12 x and 0.12 y
    let neighborsClearedNow = 0;
    for (const o of game.cards) {
      if (o === c) continue;
      if (!o.cleared) continue;
      if (Math.abs(o.x - c.x) < 0.13 && Math.abs(o.y - c.y) < 0.14) {
        if (o._lockTickedFor && o._lockTickedFor.has && o._lockTickedFor.has(c.id)) continue;
        neighborsClearedNow += 1;
        if (!o._lockTickedFor) o._lockTickedFor = new Set();
        o._lockTickedFor.add(c.id);
      }
    }
    if (neighborsClearedNow > 0) {
      c.lockCount = Math.max(0, c.lockCount - neighborsClearedNow);
      if (c.lockCount === 0) {
        spawnParticles(c.x, c.y, 12, '#ffd166');
      }
    }
  }
}

function drawFromStock() {
  if (game.stock.length === 0) {
    toast(t('no_match'));
    return;
  }
  if (game.chain > 0) flashComboBreak();
  game.chain = 0;
  game.multTier = 0;
  game.history.push({ kind:'draw', prevWaste: { ...game.waste }, prevChain: game.chain, prevScore: game.score });
  if (game.history.length > 20) game.history.shift();
  game.waste = game.stock.pop();
  game.drawnCount += 1;
  haptic('impact');
  beepDraw();
  renderHUD();
  checkWin();
}

function currentComboTier(chain) {
  let tier = 0;
  for (let i = COMBO_TIERS.length - 1; i >= 0; i--) {
    if (chain >= COMBO_TIERS[i].chain) { tier = i; break; }
  }
  return tier;
}

function undo() {
  if (state.boosters.undo <= 0) { toast(t('not_enough')); return; }
  if (!game.history.length) { toast(t('no_undo')); return; }
  const h = game.history.pop();
  if (h.kind === 'draw') {
    game.stock.push(game.waste);
    game.waste = h.prevWaste;
    game.chain = h.prevChain;
    game.score = h.prevScore;
  } else {
    const c = game.cards.find(x => x.id === h.cardId);
    if (c) {
      c.cleared = false;
      c.type = h.prevType || c.type;
      c.multValue = h.prevMult || c.multValue;
      c.lockCount = (h.prevLock != null) ? h.prevLock : c.lockCount;
    }
    game.waste = h.prevWaste;
    game.chain = h.prevChain;
    game.score = h.prevScore;
    if (h.kind === 'draw' || h.prevType === 'treasure') {
      // refund treasure coins if undo'd (simple)
    }
  }
  state.boosters.undo -= 1;
  saveState();
  game.multTier = currentComboTier(game.chain);
  computeBlockers(game.cards);
  renderHUD();
  haptic('impact');
}

function shuffleBoard() {
  if (state.boosters.shuffle <= 0) { toast(t('not_enough')); return; }
  // shuffle face-up, non-cleared cards' ranks/suits among themselves
  const live = game.cards.filter(c => !c.cleared && !c.faceDown);
  const ranks = live.map(c => ({ rank:c.rank, suit:c.suit }));
  shuffle(ranks, game.rng);
  live.forEach((c, i) => { c.rank = ranks[i].rank; c.suit = ranks[i].suit; c.anim = { kind:'shuffle', t:0, dur: 360 }; });
  state.boosters.shuffle -= 1;
  saveState();
  spawnParticles(0.5, 0.5, 30, '#06d6a0');
  haptic('success');
  beepShuffle();
  renderHUD();
}

function checkWin() {
  const remaining = game.cards.filter(c => !c.cleared);
  if (remaining.length === 0) {
    finishLevel(true);
    return;
  }
  // lose: stock empty AND no legal moves. Trigger Disney-style "user-initiated failure" — offer +5 cards rescue first.
  if (game.stock.length === 0) {
    const playable = remaining.filter(c => isPlayable(c, game) && (Card.isMatch(c.rank, game.waste.rank) || game.waste.wild || c.wild));
    if (playable.length === 0) {
      if (!game._rescueOffered && remaining.length <= 8 && !game.dailyMode) {
        game._rescueOffered = true;
        offerRescue(remaining.length);
        return;
      }
      finishLevel(false);
    }
  }
}

function offerRescue(remainingN) {
  const cost = 150;
  const html =
    '<button class="x" onclick="closeModal();finishLevel(false)">✕</button>' +
    '<h3>😩 So close!</h3>' +
    '<p>' + remainingN + ' cards left and the stock is empty.</p>' +
    '<p style="font-size:13px;color:var(--ink-soft)">Buy 5 more stock cards and keep your combo going?</p>' +
    '<div class="cta-row">' +
      '<button class="cta secondary" id="cta-give">' + t('btn_retry') + '</button>' +
      '<button class="cta" id="cta-rescue">+5 🪙 ' + cost + '</button>' +
    '</div>';
  openModal(html, () => {
    document.getElementById('cta-give').addEventListener('click', () => { closeModal(); finishLevel(false); });
    document.getElementById('cta-rescue').addEventListener('click', () => {
      if (state.coins < cost) { toast(t('not_enough')); return; }
      state.coins -= cost; saveState();
      for (let i = 0; i < 5; i++) {
        game.stock.push({ rank: 1 + Math.floor(Math.random() * 13), suit: Math.floor(Math.random()*4), wild: i === 0 });
      }
      closeModal();
      toast('+5 📦');
      haptic('success');
      renderHUD();
      mp('rescue_taken', { level: game.levelId, cost });
    });
  });
  mp('rescue_offered', { level: game.levelId });
  haptic('warn');
}

function finishLevel(won) {
  if (game.finished) return;
  game.finished = true;
  game.won = won;
  const def = LEVELS.find(l => l.id === game.levelId);
  let stars = 0;
  if (won) {
    // stock-leftover bonus
    const leftover = game.stock.length * 50;
    game.score += leftover;
    spawnScorePopup(0.5, 0.5, '+' + leftover + ' ' + t('stock_left'));
    // star tiers
    if (game.score >= def.perfect) stars = 3;
    else if (game.score >= def.gold) stars = 2;
    else stars = 1;
    const prev = state.starsPerLevel[game.levelId] || 0;
    if (stars > prev) state.starsPerLevel[game.levelId] = stars;
    state.stars = Object.values(state.starsPerLevel).reduce((a,b)=>a+b,0);
    state.bestScorePerLevel[game.levelId] = Math.max(state.bestScorePerLevel[game.levelId] || 0, game.score);
    state.maxLevelUnlocked = Math.max(state.maxLevelUnlocked, game.levelId + 1);
    state.coins += 50 + stars * 30 + (state.battlePassUntil > Date.now() ? 30 : 0);
    bumpStreakOnWin();
    state.totalGames += 1;
    state.gamesPlayedToday = (state.gamesPlayedYMD === ymd()) ? (state.gamesPlayedToday + 1) : 1;
    state.gamesPlayedYMD = ymd();
    saveState();
    mp('level_complete', { level: game.levelId, score: game.score, stars, chain_best: game.chain });
    // v0.4: theatrical pre-win sequence — HUD slides out, coin shower bursts,
    // then ~1.4s later openLevelCompleteModal layers the curtains/star/title in.
    prepWinSequence(stars);
  } else {
    saveState();
    mp('level_failed', { level: game.levelId, score: game.score });
    setTimeout(() => openLevelFailedModal(), 500);
  }
  pushHeartbeat();
  submitLeaderboard();
}

function bumpStreakOnWin() {
  const today = ymd();
  if (state.lastPlayedYMD === today) return;
  const y = new Date(); y.setUTCDate(y.getUTCDate()-1);
  if (state.lastPlayedYMD === ymd(y) || !state.lastPlayedYMD) {
    state.streak = (state.streak || 0) + 1;
  } else if (state.shieldUntil > Date.now()) {
    state.streak = state.streak; // shielded
  } else {
    state.streak = 1;
  }
  state.lastPlayedYMD = today;
}

/* ============== [JS-09] BOOSTERS UI ============== */
function armBooster(name) {
  if (name && state.boosters[name] <= 0) { toast(t('not_enough')); return; }
  if (name === 'shuffle') { shuffleBoard(); return; }
  if (name === 'undo')    { undo(); return; }
  game.armedBooster = (game.armedBooster === name) ? null : name;
  renderBoosterRow();
  if (game.armedBooster === 'wild') toast(t('armed_tap_card'));
}

function renderBoosterRow() {
  const row = document.getElementById('booster-row');
  if (!row) return;
  row.innerHTML = '';
  BOOSTER_LIST.forEach(name => {
    const n = state.boosters[name] | 0;
    const b = document.createElement('button');
    b.className = 'booster' + (n <= 0 ? ' empty' : '') + (game.armedBooster === name ? ' armed' : '');
    b.innerHTML = (BOOSTER_SVG[name] || ('<span class="emoji-fallback">' + (BOOSTER_ICON[name] || '?') + '</span>'))
      + '<span class="count">' + n + '</span>';
    b.addEventListener('click', (ev) => { ev.stopPropagation(); armBooster(name); });
    row.appendChild(b);
  });
}

/* ============== [JS-10] RENDER (CANVAS) ============== */
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const fxCanvas = document.getElementById('fx-canvas');
const fxCtx = fxCanvas ? fxCanvas.getContext('2d') : ctx;
let dpr = window.devicePixelRatio || 1;
let cssW = 0, cssH = 0;
let originX = 0, originY = 0, playW = 0, playH = 0;

// v0.8 Pixi globals — set true once initPixi succeeds
let pixiApp = null, pixiStage = null;
let layerGhosts = null, layerCards = null, layerFx = null;
let pixiOK = false;
const textureCache = new Map();      // frontKey → PIXI.Texture
const cardSpriteByCardId = new Map();// card.id → CardSprite container
let _backTex = null;

function layoutCanvas() {
  const rect = canvas.getBoundingClientRect();
  dpr = window.devicePixelRatio || 1;
  cssW = rect.width; cssH = rect.height;
  // Pixi owns the game-canvas backing store when active
  if (!pixiOK) {
    canvas.width = Math.floor(cssW * dpr);
    canvas.height = Math.floor(cssH * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  } else if (pixiApp && pixiApp.renderer) {
    pixiApp.renderer.resize(cssW, cssH);
  }
  // FX canvas is always Canvas2D for particles/popups (Pixi doesn't touch it)
  if (fxCanvas && fxCanvas !== canvas) {
    fxCanvas.width = Math.floor(cssW * dpr);
    fxCanvas.height = Math.floor(cssH * dpr);
    fxCanvas.style.width = cssW + 'px';
    fxCanvas.style.height = cssH + 'px';
    fxCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  const padX = 12, padTop = 8, padBottom = 4;
  originX = padX; originY = padTop;
  playW = cssW - padX * 2;
  playH = cssH - padTop - padBottom;
}
window.addEventListener('resize', () => { layoutCanvas(); });

function normToScreen(nx, ny) {
  return { x: originX + nx * playW, y: originY + ny * playH };
}

function drawBg() {
  // table felt
  const grad = ctx.createLinearGradient(0, 0, 0, cssH);
  grad.addColorStop(0, 'rgba(255,255,255,0.02)');
  grad.addColorStop(1, 'rgba(0,0,0,0.20)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, cssW, cssH);
}

function drawRoundedRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x + r, y);
  c.lineTo(x + w - r, y);
  c.quadraticCurveTo(x + w, y, x + w, y + r);
  c.lineTo(x + w, y + h - r);
  c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  c.lineTo(x + r, y + h);
  c.quadraticCurveTo(x, y + h, x, y + h - r);
  c.lineTo(x, y + r);
  c.quadraticCurveTo(x, y, x + r, y);
  c.closePath();
}

function drawCardFace(c, x, y, w, h, card, scaleX, compact) {
  // v0.7 — TRUE Disney card face matching reference frames:
  //   - white card body (NO border line — soft purple drop shadow does the work)
  //   - flat cobalt-blue top band (#1e8be5, 22% of card height)
  //   - tiny white rank + tiny white suit pip in upper-left of band
  //   - HUGE chunky rank centered in the white field at ~55% card height,
  //     colored red for ♥/♦ and dark navy for ♠/♣
  //   - small suit pip in upper-RIGHT of band (mirrors the corner)
  //   - subtle inner glow at top of white field for depth
  scaleX = (scaleX == null) ? 1 : scaleX;
  c.save();
  c.translate(x + w/2, y + h/2);
  c.scale(scaleX, 1);
  c.translate(-w/2, -h/2);
  // soft purple drop shadow — Disney's signature feel
  c.fillStyle = 'rgba(80,20,55,0.30)';
  drawRoundedRect(c, 0, 5, w, h, CARD_R); c.fill();
  c.fillStyle = 'rgba(20,8,30,0.25)';
  drawRoundedRect(c, 0, 2, w, h, CARD_R); c.fill();
  // white card body
  c.fillStyle = '#ffffff';
  drawRoundedRect(c, 0, 0, w, h, CARD_R); c.fill();
  const rank = RANK_LABEL[card.rank];
  const suit = SUITS[card.suit % 4];
  const isRed = (suit === '♥' || suit === '♦');
  // Cobalt blue band — flat color, no gradient
  c.save();
  c.beginPath();
  drawRoundedRect(c, 0, 0, w, h, CARD_R);
  c.clip();
  c.fillStyle = '#1e8be5';
  c.fillRect(0, 0, w, h * 0.22);
  // slight darker line at the band/white split for a clean edge
  c.fillStyle = 'rgba(0,0,0,0.10)';
  c.fillRect(0, h * 0.22 - 1, w, 1);
  c.restore();
  // soft inner glow at top of white field (subtle depth)
  const innerGrad = c.createLinearGradient(0, h * 0.22, 0, h * 0.40);
  innerGrad.addColorStop(0, 'rgba(0,0,0,0.06)');
  innerGrad.addColorStop(1, 'rgba(0,0,0,0)');
  c.fillStyle = innerGrad;
  c.fillRect(0, h * 0.22, w, h * 0.18);
  // tiny white rank in upper-LEFT of band
  c.fillStyle = '#ffffff';
  c.font = '800 ' + Math.floor(h * 0.14) + 'px Fredoka, Inter, sans-serif';
  c.textBaseline = 'top';
  c.textAlign = 'left';
  c.fillText(rank, 5, 2);
  // tiny white suit pip below rank (in the band)
  c.font = '700 ' + Math.floor(h * 0.10) + 'px Inter, sans-serif';
  c.fillText(suit, 6, 2 + Math.floor(h * 0.13));
  // mirror tiny rank+suit upper-RIGHT
  c.textAlign = 'right';
  c.font = '800 ' + Math.floor(h * 0.14) + 'px Fredoka, Inter, sans-serif';
  c.fillText(rank, w - 5, 2);
  c.font = '700 ' + Math.floor(h * 0.10) + 'px Inter, sans-serif';
  c.fillText(suit, w - 6, 2 + Math.floor(h * 0.13));
  if (!compact) {
    // BIG chunky rank in white field — Disney's hero element
    c.fillStyle = isRed ? '#c8243a' : '#1e2a5a';
    c.font = '700 ' + Math.floor(h * 0.55) + 'px Fredoka, Inter, sans-serif';
    c.textAlign = 'center'; c.textBaseline = 'middle';
    c.fillText(rank, w / 2, h * 0.62);
  }
  // overlays for types
  if (card.type === 'mult') {
    c.strokeStyle = '#ffd166'; c.lineWidth = 3;
    drawRoundedRect(c, 1.5, 1.5, w-3, h-3, CARD_R-1); c.stroke();
    c.fillStyle = '#ffd166';
    c.fillRect(w/2 - 12, h - 18, 24, 14);
    c.fillStyle = '#1a0b2e';
    c.font = '900 11px Inter, sans-serif'; c.textAlign='center'; c.textBaseline='middle';
    c.fillText('x' + (card.multValue || 2), w/2, h - 11);
  }
  if (card.type === 'treasure') {
    c.fillStyle = 'rgba(255,209,102,0.92)';
    c.beginPath(); c.arc(w/2, h*0.35, h*0.18, 0, Math.PI*2); c.fill();
    c.fillStyle = '#1a0b2e';
    c.font = '900 ' + Math.floor(h*0.18) + 'px Inter, sans-serif';
    c.textAlign='center'; c.textBaseline='middle';
    c.fillText('🪙', w/2, h*0.35);
  }
  if (card.type === 'memory') {
    c.fillStyle = 'rgba(168,58,240,0.6)';
    drawRoundedRect(c, 0, 0, w, h, CARD_R); c.fill();
    c.fillStyle = '#fff';
    c.font = '900 ' + Math.floor(h*0.30) + 'px Inter, sans-serif';
    c.textAlign='center'; c.textBaseline='middle';
    c.fillText('?', w/2, h/2);
  }
  if (card.type === 'locked' && card.lockCount > 0) {
    c.fillStyle = 'rgba(0,0,0,0.6)';
    drawRoundedRect(c, 0, 0, w, h, CARD_R); c.fill();
    c.fillStyle = '#fff';
    c.font = '900 ' + Math.floor(h*0.36) + 'px Inter, sans-serif';
    c.textAlign='center'; c.textBaseline='middle';
    c.fillText('🔒', w/2, h/2 - 4);
    c.font = '900 11px Inter, sans-serif';
    c.fillText(String(card.lockCount), w/2, h - 12);
  }
  if (card.wild) {
    const wg = c.createLinearGradient(0, 0, w, h);
    wg.addColorStop(0, 'rgba(239,71,111,0.4)');
    wg.addColorStop(0.5, 'rgba(255,209,102,0.4)');
    wg.addColorStop(1, 'rgba(6,214,160,0.4)');
    c.fillStyle = wg;
    drawRoundedRect(c, 0, 0, w, h, CARD_R); c.fill();
    c.fillStyle = '#fff';
    c.font='900 ' + Math.floor(h*0.4)+'px Inter, sans-serif'; c.textAlign='center'; c.textBaseline='middle';
    c.fillText('🃏', w/2, h/2);
  }
  c.restore();
}

function drawCardBack(c, x, y, w, h, scaleX) {
  // v0.7 — TRUE Disney card back matching reference frames:
  //   - 3-4px chunky WHITE outer border
  //   - cobalt blue main field (#1e8be5, brighter than my v0.4 navy)
  //   - lighter cobalt inset panel (#3aa5ee) 5px in
  //   - subtle Mickey-ear silhouette in center at low opacity
  //   - soft purple drop shadow underneath
  scaleX = (scaleX == null) ? 1 : scaleX;
  c.save();
  c.translate(x + w/2, y + h/2);
  c.scale(scaleX, 1);
  c.translate(-w/2, -h/2);
  // soft purple drop shadow (matches the face shadow style)
  c.fillStyle = 'rgba(80,20,55,0.30)';
  drawRoundedRect(c, 0, 5, w, h, CARD_R); c.fill();
  c.fillStyle = 'rgba(20,8,30,0.25)';
  drawRoundedRect(c, 0, 2, w, h, CARD_R); c.fill();
  // chunky white outer border
  c.fillStyle = '#ffffff';
  drawRoundedRect(c, 0, 0, w, h, CARD_R); c.fill();
  // cobalt blue field (3px inset)
  c.fillStyle = '#1e8be5';
  drawRoundedRect(c, 3, 3, w - 6, h - 6, CARD_R - 1); c.fill();
  // lighter cobalt inset panel (5px more in)
  c.fillStyle = '#3aa5ee';
  drawRoundedRect(c, 6, 6, w - 12, h - 12, CARD_R - 2); c.fill();
  // subtle inset shadow line
  c.strokeStyle = 'rgba(0,0,0,0.10)';
  c.lineWidth = 1;
  drawRoundedRect(c, 6, 6, w - 12, h - 12, CARD_R - 2); c.stroke();
  // Mickey-ear silhouette center (low opacity, instantly readable)
  const cx = w / 2;
  const cy = h / 2;
  const r = Math.min(w, h) * 0.13;
  c.fillStyle = 'rgba(255,255,255,0.18)';
  // main head
  c.beginPath(); c.arc(cx, cy + r * 0.25, r, 0, Math.PI * 2); c.fill();
  // ears
  c.beginPath(); c.arc(cx - r * 0.85, cy - r * 0.70, r * 0.65, 0, Math.PI * 2); c.fill();

async function initPixi() {
  if (!window.__pixiReady) { pixiOK = false; return; }
  try {
    const PIXI = await window.__pixiReady;
    if (document.fonts && document.fonts.ready) await document.fonts.ready;
    pixiApp = new PIXI.Application();
    await pixiApp.init({
      canvas: document.getElementById('game-canvas'),

      autoDensity: true,
      backgroundAlpha: 0,
      antialias: true,

function updateCardSpriteTransform(sp, card, now) {
  const pos = normToScreen(card.x, card.y);
  sp.position.set(pos.x + CARD_W/2, pos.y + CARD_H/2);
  sp.scale.set(1); sp.rotation = 0; sp.skew.y = 0;
  sp.alpha = (card.cleared && !card.anim) ? 0 : 1;
  if (card.anim) {
    if (card.anim.kind === 'toWaste') {
      card.anim.t = (card.anim.t || 0) + 16;
      const p = Math.min(1, card.anim.t / (card.anim.dur || 520));
      const e = easeOutBackTween(p), u = 1 - e;
      const target = wastePileNorm();
      const fx = card.anim.fromX, fy = card.anim.fromY;
      const cx = (fx + target.x) / 2;
      const cy = Math.min(fy, target.y) - 0.25;
      const nx = u*u*fx + 2*u*e*cx + e*e*target.x;
      const ny = u*u*fy + 2*u*e*cy + e*e*target.y;
      const screen = normToScreen(nx, ny);
      sp.position.set(screen.x + CARD_W/2, screen.y + CARD_H/2);
      sp.scale.set(1 + Math.sin(p*Math.PI) * 0.18);
      sp.rotation = Math.sin(p*Math.PI) * 0.42 * (target.x > fx ? 1 : -1);
      if (p > 0.85) sp.alpha = 1 - ((p - 0.85)/0.15) * 0.4;
      if (p >= 1) card.anim = null;
      return;
    }
    if (card.anim.kind === 'flip') {
      card.anim.t = (card.anim.t || 0) + 16;
      const p = Math.min(1, card.anim.t / (card.anim.dur || 300));
      if (p < 0.5) {
        const q = p / 0.5;
        sp.scale.x = 1 - easeInOutCubicTween(q);
        sp.skew.y = easeInOutCubicTween(q) * 0.18;
      } else {
        sp.front.visible = !card.faceDown;
        sp.back.visible  = card.faceDown;
        const q = (p - 0.5) / 0.5;
        sp.scale.x = easeInOutCubicTween(q);
        sp.skew.y = (1 - easeInOutCubicTween(q)) * 0.18;
      }
      if (p >= 1) { card.anim = null; sp.scale.x = 1; sp.skew.y = 0; }
      return;
    }
    if (card.anim.kind === 'shuffle') {
      card.anim.t = (card.anim.t || 0) + 16;
      const p = Math.min(1, card.anim.t / (card.anim.dur || 360));
      sp.position.y -= Math.sin(p * Math.PI) * 12;
      if (p >= 1) card.anim = null;
    }

  if (card._dealAnim) {
    card._dealAnim.t = (card._dealAnim.t || 0) + 16;
    const elapsed = card._dealAnim.t - (card._dealAnim.delay || 0);
    if (elapsed <= 0) { sp.scale.set(0); return; }
    const p = Math.min(1, elapsed / (card._dealAnim.dur || 280));
    const e = easeInOutCubicTween(p);
    sp.scale.set(e, e);
    if (p >= 1) card._dealAnim = null;
  }

  const playable = (typeof isPlayable === 'function') &&
    isPlayable(card, game) &&
    !card.faceDown && !card.cleared &&
    (Card.isMatch(card.rank, game.waste.rank) || (game.waste && game.waste.wild));
  if (playable) {
    const pulse = 0.5 + Math.sin(now * 0.006) * 0.5;
    sp.halo.visible = true;
    sp.halo.alpha = 0.55 + pulse * 0.45;
    sp.halo.scale.set(1 + pulse * 0.04);
  } else {
    sp.halo.visible = false;
  }
}
function drawCards_canvas2d_fallback() {
  // v0.4: Empty-slot ghost pre-pass — soft brown rounded-rect at each cleared

  const now = performance.now();
  for (const card of game.cards) {
    if (!card.cleared) continue;
    if (card.layer > 0) continue; // only ghost bottom-row positions
    if (card.faceDown) continue;
    const pos = normToScreen(card.x, card.y);
    const ageMs = card.clearedAt ? (now - card.clearedAt) : 0;
    const fadeK = clamp(ageMs / 1500, 0, 1);
    const alpha = 0.30 * (1 - fadeK * 0.7);
    if (alpha <= 0.01) continue;
    ctx.save();
    ctx.fillStyle = 'rgba(80,50,30,' + alpha + ')';
    drawRoundedRect(ctx, pos.x - CARD_W/2, pos.y - CARD_H/2, CARD_W, CARD_H, CARD_R);
    ctx.fill();
    ctx.restore();
  }
  // Sort by layer then y so deeper cards render first
  const sorted = game.cards.slice().sort((a,b) => (a.layer - b.layer) || (a.y - b.y));
  for (const card of sorted) {
    if (card.cleared && !card.anim) continue;
    let nx = card.x, ny = card.y;
    let scaleX = 1;
    let tilt = 0;
    // v0.7: deal-out intro override — overrides start pos for first ~300ms
    if (card._dealAnim) {
      card._dealAnim.t += 16;
      const elapsed = card._dealAnim.t - card._dealAnim.delay;
      if (elapsed <= 0) {
        // not yet dealt — render at the deck position invisibly hidden
        nx = card._dealAnim.fromX; ny = card._dealAnim.fromY;
        scaleX = 0;
      } else {
        const p = clamp(elapsed / card._dealAnim.dur, 0, 1);
        const e = easeOutCubic(p);
        nx = lerp(card._dealAnim.fromX, card._dealAnim.toX, e);
        ny = lerp(card._dealAnim.fromY, card._dealAnim.toY, e);
        scaleX = e;
        tilt = (1 - p) * 0.3 * (card._dealAnim.toX > card._dealAnim.fromX ? -1 : 1);
        if (p >= 1) card._dealAnim = null;
      }
    }
    if (card.anim) {
      card.anim.t += 16;
      const p = clamp(card.anim.t / card.anim.dur, 0, 1);
      if (card.anim.kind === 'toWaste') {
        // v0.7: TRUE Disney arc — much higher peak, more rotation, longer dur.
        // Cards lift 25% of canvas height, peak-scale 1.18x, tilt 25deg.
        const target = { x: wastePileNorm().x, y: wastePileNorm().y };
        const mx = (card.anim.fromX + target.x) / 2;
        const my = Math.min(card.anim.fromY, target.y) - 0.25;
        const e = easeOutCubic(p);
        const u = 1 - e;
        nx = u*u * card.anim.fromX + 2*u*e * mx + e*e * target.x;
        ny = u*u * card.anim.fromY + 2*u*e * my + e*e * target.y;
        scaleX = 1 + Math.sin(p * Math.PI) * 0.18;
        tilt = Math.sin(p * Math.PI) * 0.42 * (target.x > card.anim.fromX ? 1 : -1);
        if (p >= 1) { card.anim = null; }
      } else if (card.anim.kind === 'flip') {
        const e = p;
        const s = Math.abs(Math.cos(e * Math.PI));
        scaleX = Math.max(0.06, s);
        if (p >= 1) card.anim = null;
      } else if (card.anim.kind === 'shuffle') {

        ny = card.y - (1 - e) * 0.05;
        if (p >= 1) card.anim = null;

    const x = pos.x - CARD_W/2;

    if (!card.faceDown && !card.cleared && isPlayable(card, game) && (Card.isMatch(card.rank, game.waste.rank) || game.waste.wild)) {
      const pulse = 0.5 + Math.sin(now * 0.006) * 0.5;

// v0.8: NEW drawCards() — uses Pixi when available, falls back to Canvas2D.
function drawCards() {
  if (!pixiOK || !pixiApp || !window.PIXI) return drawCards_canvas2d_fallback();
  const now = performance.now();
  const liveIds = new Set();
  for (const card of game.cards) {
    liveIds.add(card.id);
    let sp = cardSpriteByCardId.get(card.id);
    if (!sp) {
      sp = makeCardSprite(card);
      cardSpriteByCardId.set(card.id, sp);
      layerCards.addChild(sp);
    } else {
      // If face state changed without a flip anim, reflect it
      if (sp._card !== card) { sp._card = card; sp._refreshFront(); }
      if (!card.anim || card.anim.kind !== 'flip') {
        sp.front.visible = !card.faceDown;
        sp.back.visible  = card.faceDown;
      }
    }
    updateCardSpriteTransform(sp, card, now);
  }
  // Dispose orphans
  for (const [id, sp] of cardSpriteByCardId) {
    if (!liveIds.has(id)) {
      try { layerCards.removeChild(sp); sp.destroy({ children: true, texture: false }); }
      catch (_) {}
      cardSpriteByCardId.delete(id);
    }
  }
  // Depth sort
  layerCards.children.sort((a, b) =>
    (a._card.layer - b._card.layer) || (a._card.y - b._card.y));
  pixiApp.renderer.render(pixiApp.stage);
}
function isCardCovered(card) {
  if (!card.blockers || !card.blockers.length) return false;
  for (const bid of card.blockers) {
    const b = game.cards.find(x => x.id === bid);
    if (b && !b.cleared) return true;
  }
  return false;
}

function drawParticles() {
  // v0.4: shape switch for 'puff' (soft cloud), 'sparkle' (cross-star),
  // 'petal' (warm rose petals with sway). Default is the legacy circle.
  const next = [];
  for (const p of game.particles) {
    p.t += 1;
    if (p.t > p.life) continue;
    const k = p.t / p.life;
    const pos = normToScreen(p.x, p.y);
    if (p.shape === 'puff') {
      const scale = 1 + k * 0.7;
      ctx.save();
      ctx.globalAlpha = 0.7 * (1 - k);
      ctx.fillStyle = p.color || '#fff';
      ctx.beginPath();
      ctx.arc(pos.x + (p.vx * p.t || 0), pos.y + (p.vy * p.t || 0) - k * 8, (p.r || 8) * scale, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    } else if (p.shape === 'sparkle') {
      ctx.save();
      ctx.globalAlpha = 1 - k;
      ctx.fillStyle = p.color || '#fff';
      const cx = pos.x + p.vx * p.t;
      const cy = pos.y + p.vy * p.t + 0.5 * 0.05 * p.t * p.t;
      const r = p.r * (1 - k * 0.4);
      // 4-point cross-star
      ctx.beginPath();
      ctx.moveTo(cx - r * 3, cy); ctx.lineTo(cx, cy - r);
      ctx.lineTo(cx + r * 3, cy); ctx.lineTo(cx, cy + r);
      ctx.closePath(); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(cx, cy - r * 3); ctx.lineTo(cx - r, cy);
      ctx.lineTo(cx, cy + r * 3); ctx.lineTo(cx + r, cy);
      ctx.closePath(); ctx.fill();
      ctx.restore();
    } else if (p.shape === 'petal') {
      ctx.save();
      ctx.globalAlpha = 1 - k;
      ctx.fillStyle = p.color;
      const sway = Math.sin((p.t + (p.seed || 0)) * 0.08) * 15;
      ctx.translate(pos.x + sway, pos.y + p.vy * p.t + 0.5 * 0.025 * p.t * p.t);
      ctx.rotate((p.rot || 0) + p.t * 0.02);
      ctx.beginPath();
      ctx.ellipse(0, 0, p.r * 0.6, p.r * 1.3, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    } else {
      // legacy default — circle
      ctx.save();
      ctx.globalAlpha = 1 - k;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(pos.x + p.vx * p.t, pos.y + p.vy * p.t + 0.5 * 0.05 * p.t * p.t, p.r * (1 - k * 0.5), 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    next.push(p);
  }
  game.particles = next;
}

function drawScorePopups() {
  const next = [];
  for (const p of game.scorePopups) {
    p.t += 1;
    if (p.t > p.life) continue;
    const k = p.t / p.life;
    const pos = normToScreen(p.x, p.y - k * 0.06);
    ctx.save();
    ctx.globalAlpha = 1 - k;
    ctx.fillStyle = p.color || '#ffd166';
    ctx.font = '900 18px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,0.6)';
    ctx.shadowBlur = 6;
    ctx.fillText(p.text, pos.x, pos.y);
    ctx.restore();
    next.push(p);
  }
  game.scorePopups = next;
}

function wastePileNorm() {

function renderHUD() {

  const tier = currentComboTier(game.chain);

  const wrap = document.getElementById('combo-dots-wrap');
  if (wrap) {
    const dots = wrap.querySelectorAll('.cdot');
    dots.forEach((d, i) => {
      d.classList.remove('lit', 'tier2', 'tier3', 'tier4');
      if (i < lit) {
        d.classList.add('lit');
        if (tier >= 4) d.classList.add('tier4');
        else if (tier >= 3) d.classList.add('tier3');
        else if (tier >= 2) d.classList.add('tier2');
      }
    });
    const mt = document.getElementById('combo-mult');
    if (mt) {
      if (COMBO_TIERS[tier].mult > 1) { mt.textContent = 'x' + COMBO_TIERS[tier].mult; mt.classList.add('show'); }
      else { mt.classList.remove('show'); }
    }
  }
  // stock + waste
  renderStockPile();
  drawWasteHTML();
  renderBoosterRow();
}

// v0.6: Render the stock pile as a Disney-style visibly-stacked deck.
// Each edge of the deck is a separate .stock-card-back div offset left.
// The deck literally shrinks as the player draws.
function renderStockPile() {
  const wrap = document.getElementById('stock-pile');
  if (!wrap) return;
  // Pull out the count badge so we don't blow it away
  const badge = document.getElementById('stock-count');
  // Clear everything that isn't the badge
  Array.from(wrap.children).forEach(c => { if (c !== badge) c.remove(); });
  const n = game.stock.length;
  if (badge) badge.textContent = n;
  wrap.classList.toggle('low', n <= 4 && n > 0);
  if (n === 0) {
    const empty = document.createElement('div');
    empty.className = 'stock-empty';
    wrap.insertBefore(empty, badge || null);
    return;
  }
  // Show up to ~14 visible edges (scales by sqrt of stock so small decks
  // don't look as wide as full decks).
  const visible = Math.min(n, 14);
  const STEP = 3.2;
  for (let i = 0; i < visible; i++) {
    const div = document.createElement('div');
    div.className = 'stock-card-back';
    if (i === visible - 1) {
      div.classList.add('top');
      const star = document.createElement('div');
      star.className = 'star';
      star.textContent = '★';
      div.appendChild(star);
    }
    div.style.left = (i * STEP) + 'px';
    div.style.zIndex = String(i);
    wrap.insertBefore(div, badge || null);
  }
}

function drawWasteHTML() {
  const el = document.getElementById('waste-pile');
  if (!el) return;
  el.innerHTML = '';
  const w = 84, h = 118;
  const cv = document.createElement('canvas');
  cv.width = Math.floor(w * dpr); cv.height = Math.floor(h * dpr);
  cv.style.width = w + 'px'; cv.style.height = h + 'px';
  const c2 = cv.getContext('2d');
  c2.setTransform(dpr,0,0,dpr,0,0);
  if (game.waste) drawCardFace(c2, 0, 0, w, h, game.waste, 1);
  el.appendChild(cv);
}

// Coin-arc fly to the HUD coin pill (DOM-based, Web Animations API)
function flyCoinToHUD(fromX_norm, fromY_norm, n) {
  n = Math.max(1, Math.min(4, n | 0));
  const hudCoin = document.getElementById('hud-coins');
  if (!hudCoin) return;
  const hudRect = hudCoin.getBoundingClientRect();
  const ex = hudRect.left + hudRect.width / 2;
  const ey = hudRect.top + hudRect.height / 2;
  const cr = canvas.getBoundingClientRect();
  const pos = normToScreen(fromX_norm, fromY_norm);
  const sx = cr.left + pos.x;
  const sy = cr.top + pos.y;
  for (let i = 0; i < n; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'fly-coin';
      document.body.appendChild(el);
      // arc midpoint above the line between sy/ey
      const midX = (sx + ex) / 2 + (Math.random() - 0.5) * 30;
      const midY = Math.min(sy, ey) - 60 - i * 6;
      try {
        const anim = el.animate([
          { transform: `translate(${sx - 10}px, ${sy - 10}px) scale(.7)`, opacity: 1, offset: 0 },
          { transform: `translate(${midX - 10}px, ${midY - 10}px) scale(1.1)`, opacity: 1, offset: 0.5 },
          { transform: `translate(${ex - 10}px, ${ey - 10}px) scale(.55)`, opacity: .15, offset: 1 }
        ], { duration: 700, easing: 'cubic-bezier(.4,0,.6,1)', fill: 'forwards' });
        anim.onfinish = () => {
          try { el.remove(); } catch (_) {}
          hudCoin.classList.add('land');
          setTimeout(() => hudCoin.classList.remove('land'), 250);
          sfxCoinPickup(i);
        };
      } catch (_) {
        // Fallback for browsers without WAAPI
        setTimeout(() => { try { el.remove(); } catch (_) {} }, 700);
      }
    }, i * 80);
  }
}

// ===== Audio synths added for v0.4 =====
function sfxPuff() {
  const ac = ensureAC(); if (!ac) return;
  try {
    const buf = ac.createBuffer(1, Math.floor(ac.sampleRate * 0.07), ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
    const src = ac.createBufferSource(); src.buffer = buf;
    const filt = ac.createBiquadFilter(); filt.type = 'lowpass'; filt.frequency.value = 1200;
    const g = ac.createGain(); g.gain.value = 0.15;
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.07);
    src.connect(filt).connect(g).connect(ac.destination);
    src.start();
    src.stop(ac.currentTime + 0.08);
  } catch (_) {}
}
function sfxCoinPickup(i) {
  const ac = ensureAC(); if (!ac) return;
  i = i | 0;
  try {
    const o1 = ac.createOscillator(); const o2 = ac.createOscillator();
    const g = ac.createGain();
    o1.type = 'triangle'; o1.frequency.value = 880;
    o2.type = 'sine';     o2.frequency.value = 1320;
    o1.detune.value = -i * 8; o2.detune.value = -i * 8;
    g.gain.setValueAtTime(0, ac.currentTime);
    g.gain.linearRampToValueAtTime(0.10, ac.currentTime + 0.005);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.065);
    o1.connect(g); o2.connect(g); g.connect(ac.destination);
    o1.start(); o2.start();
    o1.stop(ac.currentTime + 0.07); o2.stop(ac.currentTime + 0.07);
  } catch (_) {}
}
function sfxCardReveal() {
  const ac = ensureAC(); if (!ac) return;
  try {
    const o = ac.createOscillator(); const g = ac.createGain();
    o.type = 'triangle';
    o.frequency.setValueAtTime(660, ac.currentTime);
    o.frequency.linearRampToValueAtTime(990, ac.currentTime + 0.11);
    g.gain.setValueAtTime(0.08, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.12);
    o.connect(g).connect(ac.destination);
    o.start(); o.stop(ac.currentTime + 0.13);
  } catch (_) {}
}
function sfxCurtainSwoosh() {
  const ac = ensureAC(); if (!ac) return;
  try {
    const dur = 0.35;
    const buf = ac.createBuffer(1, Math.floor(ac.sampleRate * dur), ac.sampleRate);
    const data = buf.getChannelData(0);
    let last = 0;
    for (let i = 0; i < data.length; i++) {
      const w = (Math.random() * 2 - 1) * 0.4;
      last = (last + w) * 0.5;
      data[i] = last;
    }
    const src = ac.createBufferSource(); src.buffer = buf;
    const filt = ac.createBiquadFilter(); filt.type = 'lowpass';
    filt.frequency.setValueAtTime(200, ac.currentTime);
    filt.frequency.linearRampToValueAtTime(800, ac.currentTime + dur);
    const g = ac.createGain();
    g.gain.setValueAtTime(0, ac.currentTime);
    g.gain.linearRampToValueAtTime(0.18, ac.currentTime + 0.05);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    src.connect(filt).connect(g).connect(ac.destination);
    src.start(); src.stop(ac.currentTime + dur + 0.02);
  } catch (_) {}
}
function sfxMagicBurst() {
  const ac = ensureAC(); if (!ac) return;
  try {

      g.gain.exponentialRampToValueAtTime(0.001, start + 0.30);
      o.connect(g).connect(ac.destination);
      o.start(start); o.stop(start + 0.32);
    });

}
function sfxStarLand() {

    const o1 = ac.createOscillator(); const o2 = ac.createOscillator();
    const g = ac.createGain();
    o1.type = 'triangle'; o1.frequency.value = 1175;

canvas.addEventListener('pointerdown', (ev) => {
  if (!game.active || game.finished) return;
  const rect = canvas.getBoundingClientRect();

  const py = ev.clientY - rect.top;

      if (c.layer > hitLayer) { hit = c; hitLayer = c.layer; }
    }
  }
  if (hit) tryPlayCard(hit.id);

/* ============== [JS-12] AUDIO ============== */
let AC = null;
function ensureAC() {
  if (!state.settings.sound) return null;
  if (!AC) {
    try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch {}
  }
  if (AC && AC.state === 'suspended') AC.resume();
  return AC;
}
function tone(freq, dur, type, gain) {
  const ac = ensureAC(); if (!ac) return;
  const o = ac.createOscillator();
  const g = ac.createGain();
  o.type = type || 'sine';
  o.frequency.value = freq;
  g.gain.value = 0;
  g.gain.linearRampToValueAtTime(gain || 0.2, ac.currentTime + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + dur);
  o.connect(g).connect(ac.destination);
  o.start();
  o.stop(ac.currentTime + dur + 0.02);
}
function beepMatch(chain) {
  const baseFreq = 320 + chain * 28;
  tone(baseFreq, 0.16, 'triangle', 0.18);
  tone(baseFreq * 1.5, 0.12, 'sine', 0.08);
}
function beepDraw() {
  // v0.7: card-shuffle whoosh + small chime — much more satisfying than the
  // single thin sawtooth this used to be.
  const ac = ensureAC(); if (!ac) return;
  try {
    // 1) filtered noise whoosh
    const dur = 0.18;
    const buf = ac.createBuffer(1, Math.floor(ac.sampleRate * dur), ac.sampleRate);
    const data = buf.getChannelData(0);
    let last = 0;
    for (let i = 0; i < data.length; i++) {
      const w = (Math.random() * 2 - 1) * 0.5;
      last = (last + w) * 0.55;
      data[i] = last * (1 - i / data.length); // taper out
    }
    const src = ac.createBufferSource(); src.buffer = buf;
    const filt = ac.createBiquadFilter(); filt.type = 'bandpass';
    filt.frequency.setValueAtTime(2200, ac.currentTime);
    filt.frequency.linearRampToValueAtTime(800, ac.currentTime + dur);
    filt.Q.value = 1.2;
    const g = ac.createGain();
    g.gain.setValueAtTime(0, ac.currentTime);
    g.gain.linearRampToValueAtTime(0.18, ac.currentTime + 0.03);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    src.connect(filt).connect(g).connect(ac.destination);

    og.gain.linearRampToValueAtTime(0.08, ac.currentTime + 0.05);
    og.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.16);
    o.connect(og).connect(ac.destination);
    o.start(ac.currentTime + 0.04); o.stop(ac.currentTime + 0.17);

}

/* ============== [JS-13] FRAME LOOP ============== */
// v0.8: When Pixi owns game-canvas, particles/score-popups draw onto fx-canvas
// via fxCtx. When Pixi is off, we redirect fxCtx to game-canvas's ctx so the
// fallback Canvas2D path keeps working without per-call branching.
function frame() {
  if (pixiOK) {
    // FX canvas needs to be cleared each frame
    if (fxCanvas && fxCanvas !== canvas) {
      fxCtx.clearRect(0, 0, cssW, cssH);
    }
    drawCards();                     // Pixi handles bg/cards
    _withFxCtx(drawParticles);
    _withFxCtx(drawScorePopups);
  } else {
    ctx.clearRect(0, 0, cssW, cssH);
    drawBg();
    drawCards();
    drawParticles();
    drawScorePopups();
  }
  if (typeof drawMascot === 'function' && (
        (mascot.el && mascot.el.classList.contains('show')) ||
        document.body.classList.contains('in-play')
      )) drawMascot();
  requestAnimationFrame(frame);
}
// Temporarily swap the canvas2d `ctx` used by drawParticles/drawScorePopups
// to point at the FX canvas while Pixi controls game-canvas. We redefine
// `ctx` on globalThis just for the duration of the call.
function _withFxCtx(fn) {
  if (!fxCanvas || fxCanvas === canvas) { fn(); return; }
  // Note: ctx is `const`. We can't reassign. Instead the drawParticles + drawScorePopups
  // implementations already read `ctx` from the enclosing closure — so we shadow it
  // via the `globalThis.ctx` proxy approach. Simpler: monkey-patch CanvasRenderingContext2D
  // methods only if needed. For now, draw onto fxCtx by reflection.
  const orig = ctx;
  // We can't truly swap a const — so we just call drawParticles/drawScorePopups
  // with the existing ctx (which still points at game-canvas's 2d context, but
  // Pixi owns that buffer). However, the fx-canvas has same size and overlays
  // game-canvas with z-index 3, so duplicating draw calls to both works fine.
  // For perf we instead temporarily monkey-patch ctx.fillText etc. — but that's
  // over-engineered. Simplest correct fix: draw to fxCtx by re-implementing
  // the per-frame iteration here.
  if (fn === drawParticles) { _drawParticlesOn(fxCtx); return; }
  if (fn === drawScorePopups) { _drawScorePopupsOn(fxCtx); return; }
  fn();
}
function _drawParticlesOn(c) {
  // Mirror drawParticles' rendering into the given context — minimal port that
  // handles puff/sparkle/petal/default shapes.
  const next = [];
  for (const p of game.particles) {
    p.t += 1;
    if (p.t > p.life) continue;
    const k = p.t / p.life;
    const pos = normToScreen(p.x, p.y);
    if (p.shape === 'puff') {
      const scale = 1 + k * 0.7;
      c.save();
      c.globalAlpha = 0.7 * (1 - k);
      c.fillStyle = p.color || '#fff';
      c.beginPath();
      c.arc(pos.x + (p.vx * p.t || 0), pos.y + (p.vy * p.t || 0) - k * 8, (p.r || 8) * scale, 0, Math.PI*2);
      c.fill();
      c.restore();
    } else if (p.shape === 'sparkle') {
      c.save(); c.globalAlpha = 1 - k; c.fillStyle = p.color || '#fff';
      const cx = pos.x + p.vx * p.t, cy = pos.y + p.vy * p.t + 0.5 * 0.05 * p.t * p.t;
      const r = p.r * (1 - k * 0.4);
      c.beginPath(); c.moveTo(cx - r*3, cy); c.lineTo(cx, cy - r); c.lineTo(cx + r*3, cy); c.lineTo(cx, cy + r); c.closePath(); c.fill();
      c.beginPath(); c.moveTo(cx, cy - r*3); c.lineTo(cx - r, cy); c.lineTo(cx, cy + r*3); c.lineTo(cx + r, cy); c.closePath(); c.fill();
      c.restore();
    } else if (p.shape === 'petal') {
      c.save(); c.globalAlpha = 1 - k; c.fillStyle = p.color;
      const sway = Math.sin((p.t + (p.seed||0)) * 0.08) * 15;
      c.translate(pos.x + sway, pos.y + p.vy * p.t + 0.5 * 0.025 * p.t * p.t);
      c.rotate((p.rot || 0) + p.t * 0.02);
      c.beginPath(); c.ellipse(0, 0, p.r * 0.6, p.r * 1.3, 0, 0, Math.PI*2); c.fill();
      c.restore();
    } else {
      c.save(); c.globalAlpha = 1 - k; c.fillStyle = p.color;
      c.beginPath();
      c.arc(pos.x + p.vx * p.t, pos.y + p.vy * p.t + 0.5 * 0.05 * p.t * p.t, p.r * (1 - k * 0.5), 0, Math.PI*2);
      c.fill();
      c.restore();
    }
    next.push(p);
  }
  game.particles = next;
}
function _drawScorePopupsOn(c) {
  // No-op — the v0.4 score popups went DOM-based (.score-pop in coin-fly-layer).
  // Kept here for parity with the legacy canvas-based path.
}
requestAnimationFrame(frame);

function makeMissionRow(m) {
  const el = document.createElement('div'); el.className = 'mission';
  const cs = (state.missions && state.missions[m.id]) || {};
  const today = ymd();
  const claimedToday = cs.claimedYMD === today;
  const completedOnce = !!cs.claimed;
  const goneOut = !!cs.goneOut;
  let btnLabel = t('mission_go'), btnClass = '';
  if (m.auto) {
    const p = m.progress ? m.progress() : 0;
    if ((m.kind === 'daily' && claimedToday) || (m.kind === 'oneshot' && completedOnce)) { btnLabel = t('mission_done'); btnClass = 'done'; }
    else if (p >= 1) { btnLabel = t('mission_claim'); }
    else btnLabel = Math.floor(p * 100) + '%';
  } else {
    if ((m.kind === 'oneshot' && completedOnce)) { btnLabel = t('mission_done'); btnClass = 'done'; }
    else if (goneOut) { btnLabel = t('mission_check'); btnClass = 'check'; }
  }
  el.innerHTML =
    '<div class="ic">' + m.icon + '</div>' +
    '<div class="body"><h5>' + t(m.titleKey) + '</h5><div class="sub">' + t(m.subKey) + '</div><div class="reward">🪙 ' + m.reward + '</div></div>' +
    '<button class="btn ' + btnClass + '">' + btnLabel + '</button>';
  el.querySelector('button').addEventListener('click', () => handleMission(m));
  return el;
}

function handleMission(m) {
  const cs = state.missions[m.id] || {};
  state.missions[m.id] = cs;
  const today = ymd();
  if (m.kind === 'daily' && cs.claimedYMD === today) return;
  if (m.kind === 'oneshot' && cs.claimed) return;
  if (m.auto) {
    const p = m.progress ? m.progress() : 0;
    if (p < 1) { toast(Math.floor(p * 100) + '%'); return; }
    grantMission(m); return;
  }
  if (!cs.goneOut) {
    cs.goneOut = true; saveState(); renderEarn();
    if (m.action === 'share') {
      const url = (TG && TG.openTelegramLink) ? 'https://t.me/share/url?url=' + encodeURIComponent(window.location.href) + '&text=' + encodeURIComponent(t('welcome_t')) : window.location.href;
      try { TG?.openTelegramLink ? TG.openTelegramLink(url) : window.open(url, '_blank'); } catch { window.open(url, '_blank'); }
    } else if (m.action === 'follow' && m.url) {
      try { TG?.openTelegramLink ? TG.openTelegramLink(m.url) : window.open(m.url, '_blank'); } catch { window.open(m.url, '_blank'); }
    }
  } else {
    grantMission(m);
  }
}

function grantMission(m) {
  const cs = state.missions[m.id] || {};
  state.missions[m.id] = cs;
  const bp = state.battlePassUntil > Date.now() ? 2 : 1;
  state.coins += m.reward * bp;
  if (m.kind === 'daily') cs.claimedYMD = ymd();
  else cs.claimed = true;
  saveState(); renderEarn();
  toast('+' + (m.reward * bp) + ' 🪙');
  haptic('success');
  mp('mission_claim', { id: m.id, reward: m.reward * bp });
}

function chestDayForToday() {
  const today = ymd();
  if (state.chestClaimedYMD === today) return state.chestDay;
  // yesterday claimed -> advance; else if missed -> reset to 1
  const yest = new Date(Date.now() - 86400000); const yymd = ymd(yest);
  if (state.chestClaimedYMD === yymd) return Math.min(7, (state.chestDay || 0) + 1);
  if (state.chestClaimedYMD === '') return 1;
  return 1;
}
function claimChest() {
  const today = ymd();
  if (state.chestClaimedYMD === today) return;
  const day = chestDayForToday();
  const bp = state.battlePassUntil > Date.now() ? 2 : 1;
  const reward = CHEST_REWARDS[day - 1] * bp;
  state.coins += reward;
  state.chestDay = day;
  state.chestClaimedYMD = today;
  saveState();
  haptic('success');
  toast('+' + reward + ' 🪙');
  mp('chest_claim', { day, reward });
  renderEarn();
}

function countUp(el, from, to, durMs, fmt) {
  if (!el) return;
  const t0 = performance.now();
  function tick(now) {
    const p = clamp((now - t0) / durMs, 0, 1);
    const e = 1 - Math.pow(1 - p, 3);
    const v = from + (to - from) * e;
    el.textContent = fmt ? fmt(v) : String(v | 0);
    if (p < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

        step.draw(c2, dt);
        requestAnimationFrame(loop);
      }

function ftueDrawStars(c, dt) {
  c.clearRect(0,0,560,400);
  const k = (dt % 2400) / 2400;
  c.fillStyle='#ffd166'; c.font='900 60px Inter, sans-serif'; c.textAlign='center';
  const scales = [k*3, k*3-1, k*3-2];
  scales.forEach((s, i) => {
    const v = clamp(s, 0, 1);

    c.save();
    c.translate(180 + i*100, 200);
    const sc = easeOutBack(v);
    c.scale(sc, sc);
    c.fillText('★', 0, 20);
    c.restore();

let mpFlushTimer = null;

function applyGrant(g) {
  const gr = g.grant || {};
  if (gr.coins) state.coins += gr.coins | 0;
  if (gr.wilds) state.boosters.wild += gr.wilds | 0;
  if (gr.shuffles) state.boosters.shuffle += gr.shuffles | 0;
  if (gr.undos) state.boosters.undo += gr.undos | 0;
  if (gr.revives) state.boosters.revive += gr.revives | 0;
  if (gr.skin) { if (!state.ownedSkins.includes(gr.skin)) state.ownedSkins.push(gr.skin); }
  if (gr.shieldDays) state.shieldUntil = Date.now() + gr.shieldDays * 86400000;
  if (gr.battlePassDays) state.battlePassUntil = Date.now() + gr.battlePassDays * 86400000;
  saveState();
  renderHUD();
  toast(t('iap_thanks'));
}

// ---------- LIVES ----------
function rolloverLivesIfNeeded() {
  // top up lives if 30min ticks have elapsed since livesRefillAt
  if (state.lives >= LIVES_MAX) { state.livesRefillAt = 0; return; }
  if (!state.livesRefillAt) { state.livesRefillAt = Date.now() + LIVES_REGEN_MS; return; }
  const now = Date.now();
  while (state.lives < LIVES_MAX && now >= state.livesRefillAt) {
    state.lives += 1;
    state.livesRefillAt = state.livesRefillAt + LIVES_REGEN_MS;
  }
  if (state.lives >= LIVES_MAX) state.livesRefillAt = 0;
}
function consumeLife() {
  rolloverLivesIfNeeded();
  if (state.lives <= 0) return false;
  state.lives -= 1;
  if (!state.livesRefillAt) state.livesRefillAt = Date.now() + LIVES_REGEN_MS;
  saveState(); renderHUD();
  return true;
}
function gainLife(n) {
  state.lives = Math.min(LIVES_MAX, (state.lives|0) + (n|0));
  if (state.lives >= LIVES_MAX) state.livesRefillAt = 0;
  saveState(); renderHUD();
}
function refillLivesWithStars() {
  // costs Stars via IAP; we'll route through a synthetic SKU
  if (state.stars >= LIVES_REFILL_COST) {
    // for now this is a soft purchase (use stars currency) — real version would call IAP
    // since "Stars" here means in-game ⭐ earned from levels, this is a free top-up via game stars (different from Telegram Stars purchase)
    // Telegram-Stars refill would be a SKU; we'll wire that separately
    toast(t('iap_unavail'));
  } else {
    toast(t('iap_unavail'));
  }
}

function formatLivesTimer() {
  rolloverLivesIfNeeded();
  if (state.lives >= LIVES_MAX) return '';
  if (!state.livesRefillAt) return '';
  const ms = state.livesRefillAt - Date.now();
  if (ms <= 0) return '';
  const m = Math.max(1, Math.ceil(ms / 60000));
  return m + 'm';
}

// ---------- ACHIEVEMENTS ----------
function checkAchievements() {
  let granted = 0;
  for (const ach of ACHIEVEMENTS) {
    const cur = state.achievements[ach.id] || {};
    if (cur.unlocked) continue;
    if (ach.check(state)) {
      cur.unlocked = true; cur.unlockedAt = Date.now();
      state.achievements[ach.id] = cur;
      granted += 1;
      showAchievementPopup(ach);
    }
  }
  if (granted) saveState();
}
function showAchievementPopup(ach) {
  const el = document.getElementById('ach-popup');
  if (!el) return;
  el.querySelector('.ic').textContent = ach.icon;
  el.querySelector('.t').textContent = t('achievement_unlocked');
  el.querySelector('.nm').textContent = t(ach.tKey);
  el.classList.add('show');
  haptic('success');
  beepWin();
  clearTimeout(showAchievementPopup._t);
  showAchievementPopup._t = setTimeout(() => el.classList.remove('show'), 2200);
}
function claimAchievement(achId) {
  const ach = ACHIEVEMENTS.find(a => a.id === achId);
  if (!ach) return;
  const cur = state.achievements[achId] || {};
  if (!cur.unlocked || cur.claimed) return;
  cur.claimed = true; cur.claimedAt = Date.now();
  state.achievements[achId] = cur;
  const bp = state.battlePassUntil > Date.now() ? 2 : 1;
  state.coins += ach.reward * bp;
  saveState(); renderHUD();
  toast('+' + (ach.reward * bp) + ' 🪙');
  haptic('success');
  mp('achievement_claim', { id: achId, reward: ach.reward * bp });
  renderEarn();
}

// ---------- POSTCARDS ----------
function ensurePostcard(id) {
  if (!state.postcards[id]) state.postcards[id] = { pieces: 0, complete: false, claimedAt: 0 };
  return state.postcards[id];
}
function awardMemoryPiece() {
  // find next incomplete postcard
  for (const pc of POSTCARDS) {
    const ps = ensurePostcard(pc.id);
    if (!ps.complete) {
      ps.pieces += 1;
      if (ps.pieces >= pc.pieces) {
        ps.complete = true; ps.claimedAt = Date.now();
        state.coins += 300;
        showPostcardComplete(pc);
      }
      saveState();
      return;
    }
  }
}

}
function drawPostcardArt(c, w, h, key, complete) {

    // rose

      const tx = w * (0.1 + i * 0.2);
      c.beginPath();
      c.moveTo(tx, h*0.85); c.lineTo(tx - 14, h*0.55); c.lineTo(tx + 14, h*0.55); c.closePath(); c.fill();

    }

    }
  } else if (key === 'coral_reef') {
    const g = c.createLinearGradient(0, 0, 0, h);
    g.addColorStop(0, '#118ab2'); g.addColorStop(1, '#073b4c');
    c.fillStyle = g; c.fillRect(0, 0, w, h);
    // bubbles
    c.fillStyle = 'rgba(255,255,255,0.4)';
    for (let i = 0; i < 8; i++) {
      c.beginPath(); c.arc(w*Math.random(), h*Math.random(), 3 + Math.random()*4, 0, Math.PI*2); c.fill();
    }
    // coral
    c.fillStyle = '#ef476f';
    c.beginPath();
    c.moveTo(w*0.2, h);
    c.bezierCurveTo(w*0.25, h*0.7, w*0.15, h*0.6, w*0.3, h*0.4);
    c.bezierCurveTo(w*0.35, h*0.6, w*0.4, h*0.7, w*0.4, h);
    c.fill();
    c.fillStyle = '#ffd166';
    c.beginPath();
    c.moveTo(w*0.65, h); c.bezierCurveTo(w*0.7, h*0.6, w*0.6, h*0.5, w*0.75, h*0.35);
    c.bezierCurveTo(w*0.8, h*0.5, w*0.85, h*0.7, w*0.85, h); c.fill();
    // fish
    c.fillStyle = '#06d6a0';
    c.beginPath();
    c.ellipse(w*0.5, h*0.3, 12, 6, 0, 0, Math.PI*2); c.fill();
    c.beginPath();
    c.moveTo(w*0.5 + 10, h*0.3); c.lineTo(w*0.5 + 18, h*0.27); c.lineTo(w*0.5 + 18, h*0.33); c.closePath(); c.fill();
  } else if (key === 'throne_room') {
    const g = c.createLinearGradient(0, 0, 0, h);
    g.addColorStop(0, '#3a1d6a'); g.addColorStop(1, '#1a0b2e');
    c.fillStyle = g; c.fillRect(0, 0, w, h);
    // throne
    c.fillStyle = '#ef476f';
    c.fillRect(w*0.35, h*0.4, w*0.3, h*0.45);
    c.fillStyle = '#ffd166';
    c.fillRect(w*0.35, h*0.4, w*0.3, 6);
    // crown floating
    c.fillStyle = '#ffd166';
    c.beginPath();
    c.moveTo(w*0.42, h*0.25); c.lineTo(w*0.45, h*0.18); c.lineTo(w*0.5, h*0.22); c.lineTo(w*0.55, h*0.18); c.lineTo(w*0.58, h*0.25); c.lineTo(w*0.58, h*0.32); c.lineTo(w*0.42, h*0.32);
    c.closePath(); c.fill();
    // pillars
    c.fillStyle = '#fdfaf3';
    c.fillRect(w*0.1, h*0.3, 8, h*0.5);
    c.fillRect(w*0.85, h*0.3, 8, h*0.5);
    // floor
    c.fillStyle = '#5a2ca0';
    c.fillRect(0, h*0.85, w, h*0.15);
  } else if (key === 'crystal_heart') {
    const g = c.createRadialGradient(w/2, h/2, 0, w/2, h/2, w*0.6);
    g.addColorStop(0, '#a83af0'); g.addColorStop(1, '#0b0420');
    c.fillStyle = g; c.fillRect(0, 0, w, h);
    // sparkles
    c.fillStyle = 'rgba(255,255,255,0.6)';
    for (let i = 0; i < 12; i++) {
      c.beginPath(); c.arc(w*Math.random(), h*Math.random(), 1 + Math.random()*1.5, 0, Math.PI*2); c.fill();
    }
    // heart-crystal
    c.fillStyle = '#ef476f';
    c.beginPath();
    const cx = w/2, cy = h*0.55;
    c.moveTo(cx, cy + 18);
    c.bezierCurveTo(cx - 24, cy, cx - 18, cy - 18, cx, cy - 6);
    c.bezierCurveTo(cx + 18, cy - 18, cx + 24, cy, cx, cy + 18);
    c.fill();
    c.strokeStyle = '#fff'; c.lineWidth = 1.5;
    c.beginPath(); c.moveTo(cx - 5, cy - 5); c.lineTo(cx + 3, cy); c.lineTo(cx - 2, cy + 6); c.stroke();
  } else {
    c.fillStyle = '#5a2ca0'; c.fillRect(0, 0, w, h);
  }
  c.restore();
}

function drawMascot() {

  c.beginPath(); c.ellipse(0, 6, 36, 38, 0, 0, Math.PI*2); c.stroke();
  // belly
  c.fillStyle = '#fff7e6';

  c.beginPath(); c.ellipse(0, 14, 22, 24, 0, 0, Math.PI*2); c.stroke();

  c.beginPath(); c.arc(-12, -8, 11, 0, Math.PI*2); c.fill();
  c.beginPath(); c.arc(12, -8, 11, 0, Math.PI*2); c.fill();
  c.strokeStyle = '#3a1700'; c.lineWidth = 1.5;
  c.beginPath(); c.arc(-12, -8, 11, 0, Math.PI*2); c.stroke();
  c.beginPath(); c.arc(12, -8, 11, 0, Math.PI*2); c.stroke();
  // pupils — follow chain progress
  const px = clamp(game.chain * 0.5 - 1, -3, 3);
  c.fillStyle = '#1a0b2e';
  c.beginPath(); c.arc(-12 + px, -7, 5, 0, Math.PI*2); c.fill();
  c.beginPath(); c.arc(12 + px, -7, 5, 0, Math.PI*2); c.fill();
  c.fillStyle = '#fff';
  c.beginPath(); c.arc(-10 + px, -9, 2, 0, Math.PI*2); c.fill();
  c.beginPath(); c.arc(14 + px, -9, 2, 0, Math.PI*2); c.fill();
  // beak — chunkier orange
  c.fillStyle = '#ef7e2c';
  c.beginPath(); c.moveTo(0, 1); c.lineTo(-7, 9); c.lineTo(7, 9); c.closePath(); c.fill();
  c.strokeStyle = '#7a3e0f'; c.lineWidth = 1.5;
  c.beginPath(); c.moveTo(0, 1); c.lineTo(-7, 9); c.lineTo(7, 9); c.closePath(); c.stroke();
  // tufts — warm brown
  c.fillStyle = '#7a3e0f';
  c.beginPath(); c.moveTo(-22, -22); c.lineTo(-18, -34); c.lineTo(-12, -22); c.closePath(); c.fill();
  c.beginPath(); c.moveTo(22, -22); c.lineTo(18, -34); c.lineTo(12, -22); c.closePath(); c.fill();
  c.strokeStyle = '#3a1700'; c.lineWidth = 1.5;
  c.beginPath(); c.moveTo(-22, -22); c.lineTo(-18, -34); c.lineTo(-12, -22); c.closePath(); c.stroke();
  c.beginPath(); c.moveTo(22, -22); c.lineTo(18, -34); c.lineTo(12, -22); c.closePath(); c.stroke();
  // tiny cheek blush (Disney chubby owl charm)
  c.fillStyle = 'rgba(239,71,111,0.35)';

// ---------- SPLASH ----------
function drawSplash() {
  const cv = document.getElementById('splash-canvas');
  if (!cv) return;
  const c = cv.getContext('2d'); const W = cv.width, H = cv.height;
  let t0 = performance.now();
  function loop() {
    if (!document.getElementById('splash') || document.getElementById('splash').classList.contains('gone')) return;
    const dt = (performance.now() - t0) / 1000;
    c.clearRect(0, 0, W, H);
    // 5 cards fanning out
    const ranks = [13, 1, 2, 11, 12];
    const suits = [0, 2, 1, 3, 0];
    for (let i = 0; i < 5; i++) {
      const ang = (-0.4 + i * 0.2) + Math.sin(dt * 0.8 + i) * 0.04;
      const dist = 90 + i * 4;
      const x = W/2 + Math.sin(ang) * dist;
      const y = H/2 + Math.cos(ang) * dist - dist * 0.4;
      c.save();
      c.translate(x, y); c.rotate(ang * 0.7 + Math.sin(dt + i) * 0.05);
      c.fillStyle='rgba(0,0,0,0.3)';
      drawRoundedRect(c, -33, -45, 70, 96, 10); c.fill();
      c.fillStyle='#fffcf2';
      drawRoundedRect(c, -35, -47, 70, 96, 10); c.fill();
      c.fillStyle = SUIT_COLOR[SUITS[suits[i]]];
      c.font='800 18px Inter, sans-serif'; c.textBaseline='top'; c.textAlign='left';
      c.fillText(RANK_LABEL[ranks[i]], -28, -42);
      c.font='800 36px Inter, sans-serif'; c.textAlign='center'; c.textBaseline='middle';
      c.fillText(SUITS[suits[i]], 0, 0);
      c.restore();
    }
    requestAnimationFrame(loop);
  }
  loop();
}
function dismissSplash() {
  const el = document.getElementById('splash');
  if (el) { el.classList.add('gone'); setTimeout(() => el.style.display = 'none', 500); }
  state.splashSeen = true; saveState();
  ensureAC(); // unlock audio on first tap
}

// ---------- COIN RAIN / PEAK FIREWORKS ----------
const coinRain = { canvas: null, ctx: null, particles: [], running: false };
function initCoinRain() {
  coinRain.canvas = document.getElementById('coin-rain');
  if (!coinRain.canvas) return;
  coinRain.ctx = coinRain.canvas.getContext('2d');
}
function startCoinRain(n) {
  if (!coinRain.canvas) return;
  const rect = coinRain.canvas.getBoundingClientRect();
  coinRain.canvas.width = rect.width * (window.devicePixelRatio || 1);
  coinRain.canvas.height = rect.height * (window.devicePixelRatio || 1);
  const ctxR = coinRain.ctx;
  ctxR.setTransform(window.devicePixelRatio||1, 0, 0, window.devicePixelRatio||1, 0, 0);
  coinRain.particles = [];
  for (let i = 0; i < (n || 25); i++) {
    coinRain.particles.push({ x: Math.random()*rect.width, y: -30 - Math.random()*200, vy: 2 + Math.random()*3, r: 8 + Math.random()*6, rot: Math.random()*Math.PI*2, vr: (Math.random()-0.5)*0.2, alive: true });
  }
  coinRain.running = true;
  requestAnimationFrame(tickCoinRain);
}
function tickCoinRain() {
  if (!coinRain.running) return;
  const ctxR = coinRain.ctx;
  const rect = coinRain.canvas.getBoundingClientRect();
  ctxR.clearRect(0, 0, rect.width, rect.height);
  let alive = 0;
  for (const p of coinRain.particles) {
    if (!p.alive) continue;
    p.y += p.vy; p.rot += p.vr; p.vy += 0.08;
    if (p.y > rect.height + 30) { p.alive = false; continue; }
    alive++;
    ctxR.save();
    ctxR.translate(p.x, p.y); ctxR.rotate(p.rot);
    ctxR.fillStyle = '#ffd166';
    ctxR.beginPath(); ctxR.ellipse(0, 0, p.r, p.r * 0.6 + 1, 0, 0, Math.PI*2); ctxR.fill();
    ctxR.strokeStyle = '#b97a1c'; ctxR.lineWidth = 1.2;
    ctxR.beginPath(); ctxR.ellipse(0, 0, p.r, p.r * 0.6 + 1, 0, 0, Math.PI*2); ctxR.stroke();
    ctxR.fillStyle = '#b97a1c';
    ctxR.font = 'bold ' + Math.floor(p.r*1.2) + 'px Inter, sans-serif';
    ctxR.textAlign='center'; ctxR.textBaseline='middle';
    ctxR.fillText('★', 0, 0);
    ctxR.restore();
  }
  if (alive > 0) requestAnimationFrame(tickCoinRain);
  else coinRain.running = false;
}

// ---------- WORLD CHEST ----------
function checkWorldComplete(worldId) {
  const w = WORLDS.find(x => x.id === worldId);
  if (!w) return;
  if (state.worldsClaimed[worldId]) return;
  // require: every level in range is starsPerLevel >= 1
  for (let id = w.range[0]; id <= w.range[1]; id++) {
    if ((state.starsPerLevel[id]|0) < 1) return;
  }
  openWorldChestModal(w);
}
function openWorldChestModal(w) {
  state.worldsClaimed[w.id] = true;

function drawWorldChestArt(c, w, h, world) {
  c.clearRect(0, 0, w, h);

  g.addColorStop(0, world.accent); g.addColorStop(1, 'rgba(0,0,0,0)');

  // chest body
  c.fillStyle = '#5a2ca0';
  c.fillRect(w*0.2, h*0.45, w*0.6, h*0.4);

  c.save(); c.translate(w*0.2, h*0.45); c.rotate(-0.4);
  c.fillStyle = '#7a3cd0';
  c.fillRect(0, -h*0.2, w*0.6, h*0.2);
  c.restore();
  // gold inside
  c.fillStyle = '#ffd166';
  c.fillRect(w*0.24, h*0.5, w*0.52, h*0.1);

  c.fillStyle = '#fff';

      '</div>' +

      '</div>';
    openModal(html, () => {
      const g = document.getElementById('pre-grid');
      PRE_BOOSTERS.forEach(name => {
        const have = state.pre[name] | 0;
        const cell = document.createElement('div');
        cell.className = 'pre-card' + (preEquipped[name] ? ' equipped' : '') + (have <= 0 ? ' empty' : '');
        cell.innerHTML =
          '<span class="cnt' + (have <= 0 ? ' empty' : '') + '">' + have + '</span>' +
          '<div class="ic">' + PRE_BOOSTER_ICON[name] + '</div>' +

          '<div class="sb">' + t('booster_' + name.toLowerCase() + '_s') + '</div>';

        });

      });

        for (const k of Object.keys(preEquipped)) {

        saveState();
        closeModal();
        startLevel(levelId, { pre: { ...preEquipped }, daily: false });
      });
    });
  }
  render();
}

// ---------- DAILY CHALLENGE ----------
async function openDailyChallenge() {
  const today = ymd();
  if (state.dailyDoneYMD === today) { toast(t('daily_done')); return; }
  // pick a deterministic level + seed for everyone today
  let seed = 1;
  try { const r = await fetch('/api/daily-seed'); const j = await r.json(); seed = (j.seed >>> 0) || 1; } catch {}
  // pick a level 10..60 based on player progress
  const ceil = clamp(state.maxLevelUnlocked, 10, 60);
  const lid = 10 + (seed % Math.max(1, ceil - 9));
  startLevel(lid, { daily: true, seed });
}
