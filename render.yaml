services:
  - type: web
    name: solitaire-troyka
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm install
    startCommand: node server.js
    autoDeploy: true
    disk:
      name: solitaire-troyka-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /data
      - key: PUBLIC_DOMAIN
        # Render's fromService.host returns just the service name (e.g.
        # "solitaire-troyka") not the full hostname, so the /start play
        # button URL would be broken. Hard-code the full domain instead.
        value: solitaire-troyka.onrender.com
      - key: BOT_TOKEN
        sync: false
      - key: MIXPANEL_TOKEN
        sync: false
      - key: TELEGRAM_ADMIN_IDS
        value: "23040617"
